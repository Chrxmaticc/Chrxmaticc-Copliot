name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GROQ_KEY: ${{ secrets.GROQ_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    defaults:
      run:
        working-directory: chrxmaticc-copilot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: chrxmaticc-copilot/package-lock.json
      - run: npm ci
      - run: npm test
      - run: node -e "const fs=require('fs'); const files=fs.readdirSync('src').filter(f=>f.endsWith('.js')||f.endsWith('.json')); console.log('Files:', files.length); files.forEach(f=>console.log('  ✓', f));"
