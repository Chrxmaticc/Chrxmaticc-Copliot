name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GROQ_KEY: ${{ secrets.GROQ_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    defaults:
      run:
        working-directory: chrxmaticc-copliot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
