<!DOCTYPE html>
<html lang="en" class="app-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0b0a">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Chrxmaticc Copilot</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="analytics.js"></script>
  <style>
    html, body, .app-page { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; inset: 0; }
    :root { --bg: #0b0b0a; --panel: rgba(18,18,16,0.9); --border: rgba(212,165,116,0.12); --text: #e8d5c4; --muted: #8a7a6a; --accent: #d4a574; --accent2: #c9956b; --glow: rgba(212,165,116,0.15); --card-bg: rgba(18,18,16,0.9); --user-bubble: rgba(212,165,116,0.15); --ai-bubble: #121210; }
    [data-theme="midnight"] { --bg: #0a0a0a; --panel: rgba(13,13,13,0.95); --border: #1a1a1a; --text: #e0e0e0; --muted: #8e8e93; --accent: #a0a0d0; --accent2: #8888bb; --glow: rgba(150,150,200,0.1); --card-bg: #0d0d0d; --user-bubble: #1a1a2e; --ai-bubble: #141414; }
    [data-theme="glass"] { --bg: #0a0a0f; --panel: rgba(20,20,30,0.5); --border: rgba(255,255,255,0.06); --text: #e0e0e0; --muted: #999; --accent: #a0b0d0; --accent2: #8899cc; --glow: rgba(150,180,220,0.1); --card-bg: rgba(20,20,30,0.4); --user-bubble: rgba(60,60,100,0.4); --ai-bubble: rgba(30,30,40,0.5); }
    [data-theme="chrome"] { --bg: #1a1a1a; --panel: rgba(30,30,30,0.95); --border: #2a2a2a; --text: #e0e0e0; --muted: #999; --accent: #bbb; --accent2: #aaa; --glow: rgba(200,200,220,0.08); --card-bg: #1e1e1e; --user-bubble: #555; --ai-bubble: #2a2a2a; }
    [data-theme="white"] { --bg: #f5f5f7; --panel: rgba(255,255,255,0.95); --border: #e5e5e5; --text: #1a1a1a; --muted: #999; --accent: #0a84ff; --accent2: #0070e0; --glow: rgba(10,132,255,0.1); --card-bg: #fff; --user-bubble: #0a84ff; --ai-bubble: #ffffff; }
    .app-page { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; transition: background 0.5s ease, color 0.5s ease; }

    .loading-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.5s ease, visibility 0.5s ease; opacity: 1; visibility: visible; }
    .loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loading-ring { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; box-shadow: 0 0 40px var(--glow); animation: ringPulse 2s ease-in-out infinite; }
    .loading-ring img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    @keyframes ringPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .loading-icon { width: 48px; height: 48px; filter: drop-shadow(0 0 12px var(--glow)); }
    .loading-icon img { width: 100%; height: 100%; object-fit: contain; }
    .loading-text { font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(135deg, var(--accent2), var(--accent)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: goldShimmer 2s ease-in-out infinite; }
    @keyframes goldShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    #app { display: flex; height: 100%; width: 100%; position: relative; z-index: 1; }
    
    /* SIDEBAR */
    .sidebar { position: fixed; left: -300px; top: 0; bottom: 0; width: 280px; z-index: 100; transition: left 0.3s cubic-bezier(0.25,0.8,0.25,1.2); display: flex; flex-direction: column; padding: 16px; overflow-y: auto; background: var(--panel); border-right: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .sidebar.open { left: 0; }
    .sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .sidebar-avatar { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; }
    .sidebar-avatar img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .sidebar-title { font-size: 18px; font-weight: 700; flex: 1; }
    .sidebar-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); padding: 4px; }
    .sidebar-new-chat { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 13px; cursor: pointer; margin-bottom: 12px; font-family: inherit; transition: all 0.2s; }
    .sidebar-new-chat:hover { border-color: var(--accent); }
    .sidebar-chats { flex: 1; overflow-y: auto; }
    .chat-item { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 10px; cursor: pointer; margin-bottom: 2px; transition: background 0.15s; }
    .chat-item:hover, .chat-item.active { background: var(--card-bg); }
    .chat-item-name { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }
    .sidebar-footer { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 8px; }
    .sidebar-profile { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 13px; }
    .sidebar-profile:hover { background: var(--card-bg); }
    .sidebar-profile-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; }
    .sidebar-profile-avatar img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .sidebar-profile-name { font-weight: 500; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
    .overlay.visible { display: block; }

    .main { flex: 1; display: flex; flex-direction: column; max-width: 720px; margin: 0 auto; width: 100%; height: 100%; min-height: 0; position: relative; }
    .topbar { padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .topbar-btn { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; padding: 4px; display: flex; align-items: center; gap: 4px; }
    .topbar-back { font-size: 26px; line-height: 1; }
    .topbar-logo-sm { width: 26px; height: 26px; border-radius: 50%; overflow: hidden; box-shadow: 0 0 12px var(--glow); flex-shrink: 0; }
    .topbar-logo-sm img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .topbar-center { flex: 1; cursor: pointer; min-width: 0; }
    .topbar-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; background: linear-gradient(135deg, var(--accent2), var(--accent)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: goldShimmer 3s ease-in-out infinite; }
    .topbar-status { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; }
    .status-dot.online { background: #30d158; } .status-dot.thinking { background: #ff9f0a; animation: dotPulse 1s infinite; } .status-dot.offline { background: #ff453a; } .status-dot.lurking { background: #8a7a6a; } .status-dot.locked { background: #d4a574; } .status-dot.judging { background: #ff6b35; }
    @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .topbar-util { display: flex; align-items: center; gap: 4px; }
    .topbar-select { border-radius: 8px; padding: 4px 8px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--muted); font-family: inherit; -webkit-appearance: none; appearance: none; }

    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    .messages::-webkit-scrollbar { display: none; }
    .bubble-row { display: flex; flex-direction: column; max-width: 82%; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from{opacity:0;transform:scale(0.9) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .bubble-row.user { align-self: flex-end; align-items: flex-end; }
    .bubble-row.ai { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
    .bubble-row.user .bubble { background: var(--user-bubble); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
    .bubble-row.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .timestamp { font-size: 10px; color: var(--muted); margin: 3px 8px; opacity: 0; transition: opacity 0.2s; }
    .bubble-row:hover .timestamp { opacity: 1; }
    .typing-cursor { display: inline-block; animation: blink 0.7s infinite; color: var(--accent); font-weight: 200; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .typing-indicator { display: none; align-self: flex-start; padding: 12px 16px; gap: 5px; }
    .typing-indicator.visible { display: flex; }
    .typing-dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; } .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .code-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .code-action-btn { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .code-action-btn:hover { border-color: var(--accent); }
    .code-action-btn.accept { border-color: rgba(48,209,88,0.3); color: #30d158; } .code-action-btn.reject { border-color: rgba(255,69,58,0.3); color: #ff453a; } .code-action-btn.preview { border-color: rgba(10,132,255,0.3); color: #0a84ff; }
    .code-action-btn.commit { border-color: rgba(212,165,116,0.3); color: #d4a574; background: rgba(212,165,116,0.06); }
    .code-action-btn.commit:hover { border-color: #d4a574; background: rgba(212,165,116,0.12); }
    .code-action-btn svg { width: 12px; height: 12px; }
    .code-block { border-radius: 10px; margin: 6px 0; overflow: hidden; border: 1px solid var(--border); border-left: 3px solid var(--accent); }
    .code-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; font-size: 10px; background: var(--card-bg); color: var(--muted); border-bottom: 1px solid var(--border); }
    .code-copy { border: none; padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; background: var(--panel); color: var(--muted); font-family: inherit; }
    .code-block pre { padding: 10px 14px; margin: 0; overflow-x: auto; font-size: 12px; line-height: 1.6; font-family: 'SF Mono','Fira Code',monospace; white-space: pre-wrap; word-break: break-word; }
    .inline-code { padding: 2px 5px; border-radius: 4px; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; background: var(--card-bg); }

    .qa-grid { display: none; padding: 12px 14px; border-top: 1px solid var(--border); background: var(--panel); flex-direction: column; gap: 8px; flex-shrink: 0; }
    .qa-grid.visible { display: flex; }
    .qa-grid-label { font-size: 12px; color: var(--accent); font-weight: 600; }
    .qa-grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .qa-grid-btn { padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; text-align: center; transition: all 0.15s; }
    .qa-grid-btn:hover { border-color: var(--accent); } .qa-grid-btn.custom { border-style: dashed; grid-column: 1 / -1; }
    .plan-doc { background: var(--card-bg); border: 1px solid var(--accent); border-radius: 14px; padding: 16px; margin: 8px 0; }
    .plan-doc-title { font-size: 14px; font-weight: 700; color: var(--accent); }
    .plan-actions { display: flex; gap: 8px; margin-top: 12px; }
    .plan-btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .plan-btn.primary { background: var(--accent); color: var(--bg); border: none; }

    .preview-panel { display: none; position: absolute; right: 0; top: 0; bottom: 0; width: 50%; background: #fff; border-left: 1px solid var(--border); z-index: 50; }
    .preview-panel.visible { display: flex; flex-direction: column; }
    .preview-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f5f5f7; border-bottom: 1px solid #e5e5e5; font-size: 12px; color: #1a1a1a; }
    .preview-iframe { flex: 1; border: none; width: 100%; }

    .inputbar { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .input-wrap { flex: 1; border-radius: 24px; display: flex; align-items: center; padding: 0 14px; min-height: 40px; border: 1px solid var(--border); background: var(--card-bg); }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    #userInput { background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; font-family: inherit; width: 100%; resize: none; max-height: 100px; padding: 10px 0; line-height: 1.4; }
    #userInput::placeholder { color: var(--muted); opacity: 0.5; }
    .input-pill { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; white-space: nowrap; position: relative; }
    .input-pill:hover { border-color: var(--accent); }
    .input-pill svg { width: 13px; height: 13px; flex-shrink: 0; }
    .input-pill.workflow-pill { min-width: 74px; justify-content: center; }
    .input-pill.personality-pill { min-width: 74px; justify-content: center; }
    .input-pill.mode-pill { min-width: 34px; justify-content: center; padding: 7px 8px; }
    .github-badge { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; background: #0b0b0a; border: 1.5px solid #d4a574; display: none; align-items: center; justify-content: center; }
    .github-badge.visible { display: flex; }
    .github-badge svg { width: 11px; height: 11px; color: #d4a574; }
    .input-btn { background: none; border: none; cursor: pointer; padding: 5px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
    .input-btn:hover { color: var(--text); } .input-btn svg { width: 18px; height: 18px; }
    .commit-btn { display: none; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 20px; border: 1px solid rgba(212,165,116,0.2); background: rgba(212,165,116,0.06); color: #d4a574; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .commit-btn.visible { display: flex; }
    .commit-btn:hover { border-color: #d4a574; background: rgba(212,165,116,0.12); }
    .commit-btn svg { width: 14px; height: 14px; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: linear-gradient(135deg, var(--accent2), var(--accent)); }
    .send-btn svg { width: 15px; height: 15px; fill: var(--bg); }

    .app-theme-pill { position: fixed; bottom: 100px; right: 12px; z-index: 150; display: flex; flex-direction: column; gap: 4px; padding: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(20px); box-shadow: 0 4px 24px rgba(0,0,0,0.4); opacity: 0.4; transition: opacity 0.3s; }
    .app-theme-pill:hover { opacity: 1; }
    .app-theme-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .app-theme-dot.active { border-color: var(--accent); box-shadow: 0 0 8px var(--glow); }
    .app-theme-dot.gold { background: #0b0b0a; } .app-theme-dot.midnight { background: #0a0a0a; } .app-theme-dot.glass { background: rgba(20,20,30,0.8); } .app-theme-dot.chrome { background: #1a1a1a; } .app-theme-dot.white { background: #f5f5f7; }

    .app-toast { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--border); border-left: 3px solid var(--accent); color: var(--text); padding: 10px 18px; border-radius: 12px; font-size: 12px; z-index: 300; backdrop-filter: blur(20px); display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards; pointer-events: none; font-weight: 500; max-width: 380px; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes toastOut { from{opacity:1;transform:translateX(-50%) translateY(0)} to{opacity:0;transform:translateX(-50%) translateY(-6px)} }
    .wwcd-btn { position: fixed; bottom: 140px; right: 16px; z-index: 200; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--panel); cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); opacity: 0.5; }
    .wwcd-btn:hover { opacity: 1; border-color: var(--accent); }

    @media (max-width: 480px) { .topbar { padding: 8px 12px; } .bubble { font-size: 13px; padding: 10px 14px; } .input-pill { padding: 5px 8px; font-size: 10px; } .sidebar { width: 260px; } }
  </style>
</head>
<body class="app-page" data-theme="gold">
  <div id="loadingScreen" class="loading-screen"><div class="loading-ring"><img src="chrome.gif" alt="Loading"></div><div class="loading-icon"><img src="icon.png" alt="Chrxmaticc"></div><div class="loading-text">Chrxmaticc Copilot</div></div>
  <div id="app">
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header"><div class="sidebar-avatar" id="sidebarAvatar"><img src="icon.png" alt="Avatar"></div><div class="sidebar-title">Chats</div><button class="sidebar-close" onclick="toggleSidebar()">&times;</button></div>
      <button class="sidebar-new-chat" onclick="newChat()">+ New Chat</button>
      <div class="sidebar-chats" id="savedChatsList"></div>
      <div class="sidebar-footer"><div class="sidebar-profile" onclick="location.href='settings.html'"><div class="sidebar-profile-avatar" id="profileAvatar"><img src="icon.png" alt="Profile"></div><div class="sidebar-profile-name" id="profileName">Guest</div></div></div>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="main" class="main">
      <div class="topbar">
        <button class="topbar-btn" onclick="toggleSidebar()"><span class="topbar-back">&lsaquo;</span><span class="topbar-logo-sm"><img src="chrome.gif" alt="Chrxmaticc"></span></button>
        <div class="topbar-center"><div class="topbar-name">Chrxmaticc Copilot</div><div class="topbar-status"><span id="statusDot" class="status-dot online"></span><span id="statusText">Online</span></div></div>
        <div class="topbar-util">
          <select id="typingSpeedSelect" class="topbar-select" onchange="changeTypingSpeed(this.value)"><option value="0">Off</option><option value="10" selected>1x</option><option value="20">2x</option><option value="30">3x</option><option value="40">4x</option><option value="50">5x</option></select>
          <button class="input-btn" onclick="toggleChatSearch()" title="Search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
          <button class="input-btn" onclick="toggleTTS()" title="TTS"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg></button>
          <button class="input-btn" onclick="location.href='settings.html'" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
        </div>
      </div>
      <div class="messages" id="messages"><div class="typing-indicator" id="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>
      <div class="preview-panel" id="previewPanel"><div class="preview-header"><span>Live Preview</span><button onclick="togglePreview()">x</button></div><iframe class="preview-iframe" id="previewIframe" sandbox="allow-scripts"></iframe></div>
      <div class="file-preview" id="filePreview" style="display:none;"><img id="filePreviewImg" src="" style="display:none;" alt="Preview"><span id="filePreviewInfo"></span><button onclick="clearFile()">&times;</button></div>
      <div class="qa-grid" id="qaGrid"></div>
      <div class="inputbar">
