<!DOCTYPE html>
<html lang="en" class="app-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0b0a">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Chrxmaticc Copilot</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="analytics.js"></script>
  <style>
    html, body, .app-page { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; inset: 0; }
    :root {
      --bg: #0b0b0a; --panel: rgba(18,18,16,0.9); --border: rgba(212,165,116,0.12);
      --text: #e8d5c4; --muted: #8a7a6a; --accent: #d4a574; --accent2: #c9956b;
      --glow: rgba(212,165,116,0.15); --card-bg: rgba(18,18,16,0.9);
      --user-bubble: rgba(212,165,116,0.15); --ai-bubble: #121210;
    }
    [data-theme="midnight"] { --bg: #0a0a0a; --panel: rgba(13,13,13,0.95); --border: #1a1a1a; --text: #e0e0e0; --muted: #8e8e93; --accent: #a0a0d0; --accent2: #8888bb; --glow: rgba(150,150,200,0.1); --card-bg: #0d0d0d; --user-bubble: #1a1a2e; --ai-bubble: #141414; }
    [data-theme="glass"] { --bg: #0a0a0f; --panel: rgba(20,20,30,0.5); --border: rgba(255,255,255,0.06); --text: #e0e0e0; --muted: #999; --accent: #a0b0d0; --accent2: #8899cc; --glow: rgba(150,180,220,0.1); --card-bg: rgba(20,20,30,0.4); --user-bubble: rgba(60,60,100,0.4); --ai-bubble: rgba(30,30,40,0.5); }
    [data-theme="chrome"] { --bg: #1a1a1a; --panel: rgba(30,30,30,0.95); --border: #2a2a2a; --text: #e0e0e0; --muted: #999; --accent: #bbb; --accent2: #aaa; --glow: rgba(200,200,220,0.08); --card-bg: #1e1e1e; --user-bubble: #555; --ai-bubble: #2a2a2a; }
    [data-theme="white"] { --bg: #f5f5f7; --panel: rgba(255,255,255,0.95); --border: #e5e5e5; --text: #1a1a1a; --muted: #999; --accent: #0a84ff; --accent2: #0070e0; --glow: rgba(10,132,255,0.1); --card-bg: #fff; --user-bubble: #0a84ff; --ai-bubble: #ffffff; }
    .app-page { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; transition: background 0.5s ease, color 0.5s ease; }

    .loading-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.5s ease, visibility 0.5s ease; opacity: 1; visibility: visible; }
    .loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loading-ring { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; box-shadow: 0 0 40px var(--glow); animation: ringPulse 2s ease-in-out infinite; }
    .loading-ring img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    @keyframes ringPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .loading-icon { width: 48px; height: 48px; filter: drop-shadow(0 0 12px var(--glow)); }
    .loading-icon img { width: 100%; height: 100%; object-fit: contain; }
    .loading-text { font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(135deg, var(--accent2), var(--accent)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: goldShimmer 2s ease-in-out infinite; }
    @keyframes goldShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    #app { display: flex; height: 100%; width: 100%; position: relative; z-index: 1; }
    .sidebar { position: fixed; left: -320px; top: 0; bottom: 0; width: 300px; z-index: 100; transition: left 0.35s cubic-bezier(0.25,0.8,0.25,1.2); display: flex; flex-direction: column; padding: 16px; overflow-y: auto; background: var(--panel); border-right: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .sidebar.open { left: 0; }
    .sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .sidebar-avatar img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .sidebar-title { font-size: 22px; font-weight: 700; }
    .sidebar-close { margin-left: auto; background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; color: var(--muted); }
    .sidebar-actions-row { display: flex; gap: 8px; padding: 0 0 12px 0; }
    .sidebar-new-chat { width: 36px; height: 36px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: var(--bg); }
    .sidebar-fold { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--card-bg); color: var(--muted); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .sidebar-search { margin-bottom: 12px; }
    .sidebar-search-input { width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 13px; font-family: inherit; }
    .sidebar-chats { flex: 1; overflow-y: auto; }
    .chat-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; cursor: pointer; margin-bottom: 2px; }
    .chat-item:hover, .chat-item.active { background: var(--card-bg); }
    .chat-item-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-item-avatar img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .chat-item-info { flex: 1; min-width: 0; }
    .chat-item-name { font-size: 14px; font-weight: 500; }
    .chat-item-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }
    .sidebar-footer { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 8px; }
    .sidebar-profile { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 12px; cursor: pointer; }
    .sidebar-profile:hover { background: var(--card-bg); }
    .sidebar-profile-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .sidebar-profile-avatar img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .sidebar-profile-name { font-size: 14px; font-weight: 500; }
    .sidebar-profile-status { font-size: 11px; color: var(--muted); }
    .mini-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 52px; z-index: 101; display: none; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; background: var(--panel); border-right: 1px solid var(--border); }
    .mini-sidebar.visible { display: flex; }
    .mini-sidebar-expand, .mini-new-chat, .mini-settings { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--card-bg); color: var(--muted); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .mini-new-chat { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: var(--bg); border: none; font-size: 18px; }
    .mini-avatars { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; padding: 4px 0; }
    .mini-chat-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--card-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; flex-shrink: 0; }
    .mini-chat-avatar img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .mini-sidebar.visible ~ .main { margin-left: 52px; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
    .overlay.visible { display: block; }

    .main { flex: 1; display: flex; flex-direction: column; max-width: 680px; margin: 0 auto; width: 100%; height: 100%; min-height: 0; }
    .topbar { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .topbar-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; padding: 4px; display: flex; align-items: center; gap: 4px; }
    .topbar-back { font-size: 28px; line-height: 1; }
    .topbar-logo-sm { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; box-shadow: 0 0 12px var(--glow); flex-shrink: 0; }
    .topbar-logo-sm img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .topbar-center { flex: 1; cursor: pointer; min-width: 0; }
    .topbar-name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; background: linear-gradient(135deg, var(--accent2), var(--accent)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: goldShimmer 3s ease-in-out infinite; }
    .topbar-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #30d158; }
    .status-dot.thinking { background: #ff9f0a; animation: dotPulse 1s infinite; }
    .status-dot.offline { background: #ff453a; }
    @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    .messages::-webkit-scrollbar { display: none; }
    .bubble-row { display: flex; flex-direction: column; max-width: 82%; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from{opacity:0;transform:scale(0.9) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .bubble-row.user { align-self: flex-end; align-items: flex-end; }
    .bubble-row.ai { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
    .bubble-row.user .bubble { background: var(--user-bubble); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
    .bubble-row.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .timestamp { font-size: 10px; color: var(--muted); margin: 3px 8px; opacity: 0; transition: opacity 0.2s; }
    .bubble-row:hover .timestamp { opacity: 1; }
    .provider-badge { font-size: 9px; color: var(--muted); margin: 2px 8px; opacity: 0.6; }
    .typing-cursor { display: inline-block; animation: blink 0.7s infinite; color: var(--accent); font-weight: 200; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .typing-indicator { display: none; align-self: flex-start; padding: 12px 16px; gap: 5px; }
    .typing-indicator.visible { display: flex; }
    .typing-dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .code-actions { display: flex; gap: 6px; margin-top: 8px; }
    .code-action-btn { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .code-action-btn:hover { border-color: var(--accent); }
    .code-action-btn.accept { border-color: rgba(48,209,88,0.3); color: #30d158; }
    .code-action-btn.accept:hover { border-color: #30d158; background: rgba(48,209,88,0.1); }
    .code-action-btn.reject { border-color: rgba(255,69,58,0.3); color: #ff453a; }
    .code-action-btn.reject:hover { border-color: #ff453a; background: rgba(255,69,58,0.1); }
    .code-action-btn.preview { border-color: rgba(10,132,255,0.3); color: #0a84ff; }
    .code-action-btn svg { width: 12px; height: 12px; }

    .quick-commands { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0; align-self: center; flex-shrink: 0; }
    .quick-cmd { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .quick-cmd:hover { border-color: var(--accent); color: var(--text); }

    .inputbar { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .input-wrap { flex: 1; border-radius: 24px; display: flex; align-items: center; padding: 0 14px; min-height: 38px; border: 1px solid var(--border); background: var(--card-bg); transition: border-color 0.3s ease, box-shadow 0.3s ease; }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    #userInput { background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; font-family: inherit; width: 100%; resize: none; max-height: 100px; padding: 9px 0; line-height: 1.4; }
    #userInput::placeholder { color: var(--muted); opacity: 0.5; }
    .input-pill { display: flex; align-items: center; gap: 5px; padding: 6px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; white-space: nowrap; }
    .input-pill:hover { border-color: var(--accent); }
    .input-pill svg { width: 13px; height: 13px; flex-shrink: 0; }
    .input-pill.workflow-pill { min-width: 70px; justify-content: center; }
    .input-pill.mode-pill { min-width: 32px; justify-content: center; }
    .input-btn { background: none; border: none; cursor: pointer; padding: 5px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
    .input-btn:hover { color: var(--text); }
    .input-btn svg { width: 18px; height: 18px; }
    .typing-speed-select { border-radius: 10px; padding: 4px 5px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--muted); font-family: inherit; max-width: 48px; text-align: center; -webkit-appearance: none; appearance: none; }
    .send-btn { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: linear-gradient(135deg, var(--accent2), var(--accent)); }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.4; }
    .send-btn svg { width: 15px; height: 15px; fill: var(--bg); }

    .file-preview { display: none; padding: 8px 14px; border-top: 1px solid var(--border); align-items: center; gap: 10px; background: var(--panel); flex-shrink: 0; }
    .file-preview.visible { display: flex; }
    .file-preview img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
    .file-preview-info { font-size: 12px; color: var(--muted); flex: 1; }
    .file-preview button { background: rgba(255,69,58,0.15); color: #ff453a; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; }

    .app-theme-pill { position: fixed; bottom: 90px; right: 12px; z-index: 150; display: flex; flex-direction: column; gap: 4px; padding: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 4px 24px rgba(0,0,0,0.4); opacity: 0.4; transition: opacity 0.3s; }
    .app-theme-pill:hover { opacity: 1; }
    .app-theme-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .app-theme-dot:hover { transform: scale(1.2); }
    .app-theme-dot.active { border-color: var(--accent); box-shadow: 0 0 8px var(--glow); }
    .app-theme-dot.gold { background: #0b0b0a; border-color: rgba(212,165,116,0.4); }
    .app-theme-dot.midnight { background: #0a0a0a; }
    .app-theme-dot.glass { background: rgba(20,20,30,0.8); backdrop-filter: blur(10px); }
    .app-theme-dot.chrome { background: #1a1a1a; }
    .app-theme-dot.white { background: #f5f5f7; }

    .code-block { border-radius: 10px; margin: 6px 0; overflow: hidden; border: 1px solid var(--border); border-left: 3px solid var(--accent); }
    .code-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; font-size: 10px; background: var(--card-bg); color: var(--muted); border-bottom: 1px solid var(--border); }
    .code-copy { border: none; padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; background: var(--panel); color: var(--muted); font-family: inherit; }
    .code-block pre { padding: 10px 14px; margin: 0; overflow-x: auto; font-size: 12px; line-height: 1.6; font-family: 'SF Mono','Fira Code',monospace; white-space: pre-wrap; word-break: break-word; }
    .inline-code { padding: 2px 5px; border-radius: 4px; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; background: var(--card-bg); }

    .app-toast { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--border); border-left: 3px solid var(--accent); color: var(--text); padding: 10px 18px; border-radius: 12px; font-size: 12px; z-index: 300; backdrop-filter: blur(20px); display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards; pointer-events: none; font-weight: 500; max-width: 380px; }
    .app-toast svg { width: 16px; height: 16px; flex-shrink: 0; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes toastOut { from{opacity:1;transform:translateX(-50%) translateY(0)} to{opacity:0;transform:translateX(-50%) translateY(-6px)} }

    .wwcd-btn { position: fixed; bottom: 130px; right: 16px; z-index: 200; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--panel); cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: all 0.2s; opacity: 0.5; }
    .wwcd-btn:hover { opacity: 1; border-color: var(--accent); box-shadow: 0 0 16px var(--glow); }
    .wwcd-btn svg { width: 16px; height: 16px; color: var(--accent); }

    @media (max-width: 480px) {
      .topbar { padding: 10px 12px; }
      .bubble { font-size: 13px; padding: 10px 14px; }
      .quick-cmd { font-size: 11px; padding: 6px 10px; }
      .app-theme-pill { bottom: 80px; right: 8px; }
      .input-pill { padding: 5px 8px; font-size: 10px; }
      .input-pill svg { width: 11px; height: 11px; }
      .typing-speed-select { max-width: 42px; font-size: 9px; }
      .wwcd-btn { bottom: 120px; right: 8px; }
    }
  </style>
</head>
<body class="app-page" data-theme="gold">
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-ring"><img src="chrome.gif" alt="Loading"></div>
    <div class="loading-icon"><img src="icon.png" alt="Chrxmaticc"></div>
    <div class="loading-text">Chrxmaticc Copilot</div>
  </div>

  <div id="app">
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header"><div class="sidebar-avatar" id="sidebarAvatar"><img src="icon.png" alt="Avatar"></div><div class="sidebar-title">Chats</div><button class="sidebar-close" onclick="toggleSidebar()">&times;</button></div>
      <div class="sidebar-actions-row"><button class="sidebar-new-chat" onclick="newChat()">+</button><button class="sidebar-fold" onclick="foldSidebar()">&lt;</button></div>
      <div class="sidebar-search"><input type="text" placeholder="Search chats..." class="sidebar-search-input" id="chatSearch" oninput="filterChats()"></div>
      <div class="sidebar-chats" id="savedChatsList"></div>
      <div class="sidebar-footer"><div class="sidebar-profile" onclick="location.href='settings.html'"><div class="sidebar-profile-avatar" id="profileAvatar"><img src="icon.png" alt="Profile"></div><div class="sidebar-profile-info"><div class="sidebar-profile-name" id="profileName">Guest</div><div class="sidebar-profile-status">Settings</div></div></div></div>
    </div>
    <div id="miniSidebar" class="mini-sidebar">
      <button class="mini-sidebar-expand" onclick="unfoldSidebar()">&gt;</button>
      <button class="mini-new-chat" onclick="newChat()">+</button>
      <div class="mini-avatars" id="miniAvatars"></div>
      <button class="mini-settings" onclick="location.href='settings.html'">&#9881;</button>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="main" class="main">
      <div class="topbar">
        <button class="topbar-btn" onclick="toggleSidebar()"><span class="topbar-back">&lsaquo;</span><span class="topbar-logo-sm"><img src="chrome.gif" alt="Chrxmaticc"></span></button>
        <div class="topbar-center" ondblclick="doubleTapTopbar()"><div class="topbar-name">Chrxmaticc Copilot</div><div class="topbar-status"><span id="statusDot" class="status-dot"></span><span id="statusText">Online</span></div></div>
        <button class="input-btn" id="searchToggle" onclick="toggleChatSearch()" title="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="input-btn" id="ttsBtn" onclick="toggleTTS()" title="Text to Speech">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="ttsIcon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
        </button>
      </div>

      <div class="messages" id="messages">
        <div class="bubble-row ai"><div class="bubble">Yo! I'm Chrxmaticc Copilot. Offbrand. Hyper-intelligent. No subscription.<br><br>Type /help to see what I can do. Try /image for AI art, or attach files.</div><div class="timestamp">Now</div></div>
        <div class="quick-commands">
          <button class="quick-cmd" onclick="quickSend('/image a chrome demon')">Image</button>
          <button class="quick-cmd" onclick="quickSend('Write a function to reverse a string')">Code</button>
          <button class="quick-cmd" onclick="quickSend('/roll 2d20')">Roll</button>
          <button class="quick-cmd" onclick="quickSend('/joke')">Joke</button>
          <button class="quick-cmd" onclick="quickSend('/help')">Help</button>
        </div>
        <div class="typing-indicator" id="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
      </div>

      <div class="file-preview" id="filePreview"><img id="filePreviewImg" src="" style="display:none" alt="Preview"><span class="file-preview-info" id="filePreviewInfo"></span><button onclick="clearFile()">&times;</button></div>

      <div class="inputbar">
        <button class="input-btn" id="micBtn" onclick="toggleMic()" title="Voice Input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>

        <button class="input-pill workflow-pill" id="workflowPill" onclick="cycleWorkflow()" title="Cycle Workflow">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H7a4 4 0 00-4 4v2.5a1.5 1.5 0 001.5 1.5h0A1.5 1.5 0 006 12.5V14a4 4 0 004 4h1"/><path d="M16 21h1a4 4 0 004-4v-2.5a1.5 1.5 0 00-1.5-1.5h0a1.5 1.5 0 01-1.5-1.5V10a4 4 0 00-4-4h-1"/></svg>
          <span id="workflowLabel">Code</span>
        </button>

        <button class="input-pill mode-pill" id="modePill" onclick="toggleModePopover()" title="Mode Settings">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="14" y2="6"/><circle cx="17" cy="6" r="2"/><line x1="4" y1="12" x2="8" y2="12"/><circle cx="12" cy="12" r="2"/><line x1="4" y1="18" x2="16" y2="18"/><circle cx="19" cy="18" r="2"/></svg>
        </button>

        <div class="input-wrap"><textarea id="userInput" rows="1" placeholder="Message"></textarea></div>

        <select id="typingSpeedSelect" class="typing-speed-select" onchange="changeTypingSpeed(this.value)">
          <option value="0">Off</option><option value="10" selected>1x</option><option value="20">2x</option><option value="30">3x</option><option value="40">4x</option><option value="50">5x</option>
        </select>

        <button class="input-btn" id="attachBtn" onclick="triggerFileUpload()" title="Attach File">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="fileInput" style="display:none" accept="image/*,.js,.json,.html,.css,.md,.txt,.py,.glsl,.yml,.yaml,.xml,.svg" onchange="handleFileUpload(event)">

        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="app-theme-pill" id="appThemePill">
    <div class="app-theme-dot gold active" data-theme="gold" title="Gold"></div>
    <div class="app-theme-dot midnight" data-theme="midnight" title="Midnight"></div>
    <div class="app-theme-dot glass" data-theme="glass" title="Glass"></div>
    <div class="app-theme-dot chrome" data-theme="chrome" title="Chrome"></div>
    <div class="app-theme-dot white" data-theme="white" title="Light"></div>
  </div>

  <button class="wwcd-btn" id="wwcdBtn" onclick="whatWouldChrxmaticcDo()" title="What Would Chrxmaticc Do?">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0l2.5 7.5L22 3l-4 7.5L24 12l-8 1.5L18 21l-3-6.5L10 22l1-8.5L2 15l5-5.5L0 6l8-3L12 0z"/></svg>
  </button>

  <canvas id="confettiCanvas" style="position:fixed;inset:0;z-index:999;pointer-events:none;display:none;"></canvas>
  <script src="app.js"></script>
</body>
</html>
