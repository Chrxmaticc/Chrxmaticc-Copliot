<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0a">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="/manifest.json">
<title>Chrxmaticc Copilot</title>
<link rel="stylesheet" href="style.css">
<script defer src="analytics.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;inset:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;transition:background .5s,color .5s}

/* ── THEME VARS ── */
:root{
  --a:#d4a574;--a2:#c9956b;--glow:rgba(212,165,116,.22);
  --bg:#0b0b0a;--surf:rgba(20,18,14,.9);--brd:rgba(212,165,116,.14);
  --txt:#e8d5c4;--mut:#7a6a5a;
}
body.theme-midnight{--a:#9090d8;--a2:#6060b0;--glow:rgba(130,130,220,.2);--bg:#08080f;--surf:rgba(12,12,22,.92);--brd:rgba(100,100,180,.15);--txt:#e0e0f0;--mut:#6060a0}
body.theme-glass{--a:#a0b8e8;--a2:#8090c8;--glow:rgba(140,170,230,.18);--bg:#080810;--surf:rgba(22,24,42,.5);--brd:rgba(255,255,255,.09);--txt:#e8e8f4;--mut:#7878a0}
body.theme-chrome{--a:#cccccc;--a2:#999;--glow:rgba(200,200,200,.15);--bg:#141414;--surf:rgba(28,28,28,.96);--brd:rgba(80,80,80,.35);--txt:#e0e0e0;--mut:#666}
body.theme-white{--a:#0a84ff;--a2:#0055cc;--glow:rgba(10,132,255,.14);--bg:#f0f2f5;--surf:rgba(255,255,255,.97);--brd:rgba(0,0,0,.1);--txt:#1a1a1a;--mut:#999}
body.theme-chromatic{--a:#d4a574;--a2:#4a7fc0;--glow:rgba(150,130,200,.2);--bg:#0d0e14;--surf:rgba(20,20,28,.9);--brd:rgba(140,130,180,.16);--txt:#e8d5c4;--mut:#8a8a9a}
body.theme-liquid{--a:#bbb;--a2:#888;--glow:rgba(180,180,200,.18);--bg:#111114;--surf:rgba(24,24,28,.95);--brd:rgba(140,140,150,.2);--txt:#d4d4d8;--mut:#777}
body.theme-rainbow{--a:#ff9ff3;--a2:#ff6b6b;--glow:rgba(255,150,200,.18);--bg:#0e0e18;--surf:rgba(18,18,28,.95);--brd:rgba(255,255,255,.08);--txt:#f0f0f8;--mut:#888}

/* ── LANDING ── */
.land{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;transition:opacity .5s,transform .5s,visibility .5s}
.land.hidden{opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-18px)}
.land-inner{display:flex;flex-direction:column;align-items:center;width:100%;max-width:660px;padding:0 24px}

/* mesh */
.mesh-wrap{position:relative;width:148px;height:148px;margin-bottom:20px;cursor:grab;touch-action:none;user-select:none}
.mesh-wrap:active{cursor:grabbing}
.mesh-wrap canvas{width:148px!important;height:148px!important;border-radius:50%;display:block}
.mesh-glow{position:absolute;inset:-22px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,var(--glow) 0%,transparent 70%);animation:mglow 3s ease-in-out infinite}
@keyframes mglow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* greeting */
.greet{font-size:clamp(20px,4vw,30px);font-weight:700;letter-spacing:-.5px;text-align:center;margin-bottom:7px;background:linear-gradient(135deg,var(--a2),var(--a),var(--a2));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.greet-sub{font-size:13px;color:var(--mut);text-align:center;margin-bottom:26px;opacity:.8}

/* landing box */
.lbox{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:4px 4px 4px 14px;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);box-shadow:0 8px 40px rgba(0,0,0,.4);transition:border-color .3s,box-shadow .3s,transform .2s}
.lbox:focus-within{border-color:var(--a);box-shadow:0 8px 48px rgba(0,0,0,.5),0 0 0 3px var(--glow);transform:translateY(-2px)}
.ltextarea{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:15px;font-family:inherit;resize:none;max-height:130px;min-height:46px;width:100%;padding:11px 8px 6px 0;line-height:1.5}
.ltextarea::placeholder{color:var(--mut);opacity:.55}
.lbox-bottom{display:flex;align-items:center;justify-content:space-between;padding:5px 2px 2px}
.lbox-left{display:flex;align-items:center;gap:8px}
.lbox-right{display:flex;align-items:center;gap:8px}
.lmodel-badge{font-size:11px;color:var(--mut);background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:8px;padding:4px 9px;white-space:nowrap}
.lsend{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--a2),var(--a));transition:transform .2s,box-shadow .2s,opacity .2s;position:relative;overflow:hidden}
.lsend:hover{transform:scale(1.08);box-shadow:0 0 28px var(--glow)}
.lsend:active{transform:scale(.94)}
.lsend:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.lsend svg{width:16px;height:16px;fill:var(--bg)}
.lattach{background:none;border:none;cursor:pointer;padding:6px;color:var(--mut);border-radius:8px;display:flex;align-items:center;transition:color .2s,background .2s}
.lattach:hover{color:var(--a);background:var(--glow)}

/* landing effort */
.l-effort-wrap{display:flex;align-items:center;gap:7px}
.effort-track{position:relative;width:100px;height:5px;background:rgba(255,255,255,.08);border-radius:4px;cursor:pointer}
.effort-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a2),var(--a));pointer-events:none}
.effort-thumb{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:var(--a);border:2px solid var(--bg);transform:translateY(-50%);box-shadow:0 0 8px var(--glow);cursor:grab}
.effort-thumb:active{cursor:grabbing}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%;padding:20px 0 0}
.chip{background:rgba(255,255,255,.04);border:1px solid var(--brd);color:var(--mut);padding:8px 16px;border-radius:22px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .22s;white-space:nowrap;backdrop-filter:blur(12px)}
.chip:hover{border-color:var(--a);background:var(--glow);color:var(--txt);transform:translateY(-2px)}

/* landing themes */
.lthemes{display:flex;gap:9px;justify-content:center;padding:20px 0 0;flex-wrap:wrap}
.ldot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .22s;position:relative}
.ldot:hover{transform:scale(1.2)}
.ldot.active{border-color:var(--a);box-shadow:0 0 12px var(--glow);transform:scale(1.1)}
.ldot::after{content:attr(data-label);position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--mut);opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.ldot:hover::after{opacity:1}

/* ultracode flare */
.uc-flare{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;background:radial-gradient(ellipse at 50% 110%,var(--glow) 0%,transparent 60%);transition:opacity .4s}
.uc-flare.on{opacity:1;animation:ucf 2s ease-in-out infinite}
@keyframes ucf{0%,100%{opacity:.6}50%{opacity:1}}

/* ── PHASE OVERLAY ── */
.phase-ov{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.phase-ov.on{display:flex}
.phase-card{background:var(--surf);border:1px solid var(--brd);border-radius:22px;padding:36px 44px;text-align:center;max-width:400px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,.55);animation:pcardIn .45s cubic-bezier(.22,1,.36,1)}
@keyframes pcardIn{from{opacity:0;transform:scale(.9) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.phase-icon{font-size:36px;margin-bottom:10px;animation:ipulse 2s ease-in-out infinite}
@keyframes ipulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.phase-title{font-size:19px;font-weight:700;color:var(--a);margin-bottom:8px}
.phase-sub{font-size:13px;color:var(--mut);line-height:1.6;min-height:34px;transition:opacity .3s}
.phase-bar{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:18px;overflow:hidden}
.phase-fill{height:100%;border-radius:2px;width:0%;background:linear-gradient(90deg,var(--a2),var(--a),var(--a2));background-size:200%;transition:width .45s;animation:bshim 2s linear infinite}
@keyframes bshim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── CHAT WRAP ── */
.chat-wrap{position:fixed;inset:0;z-index:5;display:none;opacity:0}
.chat-wrap.on{display:flex;opacity:1;animation:chatReveal .55s cubic-bezier(.22,1,.36,1) forwards}
@keyframes chatReveal{from{opacity:0;filter:blur(6px)}to{opacity:1;filter:blur(0)}}
#app{display:flex;height:100%;width:100%;position:relative}

/* ── SIDEBAR ── */
.sidebar{position:fixed;left:-290px;top:0;bottom:0;width:272px;z-index:100;transition:left .3s cubic-bezier(.25,.8,.25,1.2);display:flex;flex-direction:column;padding:16px;overflow-y:auto;background:var(--surf);border-right:1px solid var(--brd);backdrop-filter:blur(28px)}
.sidebar.open{left:0}
.sidebar-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sidebar-hdr img{width:28px;height:28px;border-radius:50%;object-fit:cover}
.sidebar-htitle{font-size:17px;font-weight:700;flex:1;color:var(--txt)}
.sidebar-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--mut);margin-left:auto}
.sidebar-new{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:11px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);font-size:13px;cursor:pointer;margin-bottom:12px;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.sidebar-new:hover{border-color:var(--a);box-shadow:0 0 14px var(--glow)}
.sidebar-new svg{stroke:var(--a)}
.sidebar-chats{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:10px;cursor:pointer;margin-bottom:2px;color:var(--txt);font-size:13px;transition:background .15s}
.chat-item:hover,.chat-item.active{background:var(--glow)}
.chat-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.sidebar-footer{border-top:1px solid var(--brd);padding-top:12px;margin-top:8px}
.sidebar-profile{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--txt);transition:background .15s}
.sidebar-profile:hover{background:var(--glow)}
.sidebar-profile img{width:28px;height:28px;border-radius:50%;object-fit:cover}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(3px)}
.overlay.on{display:block}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;max-width:720px;margin:0 auto;width:100%;position:relative}

/* ── TOPBAR ── */
.topbar{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--surf);backdrop-filter:blur(24px);position:sticky;top:0;z-index:10}
.topbar-back{background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--a);font-size:22px;line-height:1;display:flex;align-items:center;gap:5px}
.topbar-logo{width:26px;height:26px;border-radius:50%;object-fit:cover}
.topbar-center{flex:1;min-width:0;cursor:pointer}
.topbar-name{font-size:15px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--a2),var(--a),var(--a2));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite}
.topbar-status{font-size:10px;display:flex;align-items:center;gap:4px;color:var(--mut);margin-top:1px}
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sdot.online{background:#30d158;box-shadow:0 0 5px rgba(48,209,88,.5);animation:dp 2.5s ease-in-out infinite}
.sdot.thinking{background:var(--a);animation:dp 1s ease-in-out infinite}
.sdot.offline{background:#ff453a}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-util{display:flex;align-items:center;gap:4px}
.tutil-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--mut);border-radius:8px;display:flex;align-items:center;justify-content:center;transition:color .2s,background .2s}
.tutil-btn:hover{color:var(--a);background:var(--glow)}
.tutil-btn svg{width:16px;height:16px}
/* TTS active waveform */
.tts-wave{display:none;align-items:flex-end;gap:2px;height:14px}
.tts-wave.on{display:flex}
.tts-bar{width:3px;border-radius:2px;background:var(--a);animation:wave 1s ease-in-out infinite}
.tts-bar:nth-child(1){height:4px;animation-delay:0s}
.tts-bar:nth-child(2){height:10px;animation-delay:.1s}
.tts-bar:nth-child(3){height:7px;animation-delay:.2s}
.tts-bar:nth-child(4){height:12px;animation-delay:.15s}
.tts-bar:nth-child(5){height:5px;animation-delay:.05s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
.tts-speed{background:var(--surf);border:1px solid var(--brd);color:var(--mut);font-size:11px;border-radius:7px;padding:4px 6px;font-family:inherit;cursor:pointer;outline:none}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;min-height:0}
.messages::-webkit-scrollbar{display:none}
.bubble-row{display:flex;flex-direction:column;max-width:82%;animation:bpop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes bpop{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bubble-row.user{align-self:flex-end;align-items:flex-end}
.bubble-row.ai{align-self:flex-start;align-items:flex-start}
.bubble{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.bubble-row.user .bubble{border-bottom-right-radius:4px}
.bubble-row.ai .bubble{border-bottom-left-radius:4px}
/* bubble theme */
body.theme-gold .bubble-row.ai .bubble{background:linear-gradient(145deg,#141210,#111009);border:1px solid rgba(212,165,116,.1)}
body.theme-gold .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(212,165,116,.18),rgba(201,149,107,.12));border:1px solid rgba(212,165,116,.25)}
body.theme-midnight .bubble-row.ai .bubble{background:linear-gradient(145deg,#111120,#0e0e1c);border:1px solid rgba(100,100,180,.14)}
body.theme-midnight .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(80,60,180,.25),rgba(60,40,160,.18));border:1px solid rgba(120,100,200,.3)}
body.theme-glass .bubble-row.ai .bubble{background:rgba(28,30,50,.45);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
body.theme-glass .bubble-row.user .bubble{background:rgba(70,80,140,.35);backdrop-filter:blur(20px);border:1px solid rgba(160,180,240,.2)}
body.theme-chrome .bubble-row.ai .bubble{background:#202020;border:1px solid #2e2e2e}
body.theme-chrome .bubble-row.user .bubble{background:#3a3a3a;border:1px solid #484848}
body.theme-white .bubble-row.ai .bubble{background:#fff;border:1px solid #e8ebf0;box-shadow:0 2px 12px rgba(0,0,0,.06)}
body.theme-white .bubble-row.user .bubble{background:linear-gradient(145deg,#0a84ff,#0077ed);color:#fff}
body.theme-chromatic .bubble-row.ai .bubble{background:linear-gradient(145deg,#16161e,#131320);border:1px solid rgba(100,120,180,.14)}
body.theme-chromatic .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(212,165,116,.13),rgba(74,127,192,.08));border:1px solid rgba(150,130,200,.2)}
body.theme-liquid .bubble-row.ai .bubble{background:#1e1e22;border:1px solid rgba(140,140,150,.15)}
body.theme-liquid .bubble-row.user .bubble{background:linear-gradient(135deg,#2e2e34,#3a3a40);border:1px solid rgba(180,180,195,.15)}
body.theme-rainbow .bubble-row.ai .bubble{background:#171722;border:1px solid rgba(255,255,255,.08)}
body.theme-rainbow .bubble-row.user .bubble{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14)}
.ts{font-size:10px;margin:3px 8px;opacity:0;transition:opacity .2s;color:var(--mut)}
.bubble-row:hover .ts{opacity:1}
.pbadge{font-size:9px;margin:2px 8px;opacity:.45;font-style:italic;color:var(--mut)}

/* thinking block */
.think-block{align-self:flex-start;max-width:82%;background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:4px;animation:bpop .3s cubic-bezier(.34,1.56,.64,1)}
.think-hdr{display:flex;align-items:center;gap:7px;padding:9px 13px;cursor:pointer;user-select:none}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--mut);animation:bounce 1.2s infinite}
.tdot.d2{animation-delay:.2s}.tdot.d3{animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.tlabel{font-size:11px;color:var(--mut);font-style:italic;flex:1}
.tchev{width:12px;height:12px;color:var(--mut);transition:transform .25s;flex-shrink:0}
.think-block.open .tchev{transform:rotate(180deg)}
.think-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.22,1,.36,1)}
.think-block.open .think-body{max-height:400px}
.think-text{padding:10px 13px 12px;font-size:12px;color:var(--mut);line-height:1.6;white-space:pre-wrap;border-top:1px solid var(--brd)}

/* plan block */
.plan-block{align-self:flex-start;width:min(560px,94%);background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:16px;padding:18px 18px 14px;margin:4px 0;animation:bpop .3s cubic-bezier(.34,1.56,.64,1)}
.plan-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.plan-prog-track{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px}
.plan-prog-fill{height:100%;border-radius:2px;background:var(--a);transition:width .4s}
.plan-qcount{font-size:10px;color:var(--mut);white-space:nowrap}
.plan-q{font-size:14px;font-weight:600;color:var(--a);line-height:1.45;margin-bottom:14px}
.plan-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.plan-opt{background:rgba(255,255,255,.04);border:1px solid var(--brd);color:var(--txt);padding:12px 14px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
.plan-opt:hover{border-color:var(--a);background:var(--glow);transform:translateY(-1px)}
.plan-opt.custom{grid-column:1/-1;border-style:dashed;color:var(--mut);background:transparent}
.plan-custom-row{grid-column:1/-1;display:none;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--a)}
.plan-custom-row.on{display:flex}
.plan-custom-inp{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:13px;font-family:inherit}
.plan-custom-inp::placeholder{color:var(--mut);opacity:.6}
.plan-custom-send{background:var(--a);border:none;border-radius:8px;color:var(--bg);font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;font-family:inherit}

/* typing */
.typing-ind{display:none;align-self:flex-start;padding:12px 16px;gap:5px}
.typing-ind.on{display:flex}
.tdot2{width:7px;height:7px;border-radius:50%;background:var(--mut);animation:bounce 1.2s infinite}
.tdot2:nth-child(2){animation-delay:.2s}.tdot2:nth-child(3){animation-delay:.4s}
.typing-cur{display:inline-block;animation:blink .7s infinite;color:var(--a)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* code blocks */
.code-block{margin:6px 0;overflow:hidden;background:rgba(0,0,0,.2);border:1px solid var(--brd);border-left:3px solid var(--a);border-radius:10px}
.code-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;font-size:10px;color:var(--mut)}
.code-copy{border:none;padding:3px 9px;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;background:var(--surf);color:var(--mut);transition:color .2s}
.code-copy:hover{color:var(--a)}
.code-block pre{padding:10px 14px;margin:0;overflow-x:auto;font-size:12px;line-height:1.6;font-family:'SF Mono','Fira Code',monospace;white-space:pre-wrap;word-break:break-word;color:var(--txt)}
.inline-code{padding:2px 5px;border-radius:4px;font-family:'SF Mono','Fira Code',monospace;font-size:11px;background:rgba(255,255,255,.07);color:var(--a)}
.code-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.caction{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:1px solid var(--brd);font-size:11px;cursor:pointer;font-family:inherit;background:var(--surf);color:var(--txt);transition:all .15s}
.caction:hover{border-color:var(--a);box-shadow:0 0 10px var(--glow)}
.caction svg{width:12px;height:12px}
.caction.accept{border-color:rgba(48,209,88,.3);color:#30d158}
.caction.reject{border-color:rgba(255,69,58,.3);color:#ff453a}
.caction.preview{border-color:rgba(10,132,255,.3);color:#0a84ff}
.caction.commit{border-color:rgba(212,165,116,.3);color:var(--a);background:var(--glow)}

/* preview panel */
.preview-panel{display:none;position:absolute;right:0;top:0;bottom:0;width:48%;z-index:50;flex-direction:column;background:#fff}
.preview-panel.on{display:flex}
.preview-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #e5e5ea;font-size:12px;color:#666;background:#f5f5f7}
.preview-close{background:none;border:none;cursor:pointer;color:#888;font-size:16px;padding:2px 6px}
.preview-iframe{flex:1;border:none;width:100%}

/* file bar */
.file-bar{display:none;padding:8px 14px;border-top:1px solid var(--brd);align-items:center;gap:10px;background:var(--surf)}
.file-bar.on{display:flex}
.file-bar img{width:44px;height:44px;border-radius:8px;object-fit:cover}
.file-info{font-size:12px;color:var(--mut);flex:1}
.file-clear{background:none;border:none;cursor:pointer;color:var(--mut);font-size:18px;padding:2px 6px;transition:color .2s}
.file-clear:hover{color:#ff453a}

/* ═══════════════════════════════════════════
   INPUT BAR — restructured like image 2 style
   big box on top, toolbar row below
   ═══════════════════════════════════════════ */
.inputbar{padding:10px 12px 12px;border-top:1px solid var(--brd);display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:var(--surf);backdrop-filter:blur(24px)}

/* top: textarea + send inside box */
.input-box{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:16px;padding:4px 4px 4px 14px;transition:border-color .25s,box-shadow .25s}
.input-box:focus-within{border-color:var(--a);box-shadow:0 0 0 3px var(--glow)}
#userInput{background:transparent;border:none;outline:none;width:100%;color:var(--txt);font-size:14px;font-family:inherit;resize:none;max-height:100px;padding:10px 0;line-height:1.45;flex:1}
#userInput::placeholder{color:var(--mut);opacity:.55}
.send-btn{width:38px;height:38px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,var(--a2),var(--a));transition:transform .2s,box-shadow .2s;margin:3px}
.send-btn:hover{transform:scale(1.08);box-shadow:0 0 20px var(--glow)}
.send-btn:active{transform:scale(.92)}
.send-btn svg{width:15px;height:15px;fill:var(--bg)}

/* toolbar row */
.input-toolbar{display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none}
.input-toolbar::-webkit-scrollbar{display:none}

/* workflow pill */
.wf-pill{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .22s;white-space:nowrap;flex-shrink:0}
.wf-pill:hover{border-color:var(--a);background:var(--glow)}
.wf-pill.active{border-color:var(--a);background:var(--glow);animation:wfglow 2.5s ease-in-out infinite}
@keyframes wfglow{0%,100%{box-shadow:0 0 10px var(--glow)}50%{box-shadow:0 0 24px var(--glow),0 0 48px var(--glow)}}
.wf-pill svg{width:12px;height:12px;stroke:var(--a);flex-shrink:0}

/* settings btn */
.settings-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;border:1px solid var(--brd);background:var(--surf);cursor:pointer;color:var(--mut);transition:all .2s;flex-shrink:0}
.settings-btn:hover{color:var(--a);border-color:var(--a);background:var(--glow)}
.settings-btn svg{width:14px;height:14px}

/* mic */
.mic-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;border:1px solid var(--brd);background:var(--surf);cursor:pointer;color:var(--mut);transition:all .2s;flex-shrink:0}
.mic-btn:hover{color:var(--a);border-color:var(--a)}
.mic-btn.active svg{stroke:var(--a);animation:dp 1s ease-in-out infinite}
.mic-btn svg{width:15px;height:15px}

/* model pill (custom styled) */
.model-pill{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .22s;white-space:nowrap;flex-shrink:0}
.model-pill:hover{border-color:var(--a);background:var(--glow)}
.model-pill svg{width:10px;height:10px;stroke:var(--mut);flex-shrink:0}

/* github pill */
.gh-pill{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .22s;white-space:nowrap;flex-shrink:0}
.gh-pill:hover{border-color:var(--a);background:var(--glow)}
.gh-pill.connected{border-color:rgba(48,209,88,.4);color:#30d158}
.gh-pill svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}
.gh-dot{width:6px;height:6px;border-radius:50%;background:#30d158;box-shadow:0 0 6px rgba(48,209,88,.6);animation:dp 2s ease-in-out infinite;display:none}
.gh-pill.connected .gh-dot{display:block}

/* commit */
.commit-btn{display:none;align-items:center;gap:6px;padding:7px 13px;border-radius:20px;border:1px solid var(--brd);background:var(--glow);color:var(--a);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s;flex-shrink:0}
.commit-btn.on{display:flex}
.commit-btn:hover{border-color:var(--a);box-shadow:0 0 14px var(--glow)}
.commit-btn svg{width:13px;height:13px;fill:var(--a)}

/* spacer */
.tb-spacer{flex:1}

/* ═══════════════════════════════════════════
   POPOVERS — shared base
   ═══════════════════════════════════════════ */
.popover{position:fixed;z-index:500;background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:0;box-shadow:0 12px 48px rgba(0,0,0,.6);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);display:none;animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
.popover.on{display:block}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pop-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--brd)}
.pop-title{font-size:13px;font-weight:700;color:var(--txt)}
.pop-close{background:none;border:none;cursor:pointer;color:var(--mut);font-size:16px;padding:2px 5px;line-height:1}
.pop-close:hover{color:var(--txt)}
.pop-body{padding:12px 16px 16px;display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow-y:auto}
.pop-body::-webkit-scrollbar{display:none}
.pop-section-title{font-size:10px;font-weight:700;color:var(--mut);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}

/* ── SETTINGS POPOVER ── */
#settingsPop{width:340px}

/* workflow selector in settings */
.wf-options{display:flex;flex-direction:column;gap:4px}
.wf-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;border:1px solid transparent;cursor:pointer;transition:all .18s;background:none}
.wf-opt:hover{background:var(--glow);border-color:var(--brd)}
.wf-opt.active{background:var(--glow);border-color:var(--a)}
.wf-opt-icon{font-size:16px;flex-shrink:0}
.wf-opt-info{flex:1}
.wf-opt-name{font-size:13px;font-weight:600;color:var(--txt)}
.wf-opt-desc{font-size:11px;color:var(--mut);margin-top:1px}
.wf-opt-color{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* effort in settings */
.effort-full{display:flex;flex-direction:column;gap:8px}
.effort-labels-row{display:flex;justify-content:space-between}
.effort-labels-row span{font-size:10px;color:var(--mut);cursor:pointer;transition:color .2s}
.effort-labels-row span:hover,.effort-labels-row span.active{color:var(--a);font-weight:700}
.effort-track-full{position:relative;width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:4px;cursor:pointer}
.effort-fill-full{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a2),var(--a));pointer-events:none;transition:width .2s}
.effort-thumb-full{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;background:var(--a);border:2px solid var(--bg);transform:translateY(-50%);box-shadow:0 0 8px var(--glow);cursor:grab}
.effort-thumb-full:active{cursor:grabbing}
.effort-name-full{font-size:12px;font-weight:700;color:var(--a);text-align:center;letter-spacing:.3px}
.effort-name-full.uc{animation:shimmer 1.5s ease-in-out infinite}

/* button prompts chips */
.bp-chips{display:flex;flex-wrap:wrap;gap:6px}
.bp-chip{padding:6px 11px;border-radius:16px;border:1px solid var(--brd);background:rgba(255,255,255,.04);color:var(--mut);font-size:11px;cursor:pointer;font-family:inherit;transition:all .18s;user-select:none}
.bp-chip:hover{border-color:var(--a);color:var(--txt)}
.bp-chip.on{border-color:var(--a);background:var(--glow);color:var(--a)}

/* GitHub section in settings */
.gh-section{display:flex;flex-direction:column;gap:8px}
.gh-connect-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;border:1px solid var(--brd);background:rgba(255,255,255,.04);color:var(--txt);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;width:100%}
.gh-connect-btn:hover{border-color:var(--a);background:var(--glow)}
.gh-connect-btn svg{width:16px;height:16px;fill:var(--txt)}
.gh-connected-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.2)}
.gh-connected-row .dot{width:7px;height:7px;border-radius:50%;background:#30d158;box-shadow:0 0 6px rgba(48,209,88,.6)}
.gh-connected-name{font-size:12px;font-weight:600;color:#30d158;flex:1}
.gh-disconnect{background:none;border:none;cursor:pointer;color:var(--mut);font-size:11px;transition:color .2s}
.gh-disconnect:hover{color:#ff453a}
.gh-repo-search{background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:10px;padding:8px 11px;color:var(--txt);font-size:12px;font-family:inherit;outline:none;width:100%;transition:border-color .2s}
.gh-repo-search:focus{border-color:var(--a)}
.repo-list{display:flex;flex-direction:column;gap:3px;max-height:150px;overflow-y:auto}
.repo-list::-webkit-scrollbar{display:none}
.repo-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:12px;color:var(--txt);transition:background .15s;border:1px solid transparent}
.repo-item:hover{background:var(--glow);border-color:var(--brd)}
.repo-item.selected{background:var(--glow);border-color:var(--a);color:var(--a)}
.repo-item svg{width:13px;height:13px;fill:var(--mut);flex-shrink:0}

/* ── MODEL POPOVER ── */
#modelPop{width:300px}
.model-options{display:flex;flex-direction:column;gap:4px}
.model-opt{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:11px;border:1px solid transparent;cursor:pointer;transition:all .18s}
.model-opt:hover{background:var(--glow);border-color:var(--brd)}
.model-opt.active{background:var(--glow);border-color:var(--a)}
.model-opt-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.model-opt-info{flex:1}
.model-opt-name{font-size:13px;font-weight:600;color:var(--txt)}
.model-opt-desc{font-size:11px;color:var(--mut);margin-top:2px;line-height:1.4}

/* ── FLOATING ── */
.theme-pill{position:fixed;bottom:96px;right:12px;z-index:150;display:flex;flex-direction:column;gap:5px;padding:5px;border-radius:22px;border:1px solid var(--brd);background:var(--surf);backdrop-filter:blur(20px);box-shadow:0 4px 24px rgba(0,0,0,.4);opacity:.35;transition:opacity .3s}
.theme-pill:hover{opacity:1}
.tdot2{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .22s}
.tdot2:hover{transform:scale(1.18)}
.tdot2.active{border-color:var(--a);box-shadow:0 0 10px var(--glow)}
.wwcd-btn{position:fixed;bottom:96px;left:16px;z-index:150;width:36px;height:36px;border-radius:50%;border:1px solid var(--brd);background:var(--surf);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);opacity:.45;transition:opacity .2s,box-shadow .2s}
.wwcd-btn:hover{opacity:1;box-shadow:0 0 16px var(--glow)}
.wwcd-btn svg{width:15px;height:15px}
.app-toast{position:fixed;bottom:136px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:12px;font-size:12px;z-index:300;backdrop-filter:blur(20px);display:flex;align-items:center;gap:10px;animation:toastIn .3s ease,toastOut .3s ease 2.5s forwards;pointer-events:none;font-weight:500;max-width:360px;border:1px solid var(--brd);border-left:3px solid var(--a);background:var(--surf);color:var(--txt)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-6px)}}
.confetti-cv{position:fixed;inset:0;pointer-events:none;z-index:500;display:none}

@media(max-width:520px){
  .greet{font-size:20px}
  .land-inner{padding:0 14px}
  .chips{gap:6px;padding:14px 0 0}
  .chip{font-size:11px;padding:7px 13px}
  .mesh-wrap,.mesh-wrap canvas{width:120px!important;height:120px!important}
  #settingsPop{width:calc(100vw - 24px)}
  #modelPop{width:calc(100vw - 24px)}
  .plan-opts{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>

/* ═══ 3D MESH ═══ */
var _mesh,_meshRenderer,_meshScene,_meshCam;
var MESH_COLS={gold:0xd4a574,midnight:0x9090d8,glass:0xa0b8e8,chrome:0xcccccc,white:0x0a84ff,chromatic:0xd4a574,liquid:0xbbbbbb,rainbow:0xff9ff3};
function initMesh(){
  var canvas=document.getElementById('meshCanvas');
  var wrap=document.getElementById('meshWrap');
  if(!canvas||!wrap||typeof THREE==='undefined')return;
  var S=148;
  _meshScene=new THREE.Scene();
  _meshCam=new THREE.PerspectiveCamera(40,1,.1,100);
  _meshCam.position.z=3.5;
  _meshRenderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
  _meshRenderer.setSize(S,S);
  _meshRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  _meshRenderer.setClearColor(0,0);
  var geo=new THREE.IcosahedronGeometry(1.1,3);
  var edges=new THREE.EdgesGeometry(geo);
  var mat=new THREE.LineBasicMaterial({color:MESH_COLS[_theme]||0xd4a574,transparent:true,opacity:.6});
  _mesh=new THREE.LineSegments(edges,mat);
  _meshScene.add(_mesh);
  var coreMat=new THREE.MeshBasicMaterial({color:MESH_COLS[_theme]||0xd4a574,transparent:true,opacity:.05});
  var core=new THREE.Mesh(geo,coreMat);
  _meshScene.add(core);
  (function anim(){requestAnimationFrame(anim);_mesh.rotation.y+=.004;_mesh.rotation.x+=.0012;core.rotation.y=_mesh.rotation.y;core.rotation.x=_mesh.rotation.x;_meshRenderer.render(_meshScene,_meshCam)})();
  var drag=false,px=0,py=0;
  function ds(x,y){drag=true;px=x;py=y;wrap.style.cursor='grabbing'}
  function dm(x,y){if(!drag||!_mesh)return;_mesh.rotation.y+=(x-px)*.009;_mesh.rotation.x+=(y-py)*.009;px=x;py=y}
  function de(){drag=false;wrap.style.cursor='grab'}
  wrap.addEventListener('mousedown',function(e){e.preventDefault();ds(e.clientX,e.clientY)});
  window.addEventListener('mousemove',function(e){dm(e.clientX,e.clientY)});
  window.addEventListener('mouseup',de);
  wrap.addEventListener('touchstart',function(e){if(e.touches.length===1){e.preventDefault();ds(e.touches[0].clientX,e.touches[0].clientY)}},{passive:false});
  wrap.addEventListener('touchmove',function(e){if(e.touches.length===1){e.preventDefault();dm(e.touches[0].clientX,e.touches[0].clientY)}},{passive:false});
  wrap.addEventListener('touchend',de);
}
function updateMeshColor(t){
  if(!_mesh)return;
  _mesh.material.color.setHex(MESH_COLS[t]||0xd4a574);
  _meshScene.children.forEach(function(c){if(c.isMesh&&c.material)c.material.color.setHex(MESH_COLS[t]||0xd4a574)});
}

/* ═══ EFFORT ═══ */
var EFFORT_STEPS=['low','medium','high','extreme'];
var _effortIdx=1;
function buildEffortSlider(trackId,fillId,thumbId){
  var track=document.getElementById(trackId),fill=document.getElementById(fillId),thumb=document.getElementById(thumbId);
  if(!track)return;
  var dragging=false;
  function setStep(i){
    i=Math.max(0,Math.min(3,i));
    _effortIdx=i;
    var p=(i/3)*100;
    if(fill)fill.style.width=p+'%';
    if(thumb)thumb.style.left='calc('+p+'% - '+(trackId==='effortTrackFull'?8:7)+'px)';
    _effort=EFFORT_STEPS[i];
    var nameEl=document.getElementById('effortNameFull');
    if(nameEl){nameEl.textContent=i===3?'ultracode':EFFORT_STEPS[i];nameEl.className='effort-name-full'+(i===3?' uc':'')}
    document.querySelectorAll('.effort-labels-row span').forEach(function(s,si){s.classList.toggle('active',si===i)});
    var flare=document.getElementById('ucFlare');
    if(flare)flare.className='uc-flare'+(i===3?' on':'');
  }
  function posToStep(x){var r=track.getBoundingClientRect();return Math.round(Math.max(0,Math.min(1,(x-r.left)/r.width))*3)}
  track.addEventListener('mousedown',function(e){dragging=true;setStep(posToStep(e.clientX));e.preventDefault()});
  window.addEventListener('mousemove',function(e){if(dragging)setStep(posToStep(e.clientX))});
  window.addEventListener('mouseup',function(){dragging=false});
  track.addEventListener('touchstart',function(e){dragging=true;setStep(posToStep(e.touches[0].clientX));e.preventDefault()},{passive:false});
  window.addEventListener('touchmove',function(e){if(dragging)setStep(posToStep(e.touches[0].clientX))},{passive:false});
  window.addEventListener('touchend',function(){dragging=false});
  setStep(1);
}
function setEffortStep(i){buildEffortSlider._step&&buildEffortSlider._step(i);_effortIdx=i;_effort=EFFORT_STEPS[i];var p=(i/3)*100;var fill=document.getElementById('effortFillFull'),thumb=document.getElementById('effortThumbFull');if(fill)fill.style.width=p+'%';if(thumb)thumb.style.left='calc('+p+'% - 8px)';var nameEl=document.getElementById('effortNameFull');if(nameEl){nameEl.textContent=i===3?'ultracode':EFFORT_STEPS[i];nameEl.className='effort-name-full'+(i===3?' uc':'')}document.querySelectorAll('.effort-labels-row span').forEach(function(s,si){s.classList.toggle('active',si===i)});var flare=document.getElementById('ucFlare');if(flare)flare.className='uc-flare'+(i===3?' on':'');}
buildEffortSlider('lEffortTrack','lEffortFill','lEffortThumb');
buildEffortSlider('effortTrackFull','effortFillFull','effortThumbFull');

/* ═══ LANDING INPUT ═══ */
var landInput=document.getElementById('landInput');
if(landInput){
  landInput.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,130)+'px'});
  landInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFromLanding()}});
}
function chipGo(t){if(!landInput)return;landInput.value=t;landInput.style.height='auto';landInput.style.height=Math.min(landInput.scrollHeight,130)+'px';sendFromLanding()}
function sendFromLanding(){
  var t=landInput?landInput.value.trim():'';
  if(!t)return;
  var b=document.getElementById('lSendBtn');if(b)b.disabled=true;
  window._pendingMsg=t;
  runPhase(function(){transitionToChat()});
}

/* ═══ PHASE ═══ */
function runPhase(done){
  var ov=document.getElementById('phaseOv');if(!ov){done&&done();return}
  var phases=[{icon:'💭',title:'Thinking',subs:['analyzing your request…','identifying requirements…']},{icon:'📋',title:'Planning',subs:['selecting approach…','outlining solution…']},{icon:'⚡',title:'Generating',subs:['crafting response…','applying best practices…']}];
  var pi=0;
  ov.classList.add('on');
  function rp(){
    if(pi>=phases.length){setTimeout(function(){ov.classList.remove('on');done&&done()},300);return}
    var p=phases[pi];
    document.getElementById('phaseIcon').textContent=p.icon;
    document.getElementById('phaseTitle').textContent=p.title;
    document.getElementById('phaseFill').style.width=Math.round(((pi+1)/phases.length)*100)+'%';
    var si=0,subEl=document.getElementById('phaseSub');
    if(subEl)subEl.textContent=p.subs[0];
    var iv=setInterval(function(){si++;if(si>=p.subs.length){clearInterval(iv);pi++;setTimeout(rp,200)}else if(subEl){subEl.style.opacity='0';setTimeout(function(){subEl.textContent=p.subs[si];subEl.style.opacity='1'},180)}},750);
  }
  document.getElementById('phaseFill').style.width='0%';
  rp();
}
function transitionToChat(){
  var lc=document.getElementById('landEl'),cw=document.getElementById('chatWrap');
  if(typeof gsap!=='undefined'&&lc){gsap.to(lc,{opacity:0,y:-18,duration:.4,ease:'power2.in',onComplete:function(){lc.classList.add('hidden');showChat()}})}
  else{if(lc)lc.classList.add('hidden');showChat()}
}
function showChat(){
  var cw=document.getElementById('chatWrap');if(!cw)return;
  cw.classList.add('on');
  if(typeof gsap!=='undefined')gsap.fromTo(cw,{opacity:0,filter:'blur(6px)'},{opacity:1,filter:'blur(0px)',duration:.5,ease:'power2.out'});
  if(typeof init==='function'&&!window._appInitialized){init();window._appInitialized=true}
  setTimeout(function(){
    var inp=document.getElementById('userInput');
    if(window._pendingMsg&&inp){inp.value=window._pendingMsg;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';window._pendingMsg=null;if(typeof sendMessage==='function')sendMessage()}
  },280);
}

/* ═══ POPOVERS ═══ */
function openPop(id,anchorEl){
  closePop('settingsPop');closePop('modelPop');
  var pop=document.getElementById(id);if(!pop)return;
  pop.classList.add('on');
  if(anchorEl){
    var r=anchorEl.getBoundingClientRect();
    var top=r.top-pop.offsetHeight-10;
    if(top<10)top=r.bottom+10;
    var left=Math.max(10,Math.min(r.left,window.innerWidth-pop.offsetWidth-10));
    pop.style.top=top+'px';pop.style.left=left+'px';
  }
  setTimeout(function(){document.addEventListener('click',popOutside,{once:true,capture:true})},10);
}
function popOutside(e){if(!e.target.closest('.popover')&&!e.target.closest('#settingsBtn')&&!e.target.closest('#wfPill')&&!e.target.closest('#modelPill')){closePop('settingsPop');closePop('modelPop')}}
function closePop(id){var p=document.getElementById(id);if(p)p.classList.remove('on')}

function openSettings(){
  renderWfOptions();renderBpChips();
  var btn=document.getElementById('settingsBtn');
  openPop('settingsPop',btn);
}
function openModelPop(){
  renderModelOptions();
  var btn=document.getElementById('modelPill');
  openPop('modelPop',btn);
}

/* ═══ WORKFLOW OPTIONS RENDER ═══ */
function renderWfOptions(){
  var el=document.getElementById('wfOptions');if(!el)return;
  el.innerHTML=WORKFLOWS.map(function(wf){
    return '<button class="wf-opt'+(wf.key===_wf?' active':'')+'" onclick="selectWf(\''+wf.key+'\')">'
      +'<div class="wf-opt-icon">'+wf.icon+'</div>'
      +'<div class="wf-opt-info"><div class="wf-opt-name">'+wf.label+'</div><div class="wf-opt-desc">'+wf.desc+'</div></div>'
      +(wf.color?'<div class="wf-opt-color" style="background:'+wf.color+'"></div>':'')
      +'</button>';
  }).join('');
}
function selectWf(key){
  _wf=key;
  var wf=WORKFLOWS.find(function(w){return w.key===key});
  var pill=document.getElementById('wfPill'),label=document.getElementById('wfLabel');
  if(label)label.textContent=wf?wf.label:'Code';
  if(pill){
    pill.classList.toggle('active',key!=='cancel');
    if(wf&&wf.color&&key!=='cancel'){pill.style.borderColor=wf.color+'88';pill.style.boxShadow='0 0 14px '+wf.color+'44'}
    else{pill.style.borderColor='';pill.style.boxShadow=''}
  }
  renderWfOptions();renderBpChips();
  _activeChips={};
}

/* ═══ BP CHIPS RENDER ═══ */
function renderBpChips(){
  var el=document.getElementById('bpChips');if(!el)return;
  var keys=(BP_MAP[_wf]&&BP_MAP[_wf][_model])||[];
  if(!keys.length){el.innerHTML='<span style="font-size:11px;color:var(--mut)">No options for this combination.</span>';return}
  el.innerHTML=keys.map(function(k){
    return '<button class="bp-chip'+((_activeChips[k])?' on':'')+'" onclick="toggleChip(\''+k+'\')" title="'+k+'">'+( BP_LABELS[k]||k)+'</button>';
  }).join('');
}
function toggleChip(k){_activeChips[k]=!_activeChips[k];renderBpChips()}
window.getActiveChips=function(){return Object.keys(_activeChips).filter(function(k){return _activeChips[k]})}
window.getCurrentWorkflow=function(){return _wf}
window.getCurrentModel=function(){return _model}
window.getCurrentEffort=function(){return _effort}

/* ═══ MODEL OPTIONS RENDER ═══ */
function renderModelOptions(){
  var el=document.getElementById('modelOptions');if(!el)return;
  el.innerHTML=MODELS.map(function(m){
    return '<div class="model-opt'+(m.key===_model?' active':'')+'" onclick="selectModel(\''+m.key+'\')">'
      +'<div class="model-opt-icon">'+m.icon+'</div>'
      +'<div class="model-opt-info"><div class="model-opt-name">Chrxmaticc '+m.label+'</div><div class="model-opt-desc">'+m.desc+'</div></div>'
      +'</div>';
  }).join('');
}
function selectModel(key){
  _model=key;
  var m=MODELS.find(function(x){return x.key===key});
  var pill=document.getElementById('modelPill'),label=document.getElementById('modelLabel'),badge=document.getElementById('lModelBadge');
  if(label)label.textContent=m?m.short:key;
  if(badge)badge.textContent='Chrxmaticc '+(m?m.label:key);
  renderModelOptions();renderBpChips();
  closePop('modelPop');
}

/* ═══ GITHUB ═══ */
function connectGitHub(){
  /* Trigger your existing GitHub OAuth — just show connected UI after */
  if(typeof triggerGitHubAuth==='function'){triggerGitHubAuth();return}
  /* Fallback: mark connected and load repos */
  setGitHubConnected('chrxmaticc');
}
function setGitHubConnected(username){
  _ghConnected=true;
  document.getElementById('ghConnectBtn').style.display='none';
  document.getElementById('ghConnectedRow').style.display='flex';
  document.getElementById('ghConnectedName').textContent=username||'Connected';
  document.getElementById('ghRepoSearch').style.display='block';
  document.getElementById('repoList').style.display='flex';
  var ghPill=document.getElementById('ghPill');
  if(ghPill)ghPill.classList.add('connected');
  fetchRepos();
}
function disconnectGitHub(){
  _ghConnected=false;_selectedRepo=null;
  document.getElementById('ghConnectBtn').style.display='flex';
  document.getElementById('ghConnectedRow').style.display='none';
  document.getElementById('ghRepoSearch').style.display='none';
  document.getElementById('repoList').style.display='none';
  var ghPill=document.getElementById('ghPill');
  if(ghPill){ghPill.classList.remove('connected');var l=document.getElementById('ghLabel');if(l)l.textContent='Select Repo'}
  var cb=document.getElementById('commitBtn');if(cb)cb.classList.remove('on');
}
var _allRepos=[];
function fetchRepos(){
  /* One fetch call — your app.js should expose window._githubToken */
  var token=window._githubToken||'';
  fetch('https://api.github.com/user/repos?sort=updated&per_page=50',{headers:token?{'Authorization':'token '+token}:{}})
    .then(function(r){return r.json()})
    .then(function(data){if(Array.isArray(data)){_allRepos=data;renderRepoList(data)}})
    .catch(function(){_allRepos=[];renderRepoList([])});
}
function renderRepoList(repos){
  var el=document.getElementById('repoList');if(!el)return;
  if(!repos.length){el.innerHTML='<div style="font-size:11px;color:var(--mut);padding:8px">No repos found.</div>';return}
  el.innerHTML=repos.slice(0,40).map(function(r){
    return '<div class="repo-item'+((_selectedRepo&&_selectedRepo.name===r.name)?' selected':'')+'" onclick="selectRepo('+JSON.stringify({name:r.name,full_name:r.full_name}).replace(/"/g,'&quot;')+')">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>'
      +r.name+'</div>';
  }).join('');
}
function selectRepo(r){
  _selectedRepo=r;
  var l=document.getElementById('ghLabel');if(l)l.textContent=r.name;
  var cb=document.getElementById('commitBtn');if(cb)cb.classList.add('on');
  renderRepoList(_allRepos);
}
function filterRepos(q){
  var filtered=_allRepos.filter(function(r){return r.name.toLowerCase().includes(q.toLowerCase())});
  renderRepoList(filtered);
}

/* Plan block helpers */
window.createPlanBlock=function(question,options,qNum,qTotal){
  var block=document.createElement('div');block.className='plan-block';
  var pct=qNum&&qTotal?Math.round((qNum/qTotal)*100):0;
  var opts=options.map(function(o){
    if(o==='Custom'||o==='custom'){
      return '<button class="plan-opt custom" onclick="showPlanCustom(this)">✏️ Custom</button>'
        +'<div class="plan-custom-row" id="pcr_'+qNum+'">'
        +'<input class="plan-custom-inp" placeholder="Your answer…" onkeydown="if(event.key===\'Enter\'){event.preventDefault();planCustomSend(this)}">'
        +'<button class="plan-custom-send" onclick="planCustomSend(this.previousElementSibling)">Send</button>'
        +'</div>';
    }
    return '<button class="plan-opt" onclick="selectPlanOption(this,\''+o.replace(/'/g,"\\'")+'\')">'+o+'</button>';
  }).join('');
  block.innerHTML='<div class="plan-prog-row"><div class="plan-prog-track"><div class="plan-prog-fill" style="width:'+pct+'%"></div></div><div class="plan-qcount">Question '+(qNum||'?')+' of ~'+(qTotal||5)+'</div></div><div class="plan-q">'+question+'</div><div class="plan-opts">'+opts+'</div>';
  return block;
};
window.showPlanCustom=function(btn){var r=btn.parentElement.querySelector('.plan-custom-row');if(r){r.classList.add('on');r.querySelector('input').focus()}};
window.planCustomSend=function(inp){var v=inp?inp.value.trim():'';if(v&&typeof selectPlanOption==='function')selectPlanOption(inp,v)};

/* Thinking block helpers */
window.createThinkingBlock=function(wfLabel){
