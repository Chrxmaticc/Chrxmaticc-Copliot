<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0a">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="/manifest.json">
<title>Chrxmaticc Copilot</title>
<link rel="stylesheet" href="style.css">
<script defer src="analytics.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;inset:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;transition:background .5s,color .5s}

:root{--a:#d4a574;--a2:#c9956b;--glow:rgba(212,165,116,.22);--bg:#0b0b0a;--surf:rgba(20,18,14,.9);--brd:rgba(212,165,116,.14);--txt:#e8d5c4;--mut:#7a6a5a}
body.theme-midnight{--a:#9090d8;--a2:#6060b0;--glow:rgba(130,130,220,.2);--bg:#08080f;--surf:rgba(12,12,22,.92);--brd:rgba(100,100,180,.15);--txt:#e0e0f0;--mut:#6060a0}
body.theme-glass{--a:#a0b8e8;--a2:#8090c8;--glow:rgba(140,170,230,.18);--bg:#080810;--surf:rgba(22,24,42,.5);--brd:rgba(255,255,255,.09);--txt:#e8e8f4;--mut:#7878a0}
body.theme-chrome{--a:#ccc;--a2:#999;--glow:rgba(200,200,200,.15);--bg:#141414;--surf:rgba(28,28,28,.96);--brd:rgba(80,80,80,.35);--txt:#e0e0e0;--mut:#666}
body.theme-white{--a:#0a84ff;--a2:#0055cc;--glow:rgba(10,132,255,.14);--bg:#f0f2f5;--surf:rgba(255,255,255,.97);--brd:rgba(0,0,0,.1);--txt:#1a1a1a;--mut:#999}
body.theme-chromatic{--a:#d4a574;--a2:#4a7fc0;--glow:rgba(150,130,200,.2);--bg:#0d0e14;--surf:rgba(20,20,28,.9);--brd:rgba(140,130,180,.16);--txt:#e8d5c4;--mut:#8a8a9a}
body.theme-liquid{--a:#bbb;--a2:#888;--glow:rgba(180,180,200,.18);--bg:#111114;--surf:rgba(24,24,28,.95);--brd:rgba(140,140,150,.2);--txt:#d4d4d8;--mut:#777}
body.theme-rainbow{--a:#ff9ff3;--a2:#ff6b6b;--glow:rgba(255,150,200,.18);--bg:#0e0e18;--surf:rgba(18,18,28,.95);--brd:rgba(255,255,255,.08);--txt:#f0f0f8;--mut:#888}

/* ═══ LANDING ═══ */
.land{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;transition:opacity .5s,transform .5s,visibility .5s}
.land.hidden{opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-18px)}
.land-inner{display:flex;flex-direction:column;align-items:center;width:100%;max-width:660px;padding:0 24px}
.mesh-wrap{position:relative;width:148px;height:148px;margin-bottom:20px;cursor:grab;touch-action:none;user-select:none}
.mesh-wrap:active{cursor:grabbing}
.mesh-wrap canvas{width:148px!important;height:148px!important;border-radius:0;display:block}
.mesh-glow{position:absolute;inset:-22px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,var(--glow) 0%,transparent 70%);animation:mglow 3s ease-in-out infinite}
@keyframes mglow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.greet{font-size:clamp(20px,4vw,30px);font-weight:700;letter-spacing:-.5px;text-align:center;margin-bottom:7px;background:linear-gradient(135deg,var(--a2),var(--a),var(--a2));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.greet-sub{font-size:13px;color:var(--mut);text-align:center;margin-bottom:26px;opacity:.8}
.lbox{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:4px 4px 4px 14px;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);box-shadow:0 8px 40px rgba(0,0,0,.4);transition:border-color .3s,box-shadow .3s,transform .2s}
.lbox:focus-within{border-color:var(--a);box-shadow:0 8px 48px rgba(0,0,0,.5),0 0 0 3px var(--glow);transform:translateY(-2px)}
.ltextarea{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:15px;font-family:inherit;resize:none;max-height:130px;min-height:46px;width:100%;padding:11px 8px 6px 0;line-height:1.5}
.ltextarea::placeholder{color:var(--mut);opacity:.55}
.lbox-bottom{display:flex;align-items:center;justify-content:space-between;padding:5px 2px 2px}
.lbox-left{display:flex;align-items:center;gap:8px}
.lbox-right{display:flex;align-items:center;gap:8px}
.lmodel-badge{font-size:11px;color:var(--mut);background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:8px;padding:4px 9px;white-space:nowrap}
.lsend{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--a2),var(--a));transition:transform .2s,box-shadow .2s,opacity .2s;position:relative;overflow:hidden}
.lsend:hover{transform:scale(1.08);box-shadow:0 0 28px var(--glow)}
.lsend:active{transform:scale(.94)}
.lsend:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.lsend svg{width:16px;height:16px;fill:var(--bg)}
.lattach{background:none;border:none;cursor:pointer;padding:6px;color:var(--mut);border-radius:8px;display:flex;align-items:center;transition:color .2s,background .2s}
.lattach:hover{color:var(--a);background:var(--glow)}
.l-effort-wrap{display:flex;align-items:center;gap:7px}
.effort-track{position:relative;width:100px;height:5px;background:rgba(255,255,255,.08);border-radius:4px;cursor:pointer}
.effort-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a2),var(--a));pointer-events:none}
.effort-thumb{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:var(--a);border:2px solid var(--bg);transform:translateY(-50%);box-shadow:0 0 8px var(--glow);cursor:grab}
.effort-thumb:active{cursor:grabbing}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%;padding:20px 0 0}
.chip{background:rgba(255,255,255,.04);border:1px solid var(--brd);color:var(--mut);padding:8px 16px;border-radius:22px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .22s;white-space:nowrap;backdrop-filter:blur(12px)}
.chip:hover{border-color:var(--a);background:var(--glow);color:var(--txt);transform:translateY(-2px)}
.lthemes{display:flex;gap:9px;justify-content:center;padding:20px 0 0;flex-wrap:wrap}
.ldot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .22s;position:relative}
.ldot:hover{transform:scale(1.2)}
.ldot.active{border-color:var(--a);box-shadow:0 0 12px var(--glow);transform:scale(1.1)}
.ldot::after{content:attr(data-label);position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--mut);opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.ldot:hover::after{opacity:1}
.uc-flare{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;background:radial-gradient(ellipse at 50% 110%,var(--glow) 0%,transparent 60%);transition:opacity .4s}
.uc-flare.on{opacity:1;animation:ucf 2s ease-in-out infinite}
@keyframes ucf{0%,100%{opacity:.6}50%{opacity:1}}

/* ═══ PHASE ═══ */
.phase-ov{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.phase-ov.on{display:flex}
.phase-card{background:var(--surf);border:1px solid var(--brd);border-radius:22px;padding:36px 44px;text-align:center;max-width:400px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,.55);animation:pcardIn .45s cubic-bezier(.22,1,.36,1)}
@keyframes pcardIn{from{opacity:0;transform:scale(.9) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.phase-icon{font-size:36px;margin-bottom:10px;animation:ipulse 2s ease-in-out infinite}
@keyframes ipulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.phase-title{font-size:19px;font-weight:700;color:var(--a);margin-bottom:8px}
.phase-sub{font-size:13px;color:var(--mut);line-height:1.6;min-height:34px;transition:opacity .3s}
.phase-bar{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:18px;overflow:hidden}
.phase-fill{height:100%;border-radius:2px;width:0%;background:linear-gradient(90deg,var(--a2),var(--a),var(--a2));background-size:200%;transition:width .45s;animation:bshim 2s linear infinite}
@keyframes bshim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ═══ CHAT ═══ */
.chat-wrap{position:fixed;inset:0;z-index:5;display:none;opacity:0}
.chat-wrap.on{display:flex;opacity:1;animation:chatRev .55s cubic-bezier(.22,1,.36,1) forwards}
@keyframes chatRev{from{opacity:0;filter:blur(6px)}to{opacity:1;filter:blur(0)}}
#app{display:flex;height:100%;width:100%;position:relative}

/* ═══ SIDEBAR ═══ */
.sidebar{position:fixed;left:-290px;top:0;bottom:0;width:272px;z-index:100;transition:left .3s;display:flex;flex-direction:column;padding:16px;overflow-y:auto;background:var(--surf);border-right:1px solid var(--brd);backdrop-filter:blur(28px)}
.sidebar.open{left:0}
.sidebar-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sidebar-hdr img{width:28px!important;height:28px!important;border-radius:50%;object-fit:cover}
.sidebar-htitle{font-size:17px;font-weight:700;flex:1;color:var(--txt)}
.sidebar-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--mut);margin-left:auto}
.sidebar-new{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:11px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);font-size:13px;cursor:pointer;margin-bottom:12px;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.sidebar-new:hover{border-color:var(--a);box-shadow:0 0 14px var(--glow)}
.sidebar-new svg{stroke:var(--a)}
.sidebar-chats{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:10px;cursor:pointer;margin-bottom:2px;color:var(--txt);font-size:13px;transition:background .15s}
.chat-item:hover,.chat-item.active{background:var(--glow)}
.chat-item img{width:28px!important;height:28px!important;border-radius:50%;object-fit:cover}
.chat-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.sidebar-footer{border-top:1px solid var(--brd);padding-top:12px;margin-top:8px}
.sidebar-profile{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--txt);transition:background .15s}
.sidebar-profile:hover{background:var(--glow)}
.sidebar-profile img{width:28px!important;height:28px!important;border-radius:50%;object-fit:cover}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(3px)}
.overlay.on{display:block}

/* ═══ MAIN ═══ */
.main{flex:1;display:flex;flex-direction:column;max-width:720px;margin:0 auto;width:100%;position:relative}
.topbar{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--surf);backdrop-filter:blur(24px);position:sticky;top:0;z-index:10}
.topbar-back{background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--a);font-size:22px;line-height:1;display:flex;align-items:center;gap:5px}
.topbar-logo{width:26px!important;height:26px!important;border-radius:50%;object-fit:cover}
.topbar-center{flex:1;min-width:0;cursor:pointer}
.topbar-name{font-size:15px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--a2),var(--a),var(--a2));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite}
.topbar-status{font-size:10px;display:flex;align-items:center;gap:4px;color:var(--mut);margin-top:1px}
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sdot.online{background:#30d158;box-shadow:0 0 5px rgba(48,209,88,.5);animation:dp 2.5s ease-in-out infinite}
.sdot.thinking{background:var(--a);animation:dp 1s ease-in-out infinite}
.sdot.offline{background:#ff453a}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-util{display:flex;align-items:center;gap:4px}
.tutil-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--mut);border-radius:8px;display:flex;align-items:center;justify-content:center;transition:color .2s,background .2s}
.tutil-btn:hover{color:var(--a);background:var(--glow)}
.tutil-btn svg{width:16px;height:16px}
.tts-wave{display:none;align-items:flex-end;gap:2px;height:14px}
.tts-wave.on{display:flex}
.tts-bar{width:3px;border-radius:2px;background:var(--a);animation:wave 1s ease-in-out infinite}
.tts-bar:nth-child(1){height:4px;animation-delay:0s}.tts-bar:nth-child(2){height:10px;animation-delay:.1s}.tts-bar:nth-child(3){height:7px;animation-delay:.2s}.tts-bar:nth-child(4){height:12px;animation-delay:.15s}.tts-bar:nth-child(5){height:5px;animation-delay:.05s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
.tts-speed{background:var(--surf);border:1px solid var(--brd);color:var(--mut);font-size:11px;border-radius:7px;padding:4px 6px;font-family:inherit;cursor:pointer;outline:none}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;min-height:0}
.messages::-webkit-scrollbar{display:none}

/* ═══ BUBBLES ═══ */
.bubble-row{display:flex;flex-direction:column;max-width:82%;animation:bpop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes bpop{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bubble-row.user{align-self:flex-end;align-items:flex-end}
.bubble-row.ai{align-self:flex-start;align-items:flex-start}
.bubble{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.bubble-row.user .bubble{border-bottom-right-radius:4px}
.bubble-row.ai .bubble{border-bottom-left-radius:4px}
body.theme-gold .bubble-row.ai .bubble{background:linear-gradient(145deg,#141210,#111009);border:1px solid rgba(212,165,116,.1)}
body.theme-gold .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(212,165,116,.18),rgba(201,149,107,.12));border:1px solid rgba(212,165,116,.25)}
body.theme-midnight .bubble-row.ai .bubble{background:linear-gradient(145deg,#111120,#0e0e1c);border:1px solid rgba(100,100,180,.14)}
body.theme-midnight .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(80,60,180,.25),rgba(60,40,160,.18));border:1px solid rgba(120,100,200,.3)}
body.theme-glass .bubble-row.ai .bubble{background:rgba(28,30,50,.45);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
body.theme-glass .bubble-row.user .bubble{background:rgba(70,80,140,.35);backdrop-filter:blur(20px);border:1px solid rgba(160,180,240,.2)}
body.theme-chrome .bubble-row.ai .bubble{background:#202020;border:1px solid #2e2e2e}
body.theme-chrome .bubble-row.user .bubble{background:#3a3a3a;border:1px solid #484848}
body.theme-white .bubble-row.ai .bubble{background:#fff;border:1px solid #e8ebf0;box-shadow:0 2px 12px rgba(0,0,0,.06)}
body.theme-white .bubble-row.user .bubble{background:linear-gradient(145deg,#0a84ff,#0077ed);color:#fff}
body.theme-chromatic .bubble-row.ai .bubble{background:linear-gradient(145deg,#16161e,#131320);border:1px solid rgba(100,120,180,.14)}
body.theme-chromatic .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(212,165,116,.13),rgba(74,127,192,.08));border:1px solid rgba(150,130,200,.2)}
body.theme-liquid .bubble-row.ai .bubble{background:#1e1e22;border:1px solid rgba(140,140,150,.15)}
body.theme-liquid .bubble-row.user .bubble{background:linear-gradient(135deg,#2e2e34,#3a3a40);border:1px solid rgba(180,180,195,.15)}
body.theme-rainbow .bubble-row.ai .bubble{background:#171722;border:1px solid rgba(255,255,255,.08)}
body.theme-rainbow .bubble-row.user .bubble{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14)}
.ts{font-size:10px;margin:3px 8px;opacity:0;transition:opacity .2s;color:var(--mut)}
.bubble-row:hover .ts{opacity:1}
.pbadge{font-size:9px;margin:2px 8px;opacity:.45;font-style:italic;color:var(--mut)}

/* ═══ THINKING / PLAN / CODE ═══ */
.think-block{align-self:flex-start;max-width:82%;background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:4px}
.think-hdr{display:flex;align-items:center;gap:7px;padding:9px 13px;cursor:pointer}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--mut);animation:bounce 1.2s infinite}
.tdot.d2{animation-delay:.2s}.tdot.d3{animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.tlabel{font-size:11px;color:var(--mut);font-style:italic;flex:1}
.tchev{width:12px;height:12px;color:var(--mut);transition:transform .25s;flex-shrink:0}
.think-block.open .tchev{transform:rotate(180deg)}
.think-body{max-height:0;overflow:hidden;transition:max-height .35s}
.think-block.open .think-body{max-height:400px}
.think-text{padding:10px 13px 12px;font-size:12px;color:var(--mut);line-height:1.6;white-space:pre-wrap;border-top:1px solid var(--brd)}
.plan-block{align-self:flex-start;width:min(560px,94%);background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:16px;padding:18px 18px 14px;margin:4px 0}
.plan-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.plan-prog-track{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px}
.plan-prog-fill{height:100%;border-radius:2px;background:var(--a);transition:width .4s}
.plan-qcount{font-size:10px;color:var(--mut)}
.plan-q{font-size:14px;font-weight:600;color:var(--a);line-height:1.45;margin-bottom:14px}
.plan-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.plan-opt{background:rgba(255,255,255,.04);border:1px solid var(--brd);color:var(--txt);padding:12px 14px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
.plan-opt:hover{border-color:var(--a);background:var(--glow);transform:translateY(-1px)}
.plan-opt.custom{grid-column:1/-1;border-style:dashed;color:var(--mut);background:transparent}
.plan-custom-row{grid-column:1/-1;display:none;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--a)}
.plan-custom-row.on{display:flex}
.plan-custom-inp{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:13px;font-family:inherit}
.plan-custom-inp::placeholder{color:var(--mut);opacity:.6}
.plan-custom-send{background:var(--a);border:none;border-radius:8px;color:var(--bg);font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;font-family:inherit}
.typing-ind{display:none;align-self:flex-start;padding:12px 16px;gap:5px}
.typing-ind.on{display:flex}
.tdot2{width:7px;height:7px;border-radius:50%;background:var(--mut);animation:bounce 1.2s infinite}
.tdot2:nth-child(2){animation-delay:.2s}.tdot2:nth-child(3){animation-delay:.4s}
.typing-cur{display:inline-block;animation:blink .7s infinite;color:var(--a)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.code-block{margin:6px 0;overflow:hidden;background:rgba(0,0,0,.2);border:1px solid var(--brd);border-left:3px solid var(--a);border-radius:10px}
.code-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;font-size:10px;color:var(--mut)}
.code-copy{border:none;padding:3px 9px;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;background:var(--surf);color:var(--mut);transition:color .2s}
.code-copy:hover{color:var(--a)}

/* Toolbar buttons */

.settings-btn:hover,.mic-btn:hover{color:var(--a)!important;border-color:var(--a)!important;background:var(--glow)!important}

.model-pill,.gh-pill{display:flex!important;align-items:center!important;gap:5px!important;padding:7px 12px!important;border-radius:20px!important;border:1px solid var(--brd)!important;background:var(--surf)!important;color:var(--txt)!important;font-size:12px!important;font-weight:600!important;cursor:pointer!important;font-family:inherit!important;transition:all .22s!important;white-space:nowrap!important;flex-shrink:0!important}
.model-pill:hover,.gh-pill:hover{border-color:var(--a)!important;background:var(--glow)!important}

.commit-btn.on{display:flex!important}
.commit-btn:hover{border-color:var(--a)!important;box-shadow:0 0 14px var(--glow)!important}

/* ═══ POPOVERS ═══ */

.wf-opt-info{flex:1}

.wf-opt-desc{font-size:11px;color:var(--mut);margin-top:1px}

.effort-full{display:flex;flex-direction:column;gap:8px}

.model-opt:hover{background:var(--glow);border-color:var(--brd)}

function chipGo(t){if(!landInput)return;landInput.value=t;landInput.style.height='auto';landInput.style.height=Math.min(landInput.scrollHeight,130)+'px';sendFromLanding()}
function sendFromLanding(){var t=landInput?landInput.value.trim():'';if(!t)return;var b=document.getElementById('lSendBtn');if(b)b.disabled=true;window._pendingMsg=t;runPhase(function(){transitionToChat()})}
function runPhase(done){var ov=document.getElementById('phaseOv');if(!ov){done&&done();return}var phases=[{icon:'💭',title:'Thinking',subs:['analyzing your request…','identifying requirements…']},{icon:'📋',title:'Planning',subs:['selecting approach…','outlining solution…']},{icon:'⚡',title:'Generating',subs:['crafting response…','applying best practices…']}],pi=0;ov.classList.add('on');function rp(){if(pi>=phases.length){setTimeout(function(){ov.classList.remove('on');done&&done()},300);return}var p=phases[pi];document.getElementById('phaseIcon').textContent=p.icon;document.getElementById('phaseTitle').textContent=p.title;document.getElementById('phaseFill').style.width=Math.round(((pi+1)/phases.length)*100)+'%';var si=0,se=document.getElementById('phaseSub');if(se)se.textContent=p.subs[0];var iv=setInterval(function(){si++;if(si>=p.subs.length){clearInterval(iv);pi++;setTimeout(rp,200)}else if(se){se.style.opacity='0';setTimeout(function(){se.textContent=p.subs[si];se.style.opacity='1'},180)}},750)}document.getElementById('phaseFill').style.width='0%';rp()}
function transitionToChat(){var lc=document.getElementById('landEl'),cw=document.getElementById('chatWrap');if(typeof gsap!=='undefined'&&lc){gsap.to(lc,{opacity:0,y:-18,duration:.4,ease:'power2.in',onComplete:function(){lc.classList.add('hidden');showChat()}})}else{if(lc)lc.classList.add('hidden');showChat()}}
function showChat(){var cw=document.getElementById('chatWrap');if(!cw)return;cw.classList.add('on');if(typeof gsap!=='undefined')gsap.fromTo(cw,{opacity:0,filter:'blur(6px)'},{opacity:1,filter:'blur(0px)',duration:.5,ease:'power2.out'});if(typeof init==='function'&&!window._appInitialized){init();window._appInitialized=true}setTimeout(function(){var inp=document.getElementById('userInput');if(window._pendingMsg&&inp){inp.value=window._pendingMsg;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';window._pendingMsg=null;if(typeof sendMessage==='function')sendMessage()}},280)}

/* ═══ POPOVERS ═══ */
function openPop(id,anchor){closePop('settingsPop');closePop('modelPop');var p=document.getElementById(id);if(!p)return;p.classList.add('on');if(anchor){var r=anchor.getBoundingClientRect(),top=r.top-p.offsetHeight-10;if(top<10)top=r.bottom+10;var left=Math.max(10,Math.min(r.left,window.innerWidth-p.offsetWidth-10));p.style.top=top+'px';p.style.left=left+'px'}setTimeout(function(){document.addEventListener('click',po,{once:true,capture:true})},10)}
function po(e){if(!e.target.closest('.popover')&&!e.target.closest('#settingsBtn')&&!e.target.closest('#wfPill')&&!e.target.closest('#modelPill')){closePop('settingsPop');closePop('modelPop')}}
function closePop(id){var p=document.getElementById(id);if(p)p.classList.remove('on')}
function openSettings(){renderWfOptions();renderBpChips();openPop('settingsPop',document.getElementById('settingsBtn'))}
function openModelPop(){renderModelOptions();openPop('modelPop',document.getElementById('modelPill'))}

/* ═══ WORKFLOW ═══ */
function renderWfOptions(){var e=document.getElementById('wfOptions');if(!e)return;e.innerHTML=WORKFLOWS.map(function(w){return'<button class="wf-opt'+(w.key===_wf?' active':'')+'" onclick="selectWf(\''+w.key+'\')"><div class="wf-opt-icon">'+w.icon+'</div><div class="wf-opt-info"><div class="wf-opt-name">'+w.label+'</div><div class="wf-opt-desc">'+w.desc+'</div></div>'+(w.color?'<div class="wf-opt-color" style="background:'+w.color+'"></div>':'')+'</button>'}).join('')}
function selectWf(key){_wf=key;var w=WORKFLOWS.find(function(w){return w.key===key}),p=document.getElementById('wfPill'),l=document.getElementById('wfLabel');if(l)l.textContent=w?w.label:'Code';if(p){p.classList.toggle('active',key!=='cancel');if(w&&w.color&&key!=='cancel'){p.style.borderColor=w.color+'88';p.style.boxShadow='0 0 14px '+w.color+'44'}else{p.style.borderColor='';p.style.boxShadow=''}}renderWfOptions();renderBpChips();_activeChips={}}

/* ═══ BP CHIPS ═══ */
function renderBpChips(){var e=document.getElementById('bpChips');if(!e)return;var keys=(BP_MAP[_wf]&&BP_MAP[_wf][_model])||[];if(!keys.length){e.innerHTML='<span style="font-size:11px;color:var(--mut)">No options for this combination.</span>';return}e.innerHTML=keys.map(function(k){return'<button class="bp-chip'+(_activeChips[k]?' on':'')+'" onclick="toggleChip(\''+k+'\')">'+(BP_LABELS[k]||k)+'</button>'}).join('')}
function toggleChip(k){_activeChips[k]=!_activeChips[k];renderBpChips()}
window.getActiveChips=function(){return Object.keys(_activeChips).filter(function(k){return _activeChips[k]})}
window.getCurrentWorkflow=function(){return _wf}
window.getCurrentModel=function(){return _model}
window.getCurrentEffort=function(){return _effort}

/* ═══ MODEL ═══ */
function renderModelOptions(){var e=document.getElementById('modelOptions');if(!e)return;e.innerHTML=MODELS.map(function(m){return'<div class="model-opt'+(m.key===_model?' active':'')+'" onclick="selectModel(\''+m.key+'\')"><div class="model-opt-icon">'+m.icon+'</div><div class="model-opt-info"><div class="model-opt-name">Chrxmaticc '+m.label+'</div><div class="model-opt-desc">'+m.desc+'</div></div></div>'}).join('')}
function selectModel(key){_model=key;var m=MODELS.find(function(x){return x.key===key}),p=document.getElementById('modelPill'),l=document.getElementById('modelLabel'),b=document.getElementById('lModelBadge');if(l)l.textContent=m?m.short:key;if(b)b.textContent='Chrxmaticc '+(m?m.label:key);renderModelOptions();renderBpChips();closePop('modelPop')}

/* ═══ GITHUB ═══ */
function connectGitHub(){setGitHubConnected('chrxmaticc')}
function setGitHubConnected(u){_ghConnected=true;document.getElementById('ghConnectBtn').style.display='none';document.getElementById('ghConnectedRow').style.display='flex';document.getElementById('ghConnectedName').textContent=u||'Connected';document.getElementById('ghRepoSearch').style.display='block';document.getElementById('repoList').style.display='flex';var p=document.getElementById('ghPill');if(p)p.classList.add('connected');fetchRepos()}
function disconnectGitHub(){_ghConnected=false;_selectedRepo=null;document.getElementById('ghConnectBtn').style.display='flex';document.getElementById('ghConnectedRow').style.display='none';document.getElementById('ghRepoSearch').style.display='none';document.getElementById('repoList').style.display='none';var p=document.getElementById('ghPill');if(p){p.classList.remove('connected');var l=document.getElementById('ghLabel');if(l)l.textContent='Select Repo'}var cb=document.getElementById('commitBtn');if(cb)cb.classList.remove('on')}
var _allRepos=[];
function fetchRepos(){var t=window._githubToken||'';fetch('https://api.github.com/user/repos?sort=updated&per_page=50',{headers:t?{'Authorization':'token '+t}:{}}).then(function(r){return r.json()}).then(function(d){if(Array.isArray(d)){_allRepos=d;renderRepoList(d)}}).catch(function(){_allRepos=[];renderRepoList([])})}
function renderRepoList(repos){var e=document.getElementById('repoList');if(!e)return;if(!repos.length){e.innerHTML='<div style="font-size:11px;color:var(--mut);padding:8px">No repos found.</div>';return}e.innerHTML=repos.slice(0,40).map(function(r){return'<div class="repo-item'+(_selectedRepo&&_selectedRepo.name===r.name?' selected':'')+'" onclick="selectRepo('+JSON.stringify({name:r.name,full_name:r.full_name}).replace(/"/g,'&quot;')+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>'+r.name+'</div>'}).join('')}
function selectRepo(r){_selectedRepo=r;var l=document.getElementById('ghLabel');if(l)l.textContent=r.name;var cb=document.getElementById('commitBtn');if(cb)cb.classList.add('on');renderRepoList(_allRepos)}
function filterRepos(q){renderRepoList(_allRepos.filter(function(r){return r.name.toLowerCase().includes(q.toLowerCase())}))}

/* ═══ TTS ═══ */
function toggleTTS(){_ttsOn=!_ttsOn;var i=document.getElementById('ttsIcon'),w=document.getElementById('ttsWave');if(i)i.style.display=_ttsOn?'none':'block';if(w)w.className='tts-wave'+(_ttsOn?' on':'');if(typeof window.setTTS==='function')window.setTTS(_ttsOn)}

/* ═══ SIDEBAR ═══ */
function toggleSidebar(){var s=document.getElementById('sidebar'),o=document.getElementById('overlay');if(s)s.classList.toggle('open');if(o)o.classList.toggle('on')}

/* ═══ MISC ═══ */
function togglePreview(){var p=document.getElementById('previewPanel');if(p)p.classList.toggle('on')}
function clearFile(){var b=document.getElementById('fileBar');if(b)b.classList.remove('on');window._currentFile=null}
function toast(m){var t=document.createElement('div');t.className='app-toast';t.innerHTML='<svg viewBox="0 0 24 24" width="15" height="15"><path d="M12 0l2.5 7.5L22 3l-4 7.5L24 12l-8 1.5L18 21l-3-6.5L10 22l1-8.5L2 15l5-5.5L0 6l8-3L12 0z" fill="var(--a)"/></svg>'+m;document.body.appendChild(t);setTimeout(function(){if(t.parentNode)t.remove()},3000)}
window.resetChipsAfterSend=function(){_activeChips={};renderBpChips()}
window.getSettings=function(){return{workflow:_wf,model:_model,effort:_effort,buttons:window.getActiveChips(),repo:_selectedRepo}}

/* ═══ PLAN / THINKING HELPERS ═══ */
window.createPlanBlock=function(q,opts,qn,qt){var b=document.createElement('div');b.className='plan-block';var pct=qn&&qt?Math.round((qn/qt)*100):0;var oh=opts.map(function(o){if(o==='Custom')return'<button class="plan-opt custom" onclick="showPlanCustom(this)">✏️ Custom</button><div class="plan-custom-row" id="pcr_'+qn+'"><input class="plan-custom-inp" placeholder="Your answer…" onkeydown="if(event.key===\'Enter\'){event.preventDefault();planCustomSend(this)}"><button class="plan-custom-send" onclick="planCustomSend(this.previousElementSibling)">Send</button></div>';return'<button class="plan-opt" onclick="selectPlanOption(this,\''+o.replace(/'/g,"\\'")+'\')">'+o+'</button>'}).join('');b.innerHTML='<div class="plan-prog-row"><div class="plan-prog-track"><div class="plan-prog-fill" style="width:'+pct+'%"></div></div><div class="plan-qcount">Question '+(qn||'?')+' of ~'+(qt||5)+'</div></div><div class="plan-q">'+q+'</div><div class="plan-opts">'+oh+'</div>';return b}
window.showPlanCustom=function(btn){var r=btn.parentElement.querySelector('.plan-custom-row');if(r){r.classList.add('on');r.querySelector('input').focus()}}
window.planCustomSend=function(inp){var v=inp?inp.value.trim():'';if(v&&typeof selectPlanOption==='function')selectPlanOption(inp,v)}
window.createThinkingBlock=function(wf){var b=document.createElement('div');b.className='think-block';b.innerHTML='<div class="think-hdr" onclick="this.parentElement.classList.toggle(\'open\')"><div class="tdot"></div><div class="tdot d2"></div><div class="tdot d3"></div><div class="tlabel">'+wf+' — thinking…</div><svg class="tchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div><div class="think-body"><div class="think-text"></div></div>';return b}
window.collapseThinkingBlock=function(b){b.classList.remove('open');b.querySelectorAll('.tdot').forEach(function(d){d.style.animation='none'});var l=b.querySelector('.tlabel');if(l)l.textContent=l.textContent.replace('thinking…','done')}

/* ═══ AUTO-RESIZE CHAT INPUT ═══ */
(function(){var inp=document.getElementById('userInput');if(!inp)return;inp.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(typeof sendMessage==='function')sendMessage()}})})();
</script>
<script src="app.js"></script>
</body>
