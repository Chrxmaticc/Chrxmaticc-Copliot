<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Chrxmaticc Copilot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-midnight">
  <div id="app">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-avatar" id="sidebarAvatar">🧠</div>
        <div class="sidebar-title">Chats</div>
        <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
      </div>
      <div class="sidebar-actions-row">
        <button class="sidebar-new-chat" onclick="newChat()" title="New Chat">+</button>
        <button class="sidebar-fold" onclick="foldSidebar()" title="Fold Sidebar">◀</button>
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="Search chats..." class="sidebar-search-input" id="chatSearch" oninput="filterChats()">
      </div>
      <div class="sidebar-chats" id="savedChatsList"></div>
      <div class="sidebar-footer">
        <div class="sidebar-profile" onclick="location.href='settings.html'">
          <div class="sidebar-profile-avatar" id="profileAvatar">👤</div>
          <div class="sidebar-profile-info">
            <div class="sidebar-profile-name" id="profileName">Guest</div>
            <div class="sidebar-profile-status">Settings</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mini Sidebar (folded) -->
    <div id="miniSidebar" class="mini-sidebar">
      <button class="mini-sidebar-expand" onclick="unfoldSidebar()" title="Expand">▶</button>
      <button class="mini-new-chat" onclick="newChat()" title="New Chat">+</button>
      <div class="mini-avatars" id="miniAvatars"></div>
      <button class="mini-settings" onclick="location.href='settings.html'" title="Settings">⚙️</button>
    </div>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <!-- Main Chat -->
    <div id="main" class="main">
      <div class="topbar">
        <button class="topbar-btn" onclick="toggleSidebar()">
          <span class="topbar-back">‹</span>
          <span class="topbar-avatar-sm" id="topbarAvatar">🧠</span>
        </button>
        <div class="topbar-center">
          <div class="topbar-name">Chrxmaticc Copilot</div>
          <div class="topbar-status">
            <span id="statusDot" class="status-dot"></span>
            <span id="statusText">Online</span>
          </div>
        </div>
        <button class="topbar-btn" id="ttsBtn" onclick="toggleTTS()">🔊</button>
      </div>

      <div class="messages" id="messages">
        <div class="bubble-row ai">
          <div class="bubble">Yo! I'm Chrxmaticc Copilot. Offbrand. Hyper-intelligent. No subscription.

Type /help to see everything I can do, or just talk to me.</div>
          <div class="timestamp">Now</div>
        </div>
        <div class="quick-commands">
          <button class="quick-cmd" onclick="quickSend('/weather London')">🌤️</button>
          <button class="quick-cmd" onclick="quickSend('/crypto bitcoin')">💰</button>
          <button class="quick-cmd" onclick="quickSend('/roll 2d20')">🎲</button>
          <button class="quick-cmd" onclick="quickSend('/joke')">😂</button>
          <button class="quick-cmd" onclick="quickSend('/fact')">📚</button>
          <button class="quick-cmd" onclick="quickSend('/speak hello')">🔊</button>
        </div>
        <div class="typing-indicator" id="typing">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>

      <div class="inputbar">
        <button class="input-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        <div class="input-wrap">
          <textarea id="userInput" rows="1" placeholder="Message."></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <div id="micStatus" class="mic-status"><span class="mic-pulse"></span> Listening...</div>
    </div>

    <!-- Chat Action Modal -->
    <div id="chatActionModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title">Chat Actions</div>
          <button class="modal-close" onclick="hideChatActions()">✕</button>
        </div>
        <button class="modal-btn" onclick="exportChat()">📤 Export Chat</button>
        <button class="modal-btn" onclick="clearChat()">🗑️ Clear Chat</button>
        <button class="modal-btn" onclick="deleteChat()">❌ Delete Chat</button>
        <button class="modal-btn text" onclick="hideChatActions()">Cancel</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
