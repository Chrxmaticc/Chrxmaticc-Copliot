<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0b0a">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Chrxmaticc Copilot</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="analytics.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;width:100%;overflow:hidden;position:fixed;inset:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;transition:background 0.5s ease,color 0.5s ease}

    /* ── LANDING STATE ── */
    .landing-container{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease,visibility 0.6s ease,transform 0.8s cubic-bezier(0.22,1,0.36,1)}
    .landing-container.hidden{opacity:0;visibility:hidden;pointer-events:none;transform:scale(0.95)}
    .landing-mesh{width:180px;height:180px;border-radius:50%;cursor:grab;position:relative;margin-bottom:20px;transition:transform 0.3s ease}
    .landing-mesh:active{cursor:grabbing}
    .landing-mesh canvas{width:100%!important;height:100%!important;border-radius:50%}
    .landing-greeting{font-size:26px;font-weight:700;letter-spacing:-0.5px;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,#c9956b,#d4a574,#c9956b);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:greetingShimmer 3s ease-in-out infinite}
    @keyframes greetingShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .landing-subtitle{font-size:13px;color:#8a7a6a;text-align:center;margin-bottom:28px;max-width:360px;line-height:1.5;opacity:0.8}

    /* ── CENTER CHATBOX ── */
    .landing-chatbox-wrap{width:100%;max-width:640px;padding:0 20px;position:relative;z-index:2}
    .landing-chatbox{width:100%;background:rgba(18,18,16,0.9);border:1px solid rgba(212,165,116,0.15);border-radius:20px;padding:6px;display:flex;align-items:flex-end;gap:8px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(212,165,116,0.05);transition:border-color 0.3s ease,box-shadow 0.3s ease}
    .landing-chatbox:focus-within{border-color:#d4a574;box-shadow:0 8px 50px rgba(0,0,0,0.5),0 0 0 1px rgba(212,165,116,0.15),0 0 30px rgba(212,165,116,0.08)}
    .landing-chatbox textarea{flex:1;background:transparent;border:none;outline:none;color:#e8d5c4;font-size:15px;font-family:inherit;resize:none;max-height:120px;padding:10px 8px;line-height:1.5;min-height:44px}
    .landing-chatbox textarea::placeholder{color:#5a4a3a;opacity:0.6}
    .landing-send-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,#c9956b,#d4a574);transition:transform 0.2s ease,box-shadow 0.2s ease;margin:4px}
    .landing-send-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(212,165,116,0.3)}
    .landing-send-btn svg{width:16px;height:16px;fill:#0b0b0a}
    .landing-send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

    /* ── SUGGESTION CHIPS ── */
    .landing-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:640px;padding:16px 20px 0}
    .landing-chip{background:rgba(18,18,16,0.8);border:1px solid rgba(212,165,116,0.1);color:#c9b89a;padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s ease;white-space:nowrap;backdrop-filter:blur(10px)}
    .landing-chip:hover{border-color:#d4a574;background:rgba(212,165,116,0.08);color:#e8d5c4;transform:translateY(-1px)}

    /* ── VIDEO PREVIEW AREA ── */
    .landing-preview{width:100%;max-width:640px;margin-top:20px;padding:0 20px;display:none}
    .landing-preview.visible{display:block}
    .landing-preview-inner{background:rgba(18,18,16,0.6);border:1px solid rgba(212,165,116,0.08);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:#5a4a3a;font-size:13px;position:relative}
    .landing-preview-inner video{width:100%;height:100%;object-fit:cover;border-radius:16px}
    .landing-preview-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0.5}

    /* ── THINKING PHASES ── */
    .phase-overlay{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}
    .phase-overlay.visible{display:flex}
    .phase-card{background:rgba(18,18,16,0.95);border:1px solid rgba(212,165,116,0.15);border-radius:20px;padding:32px 40px;text-align:center;max-width:420px;width:90%;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
    .phase-icon{font-size:36px;margin-bottom:12px;animation:phasePulse 1.5s ease-in-out infinite}
    @keyframes phasePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.7}}
    .phase-title{font-size:18px;font-weight:700;color:#d4a574;margin-bottom:8px}
    .phase-subtext{font-size:12px;color:rgba(232,213,196,0.5);line-height:1.6;min-height:32px;transition:opacity 0.4s ease}
    .phase-progress{width:100%;height:3px;background:rgba(212,165,116,0.1);border-radius:2px;margin-top:16px;overflow:hidden}
    .phase-progress-bar{height:100%;background:linear-gradient(90deg,#c9956b,#d4a574);border-radius:2px;width:0%;transition:width 0.3s ease}

    /* ── FULL CHAT STATE ── */
    .chat-container{position:fixed;inset:0;z-index:5;display:none;opacity:0}
    .chat-container.visible{display:flex;opacity:1}

    /* ── RESPONSIVE ── */
    @media(max-width:480px){
      .landing-greeting{font-size:20px}
      .landing-chatbox-wrap{padding:0 16px}
      .landing-chips{padding:12px 16px 0;gap:6px}
      .landing-chip{font-size:11px;padding:6px 12px}
      .landing-mesh{width:140px;height:140px}
    }
  </style>
</head>
<body class="theme-gold">

  <script>
    // ═══════════════════════════════════════════
    //  LANDING PAGE LOGIC
    // ═══════════════════════════════════════════
    var landingInput = document.getElementById('landingInput');
    var landingSendBtn = document.getElementById('landingSendBtn');
    var landingContainer = document.getElementById('landingContainer');
    var phaseOverlay = document.getElementById('phaseOverlay');
    var chatContainer = document.getElementById('chatContainer');
    var landingPreview = document.getElementById('landingPreview');

    // Auto-resize landing textarea
    if (landingInput) {
      landingInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });
      landingInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendFromLanding();
        }
      });
    }

    // Select a suggestion chip
    function selectChip(text) {
      if (landingInput) {
        landingInput.value = text;
        landingInput.style.height = 'auto';
        landingInput.style.height = Math.min(landingInput.scrollHeight, 120) + 'px';
        landingInput.focus();
      }
    }

    // Send from landing — triggers phase animation then transition
    function sendFromLanding() {
      var text = landingInput ? landingInput.value.trim() : '';
      if (!text) return;

      if (landingSendBtn) landingSendBtn.disabled = true;

      // Store message for when chat opens
      window._landingMessage = text;

      // Start phase animation
      showPhaseAnimation(function() {
        // Phase complete — transition to chat
        transitionToChat();
      });
    }

    // Thinking → Planning → Coding phases
    function showPhaseAnimation(callback) {
      if (!phaseOverlay) return callback();

      var phases = [
        { icon: '💭', title: 'Thinking', subtexts: [
          'analyzing the request structure…',
          'identifying key requirements…',
          'considering edge cases…'
        ]},
        { icon: '📋', title: 'Planning', subtexts: [
          'breaking down into components…',
          'selecting optimal approach…',
          'outlining the architecture…'
        ]},
        { icon: '⚡', title: 'Coding', subtexts: [
          'generating implementation…',
          'applying best practices…',
          'optimizing for performance…'
        ]}
      ];

      var iconEl = document.getElementById('phaseIcon');
      var titleEl = document.getElementById('phaseTitle');
      var subtextEl = document.getElementById('phaseSubtext');
      var progressEl = document.getElementById('phaseProgress');

      phaseOverlay.classList.add('visible');

      function runPhase(index) {
        if (index >= phases.length) {
          // All phases done
          setTimeout(function() {
            phaseOverlay.classList.remove('visible');
            if (callback) callback();
          }, 400);
          return;
        }

        var phase = phases[index];
        if (iconEl) iconEl.textContent = phase.icon;
        if (titleEl) titleEl.textContent = phase.title;
        if (progressEl) progressEl.style.width = ((index / phases.length) * 100) + '%';

        // Cycle subtexts
        var subIdx = 0;
        if (subtextEl) subtextEl.textContent = phase.subtexts[0];

        var subInterval = setInterval(function() {
          subIdx++;
          if (subIdx >= phase.subtexts.length) {
            clearInterval(subInterval);
            // Move to next phase
            if (progressEl) progressEl.style.width = (((index + 1) / phases.length) * 100) + '%';
            setTimeout(function() { runPhase(index + 1); }, 300);
          } else {
            if (subtextEl) {
              subtextEl.style.opacity = '0';
              setTimeout(function() {
                subtextEl.textContent = phase.subtexts[subIdx];
                subtextEl.style.opacity = '1';
              }, 200);
            }
          }
        }, 800);
      }

      if (progressEl) progressEl.style.width = '0%';
      runPhase(0);
    }

    // Transition landing → full chat
    function transitionToChat() {
      // GSAP animate landing out
      if (typeof gsap !== 'undefined' && landingContainer) {
        gsap.to(landingContainer, {
          opacity: 0,
          scale: 0.95,
          duration: 0.5,
          ease: 'power2.in',
          onComplete: function() {
            landingContainer.classList.add('hidden');
            showChatLayout();
          }
        });
      } else {
        landingContainer.classList.add('hidden');
        showChatLayout();
      }
    }

    function showChatLayout() {
      if (chatContainer) {
        chatContainer.classList.add('visible');
        if (typeof gsap !== 'undefined') {
          gsap.fromTo(chatContainer, { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'power2.out' });
        }
      }

      // Initialize the app if it hasn't been
      if (typeof init === 'function') {
        if (!window._appInitialized) {
          init();
          window._appInitialized = true;
        } else {
          // Re-grab DOM in case elements were recreated
          if (typeof grabDOM === 'function') grabDOM();
        }
      }

      // Auto-send the landing message into the chat
      setTimeout(function() {
        if (window._landingMessage && typeof inputEl !== 'undefined' && inputEl) {
          inputEl.value = window._landingMessage;
          inputEl.style.height = 'auto';
          inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
          if (typeof sendMessage === 'function') {
            sendMessage();
          }
          window._landingMessage = null;
        }
        // Scroll to input
        if (typeof messagesEl !== 'undefined' && messagesEl) {
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }, 300);
    }

    // ═══════════════════════════════════════════
    //  3D ICON MESH (Mini version for landing)
    // ═══════════════════════════════════════════
    (function initLandingMesh() {
      var canvas = document.getElementById('landingMeshCanvas');
      var container = document.getElementById('landingMesh');
      if (!canvas || !container || typeof THREE === 'undefined') return;

      var scene = new THREE.Scene();
      var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      camera.position.z = 3;

      var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
      renderer.setSize(180, 180);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      // Lights
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      var key = new THREE.DirectionalLight(0xffffff, 1);
      key.position.set(5, 5, 5);
      scene.add(key);
      var rim = new THREE.DirectionalLight(0xd4a574, 0.5);
      rim.position.set(-3, 0, 3);
      scene.add(rim);

      // Load icon texture
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = 'icon.png';
      img.onload = function() {
        var texture = new THREE.CanvasTexture(img);
        var geo = new THREE.TorusGeometry(0.7, 0.35, 32, 64);
        var mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.3, metalness: 0.5, color: 0xffffff });
        var mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);

        function anim() {
          requestAnimationFrame(anim);
          mesh.rotation.y += 0.005;
          mesh.rotation.x += 0.002;
          renderer.render(scene, camera);
        }
        anim();
      };

      // Simple drag
      var isDragging = false, prevX = 0, prevY = 0;
      container.addEventListener('mousedown', function(e) {
        isDragging = true;
        prevX = e.clientX;
        prevY = e.clientY;
        container.style.cursor = 'grabbing';
      });
      window.addEventListener('mousemove', function(e) {
        if (!isDragging || !scene.children.length) return;
        var mesh = scene.children[scene.children.length - 1];
        mesh.rotation.y += (e.clientX - prevX) * 0.01;
        mesh.rotation.x += (e.clientY - prevY) * 0.01;
        prevX = e.clientX;
        prevY = e.clientY;
      });
      window.addEventListener('mouseup', function() {
        isDragging = false;
        if (container) container.style.cursor = 'grab';
      });
    })();
  </script>
  <script src="app.js"></script>
</body>
