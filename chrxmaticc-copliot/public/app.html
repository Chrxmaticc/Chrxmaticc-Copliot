<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0a">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="/manifest.json">
<title>Chrxmaticc Copilot</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;inset:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;transition:background .5s,color .5s}

:root{--a:#d4a574;--a2:#c9956b;--glow:rgba(212,165,116,.22);--bg:#0b0b0a;--surf:rgba(20,18,14,.9);--brd:rgba(212,165,116,.14);--txt:#e8d5c4;--mut:#7a6a5a}
body.theme-midnight{--a:#9090d8;--a2:#6060b0;--glow:rgba(130,130,220,.2);--bg:#08080f;--surf:rgba(12,12,22,.92);--brd:rgba(100,100,180,.15);--txt:#e0e0f0;--mut:#6060a0}
body.theme-glass{--a:#a0b8e8;--a2:#8090c8;--glow:rgba(140,170,230,.18);--bg:#080810;--surf:rgba(22,24,42,.5);--brd:rgba(255,255,255,.09);--txt:#e8e8f4;--mut:#7878a0}
body.theme-chrome{--a:#ccc;--a2:#999;--glow:rgba(200,200,200,.15);--bg:#141414;--surf:rgba(28,28,28,.96);--brd:rgba(80,80,80,.35);--txt:#e0e0e0;--mut:#666}
body.theme-white{--a:#0a84ff;--a2:#0055cc;--glow:rgba(10,132,255,.14);--bg:#f0f2f5;--surf:rgba(255,255,255,.97);--brd:rgba(0,0,0,.1);--txt:#1a1a1a;--mut:#999}
body.theme-chromatic{--a:#d4a574;--a2:#4a7fc0;--glow:rgba(150,130,200,.2);--bg:#0d0e14;--surf:rgba(20,20,28,.9);--brd:rgba(140,130,180,.16);--txt:#e8d5c4;--mut:#8a8a9a}
body.theme-liquid{--a:#bbb;--a2:#888;--glow:rgba(180,180,200,.18);--bg:#111114;--surf:rgba(24,24,28,.95);--brd:rgba(140,140,150,.2);--txt:#d4d4d8;--mut:#777}
body.theme-rainbow{--a:#ff9ff3;--a2:#ff6b6b;--glow:rgba(255,150,200,.18);--bg:#0e0e18;--surf:rgba(18,18,28,.95);--brd:rgba(255,255,255,.08);--txt:#f0f0f8;--mut:#888}

/* ═══ LAYOUT ═══ */
#app{display:flex;height:100%;width:100%;overflow:hidden!important}
.sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surf);border-right:1px solid var(--brd);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);z-index:50;transition:width .3s,margin-left .3s;overflow:hidden}
.sidebar.collapsed{width:56px}
.sidebar.collapsed .sidebar-section-title,.sidebar.collapsed .chat-item-name,.sidebar.collapsed .sidebar-new span,.sidebar.collapsed .sidebar-profile-name,.sidebar.collapsed .sidebar-chats-label{display:none}
.sidebar.collapsed .chat-item{justify-content:center;padding:10px 0}
.sidebar.collapsed .sidebar-new{justify-content:center;padding:10px 0}
.sidebar.collapsed .sidebar-profile{justify-content:center}
.sidebar.collapsed .sidebar-footer{padding:8px}
.sidebar-hdr{display:flex;align-items:center;gap:10px;padding:14px 14px 10px}
.sidebar-hdr img{width:28px!important;height:28px!important;border-radius:50%;object-fit:cover}
.sidebar-htitle{font-size:15px;font-weight:700;color:var(--txt);flex:1}
.sidebar-collapse-btn{background:none;border:none;cursor:pointer;color:var(--mut);padding:4px;display:flex;align-items:center;transition:color .2s}
.sidebar-collapse-btn:hover{color:var(--a)}
.sidebar-collapse-btn svg{width:16px;height:16px;transition:transform .3s}
.sidebar.collapsed .sidebar-collapse-btn svg{transform:rotate(180deg)}
.sidebar-section-title{font-size:10px;font-weight:700;color:var(--mut);letter-spacing:.8px;text-transform:uppercase;padding:8px 14px 4px}
.sidebar-new{display:flex;align-items:center;gap:8px;margin:4px 10px;padding:9px 12px;border-radius:10px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.sidebar-new:hover{border-color:var(--a);box-shadow:0 0 14px var(--glow)}
.sidebar-new svg{width:15px;height:15px;stroke:var(--a);flex-shrink:0}
.sidebar-chats-label{font-size:10px;font-weight:700;color:var(--mut);letter-spacing:.8px;text-transform:uppercase;padding:12px 14px 4px}
.sidebar-chats{flex:1;overflow-y:auto;padding:0 6px}
.sidebar-chats::-webkit-scrollbar{width:3px}
.sidebar-chats::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.chat-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;color:var(--txt);font-size:12px;transition:background .15s}
.chat-item:hover,.chat-item.active{background:var(--glow)}
.chat-item img{width:26px!important;height:26px!important;border-radius:50%;object-fit:cover;flex-shrink:0}
.chat-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.chat-item-time{font-size:9px;color:var(--mut);flex-shrink:0}
.sidebar-footer{border-top:1px solid var(--brd);padding:10px 10px;margin-top:auto}
.sidebar-profile{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:10px;cursor:pointer;font-size:12px;color:var(--txt);transition:background .15s}
.sidebar-profile:hover{background:var(--glow)}
.sidebar-profile img{width:26px!important;height:26px!important;border-radius:50%;object-fit:cover;flex-shrink:0}
.sidebar-profile-name{font-weight:500}

/* ═══ MAIN AREA ═══ */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ═══ PAGES ═══ */
.page{position:absolute;inset:0;display:none;flex-direction:column;transition:opacity .3s,transform .3s}
.page.active{display:flex}
.page.landing-page{align-items:center;justify-content:center}
.page.chat-page{display:none}
.page.chat-page.active{display:flex}
.page.settings-page{overflow-y:auto;padding:20px;align-items:center}

/* ═══ LANDING ═══ */
.land-inner{display:flex;flex-direction:column;align-items:center;width:100%;max-width:600px;padding:0 24px}
.mesh-wrap{position:relative;width:140px;height:140px;margin-bottom:18px;cursor:grab;touch-action:none;user-select:none;display:none}
.mesh-wrap.on{display:block}
.mesh-wrap:active{cursor:grabbing}
.mesh-wrap canvas{width:140px!important;height:140px!important;border-radius:0;display:block}
.mesh-glow{position:absolute;inset:-20px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,var(--glow) 0%,transparent 70%);animation:mglow 3s ease-in-out infinite}
@keyframes mglow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.mesh-fallback{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,var(--a) 0%,transparent 70%);opacity:.35;animation:mglow 3s ease-in-out infinite;display:none}
.mesh-fallback.on{display:block}
.greet{font-size:clamp(18px,4vw,28px);font-weight:700;letter-spacing:-.5px;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--a2),var(--a),var(--a2));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.greet-sub{font-size:12px;color:var(--mut);text-align:center;margin-bottom:22px;opacity:.8}

/* ═══ LANDING CHATBOX ═══ */
.lbox-wrap{width:100%;position:relative;z-index:2}
.lbox{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:18px;padding:6px 6px 6px 14px;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);box-shadow:0 6px 32px rgba(0,0,0,.35);transition:border-color .3s,box-shadow .3s,transform .2s}
.lbox:focus-within{border-color:var(--a);box-shadow:0 6px 40px rgba(0,0,0,.45),0 0 0 3px var(--glow);transform:translateY(-2px)}
.ltextarea{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:14px;font-family:inherit;resize:none;max-height:120px;min-height:44px;width:100%;padding:10px 4px 4px 0;line-height:1.5}
.ltextarea::placeholder{color:var(--mut);opacity:.5}
.lbox-bottom{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 2px}
.lbox-left{display:flex;align-items:center;gap:8px}
.lbox-right{display:flex;align-items:center;gap:8px}
.lmodel-badge{font-size:10px;color:var(--mut);background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:7px;padding:3px 8px;white-space:nowrap}
.lsend{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--a2),var(--a));transition:transform .2s,box-shadow .2s,opacity .2s;position:relative;overflow:hidden;opacity:.35}
.lsend.active{opacity:1}
.lsend:hover{transform:scale(1.08);box-shadow:0 0 24px var(--glow)}
.lsend:active{transform:scale(.94)}
.lsend svg{width:15px;height:15px;fill:var(--bg)}
.lattach{background:none;border:none;cursor:pointer;padding:5px;color:var(--mut);border-radius:8px;display:flex;align-items:center;transition:color .2s,background .2s}
.lattach:hover{color:var(--a);background:var(--glow)}
.landing-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;width:100%;padding:16px 0 0}
.chip{background:rgba(255,255,255,.04);border:1px solid var(--brd);color:var(--mut);padding:7px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .22s;white-space:nowrap;backdrop-filter:blur(12px);display:flex;align-items:center;gap:5px}
.chip:hover{border-color:var(--a);background:var(--glow);color:var(--txt);transform:translateY(-2px)}
.chip svg{width:13px;height:13px;flex-shrink:0}

/* ═══ THEME DOTS ═══ */
.land-themes{display:flex;gap:8px;justify-content:center;padding:16px 0 0;flex-wrap:wrap}
.ldot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .22s;position:relative}
.ldot:hover{transform:scale(1.2)}
.ldot.active{border-color:var(--a);box-shadow:0 0 10px var(--glow);transform:scale(1.1)}
.ldot::after{content:attr(data-label);position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--mut);opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.ldot:hover::after{opacity:1}

/* ═══ CHAT PAGE ═══ */
.chat-main{flex:1;display:flex;flex-direction:column;max-width:720px;margin:0 auto;width:100%;position:relative;overflow:hidden!important}
.chat-topbar{padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--surf);backdrop-filter:blur(24px)}
.chat-topbar-name{font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--a2),var(--a),var(--a2));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite;flex:1}
.chat-topbar-status{font-size:9px;display:flex;align-items:center;gap:4px;color:var(--mut)}
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sdot.online{background:#30d158;box-shadow:0 0 5px rgba(48,209,88,.5)}
.sdot.thinking{background:var(--a);animation:dp 1s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.4}}
.chat-topbar-actions{display:flex;align-items:center;gap:4px}
.chat-search-wrap{position:relative;display:none}
.chat-search-wrap.visible{display:block}
.chat-search-input{background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:8px;padding:5px 10px;color:var(--txt);font-size:11px;font-family:inherit;outline:none;width:160px;transition:border-color .2s}
.chat-search-input:focus{border-color:var(--a)}
.chat-search-results{position:absolute;top:100%;left:0;right:0;background:var(--surf);border:1px solid var(--brd);border-radius:10px;max-height:120px;overflow-y:auto;display:none;z-index:20;margin-top:4px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.chat-search-results.visible{display:block}
.chat-search-result{padding:8px 12px;cursor:pointer;font-size:11px;color:var(--txt);transition:background .15s}
.chat-search-result:hover{background:var(--glow)}
.chat-search-result .match{color:var(--a);font-weight:600}
.messages{flex:1 1 0!important;overflow-y:scroll!important;-webkit-overflow-scrolling:touch!important;padding:16px;display:flex;flex-direction:column;gap:8px;min-height:0!important;height:0!important}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.scroll-btm{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);z-index:20;width:34px;height:34px;border-radius:50%;background:var(--surf);border:1px solid var(--brd);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mut);opacity:0;pointer-events:none;transition:opacity .2s}
.scroll-btm.visible{opacity:1;pointer-events:auto}
.scroll-btm:hover{color:var(--a);border-color:var(--a)}
.scroll-btm svg{width:15px;height:15px}

/* ═══ BUBBLES ═══ */
.bubble-row{display:flex;flex-direction:column;max-width:82%;animation:bpop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes bpop{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bubble-row.user{align-self:flex-end;align-items:flex-end}
.bubble-row.ai{align-self:flex-start;align-items:flex-start}
.bubble{padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.bubble-row.user .bubble{border-bottom-right-radius:4px}
.bubble-row.ai .bubble{border-bottom-left-radius:4px}
body.theme-gold .bubble-row.ai .bubble{background:linear-gradient(145deg,#141210,#111009);border:1px solid rgba(212,165,116,.1)}
body.theme-gold .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(212,165,116,.18),rgba(201,149,107,.12));border:1px solid rgba(212,165,116,.25)}
body.theme-midnight .bubble-row.ai .bubble{background:linear-gradient(145deg,#111120,#0e0e1c);border:1px solid rgba(100,100,180,.14)}
body.theme-midnight .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(80,60,180,.25),rgba(60,40,160,.18));border:1px solid rgba(120,100,200,.3)}
body.theme-glass .bubble-row.ai .bubble{background:rgba(28,30,50,.45);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
body.theme-glass .bubble-row.user .bubble{background:rgba(70,80,140,.35);backdrop-filter:blur(20px);border:1px solid rgba(160,180,240,.2)}
body.theme-chrome .bubble-row.ai .bubble{background:#202020;border:1px solid #2e2e2e}
body.theme-chrome .bubble-row.user .bubble{background:#3a3a3a;border:1px solid #484848}
body.theme-white .bubble-row.ai .bubble{background:#fff;border:1px solid #e8ebf0;box-shadow:0 2px 12px rgba(0,0,0,.06)}
body.theme-white .bubble-row.user .bubble{background:linear-gradient(145deg,#0a84ff,#0077ed);color:#fff}
body.theme-chromatic .bubble-row.ai .bubble{background:linear-gradient(145deg,#16161e,#131320);border:1px solid rgba(100,120,180,.14)}
body.theme-chromatic .bubble-row.user .bubble{background:linear-gradient(145deg,rgba(212,165,116,.13),rgba(74,127,192,.08));border:1px solid rgba(150,130,200,.2)}
body.theme-liquid .bubble-row.ai .bubble{background:#1e1e22;border:1px solid rgba(140,140,150,.15)}
body.theme-liquid .bubble-row.user .bubble{background:linear-gradient(135deg,#2e2e34,#3a3a40);border:1px solid rgba(180,180,195,.15)}
body.theme-rainbow .bubble-row.ai .bubble{background:#171722;border:1px solid rgba(255,255,255,.08)}
body.theme-rainbow .bubble-row.user .bubble{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14)}
.msg-actions{display:flex;gap:4px;margin-top:4px;opacity:0;transition:opacity .15s}
.bubble-row:hover .msg-actions{opacity:1}
.msg-act-btn{background:rgba(255,255,255,.04);border:1px solid var(--brd);color:var(--mut);padding:3px 7px;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s}
.msg-act-btn:hover{border-color:var(--a);color:var(--a);background:var(--glow)}
.quick-replies{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.qr-btn{background:rgba(255,255,255,.03);border:1px solid var(--brd);color:var(--mut);padding:4px 9px;border-radius:12px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s}
.qr-btn:hover{border-color:var(--a);color:var(--txt);background:var(--glow)}
.ts{font-size:9px;margin:2px 6px;opacity:0;transition:opacity .2s;color:var(--mut)}
.bubble-row:hover .ts{opacity:1}
.pbadge{font-size:8px;margin:2px 6px;opacity:.4;font-style:italic;color:var(--mut)}

/* ═══ THINKING / TODO / PLAN ═══ */
.think-block{align-self:flex-start;max-width:82%;background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:4px}
.think-hdr{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;user-select:none}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--mut);animation:bounce 1.2s infinite}
.tdot.d2{animation-delay:.2s}.tdot.d3{animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.tlabel{font-size:10px;color:var(--mut);font-style:italic;flex:1}
.tchev{width:11px;height:11px;color:var(--mut);transition:transform .25s;flex-shrink:0}
.think-block.open .tchev{transform:rotate(180deg)}
.think-body{max-height:0;overflow:hidden;transition:max-height .35s}
.think-block.open .think-body{max-height:400px}
.think-text{padding:8px 12px 10px;font-size:11px;color:var(--mut);line-height:1.5;white-space:pre-wrap;border-top:1px solid var(--brd)}
.todo-block{align-self:flex-start;width:min(500px,90%);background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin:4px 0}
.todo-title{font-size:11px;font-weight:700;color:var(--a);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.todo-list{display:flex;flex-direction:column;gap:3px}
.todo-item{font-size:11px;color:var(--mut);padding:5px 8px;border-radius:7px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;background:transparent}
.todo-item:hover{background:var(--glow);color:var(--txt)}
.todo-item .check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--mut);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.todo-item.done .check{background:var(--a);border-color:var(--a)}
.todo-item.done{opacity:.5;text-decoration:line-through}
.plan-block{align-self:flex-start;width:min(500px,90%);background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:14px;padding:16px;margin:4px 0}
.plan-prog-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.plan-prog-track{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px}
.plan-prog-fill{height:100%;border-radius:2px;background:var(--a);transition:width .4s}
.plan-qcount{font-size:9px;color:var(--mut)}
.plan-q{font-size:13px;font-weight:600;color:var(--a);line-height:1.4;margin-bottom:12px}
.plan-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.plan-opt{background:rgba(255,255,255,.04);border:1px solid var(--brd);color:var(--txt);padding:10px 12px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
.plan-opt:hover{border-color:var(--a);background:var(--glow);transform:translateY(-1px)}
.plan-opt.custom{grid-column:1/-1;border-style:dashed;color:var(--mut);background:transparent}

/* ═══ TYPING / CODE ═══ */
.typing-ind{display:none;align-self:flex-start;padding:10px 14px;gap:4px}
.typing-ind.on{display:flex}
.tdot2{width:6px;height:6px;border-radius:50%;background:var(--a);animation:bounce 1.2s infinite}
.tdot2:nth-child(2){animation-delay:.2s}.tdot2:nth-child(3){animation-delay:.4s}
.typing-cur{display:inline-block;animation:blink .7s infinite;color:var(--a)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.code-block{margin:4px 0;overflow:hidden;background:rgba(0,0,0,.2);border:1px solid var(--brd);border-left:3px solid var(--a);border-radius:8px}
.code-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;font-size:9px;color:var(--mut)}
.code-copy{border:none;padding:2px 7px;border-radius:4px;font-size:9px;cursor:pointer;font-family:inherit;background:var(--surf);color:var(--mut)}
.code-copy:hover{color:var(--a)}
.code-block pre{padding:8px 12px;margin:0;overflow-x:auto;font-size:11px;line-height:1.5;font-family:'SF Mono','Fira Code',monospace;white-space:pre-wrap;word-break:break-word;color:var(--txt)}
.inline-code{padding:1px 4px;border-radius:3px;font-family:'SF Mono','Fira Code',monospace;font-size:11px;background:rgba(255,255,255,.07);color:var(--a)}
.code-actions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.caction{display:flex;align-items:center;gap:3px;padding:5px 10px;border-radius:7px;border:1px solid var(--brd);font-size:10px;cursor:pointer;font-family:inherit;background:var(--surf);color:var(--txt);transition:all .15s}
.caction:hover{border-color:var(--a);box-shadow:0 0 8px var(--glow)}
.caction svg{width:11px;height:11px}
.caction.accept{border-color:rgba(48,209,88,.3);color:#30d158}
.caction.reject{border-color:rgba(255,69,58,.3);color:#ff453a}
.caction.preview{border-color:rgba(10,132,255,.3);color:#0a84ff}

/* ═══ INPUT BAR ═══ */
.inputbar{padding:8px 10px 10px!important;border-top:1px solid var(--brd)!important;display:flex!important;flex-direction:column!important;gap:6px!important;flex-shrink:0!important;background:var(--surf)!important;backdrop-filter:blur(24px)!important;width:100%!important;max-width:100%!important;min-width:0!important;margin:0!important}
.input-box{display:flex!important;align-items:flex-end!important;gap:6px!important;background:rgba(255,255,255,.04)!important;border:1px solid var(--brd)!important;border-radius:14px!important;padding:3px 3px 3px 12px!important;transition:border-color .25s,box-shadow .25s!important;width:100%!important;box-sizing:border-box!important}
.input-box:focus-within{border-color:var(--a)!important;box-shadow:0 0 0 2px var(--glow)!important}
#userInput{background:transparent!important;border:none!important;outline:none!important;width:100%!important;color:var(--txt)!important;font-size:14px!important;font-family:inherit!important;resize:none!important;max-height:100px!important;padding:9px 0!important;line-height:1.45!important;flex:1!important}
#userInput::placeholder{color:var(--mut)!important;opacity:.5!important}
.send-btn{width:36px!important;height:36px!important;border-radius:10px!important;border:none!important;cursor:pointer!important;display:flex!important;align-items:center!important;justify-content:center!important;flex-shrink:0!important;background:linear-gradient(135deg,var(--a2),var(--a))!important;transition:transform .2s,box-shadow .2s!important;margin:2px!important}
.send-btn:hover{transform:scale(1.06)!important;box-shadow:0 0 18px var(--glow)!important}
.send-btn svg{width:14px!important;height:14px!important;fill:var(--bg)!important}
.input-toolbar{display:flex!important;align-items:center!important;gap:5px!important;overflow-x:auto!important;scrollbar-width:none!important;width:100%!important}
.input-toolbar::-webkit-scrollbar{display:none!important}
.wf-pill{display:flex!important;align-items:center!important;gap:4px!important;padding:6px 10px!important;border-radius:18px!important;border:1px solid var(--brd)!important;background:var(--surf)!important;color:var(--txt)!important;font-size:11px!important;font-weight:600!important;cursor:pointer!important;font-family:inherit!important;transition:all .22s!important;white-space:nowrap!important;flex-shrink:0!important}
.wf-pill:hover{border-color:var(--a)!important;background:var(--glow)!important}
.wf-pill.active{border-color:var(--a)!important;background:var(--glow)!important}
.wf-pill svg{width:11px!important;height:11px!important;stroke:var(--a)!important;flex-shrink:0!important}
.tool-btn{display:flex!important;align-items:center!important;justify-content:center!important;width:30px!important;height:30px!important;border-radius:9px!important;border:1px solid var(--brd)!important;background:var(--surf)!important;cursor:pointer!important;color:var(--mut)!important;transition:all .2s!important;flex-shrink:0!important}
.tool-btn:hover{color:var(--a)!important;border-color:var(--a)!important;background:var(--glow)!important}
.tool-btn svg{width:14px!important;height:14px!important}
.model-pill{display:flex!important;align-items:center!important;gap:4px!important;padding:6px 10px!important;border-radius:18px!important;border:1px solid var(--brd)!important;background:var(--surf)!important;color:var(--txt)!important;font-size:11px!important;font-weight:600!important;cursor:pointer!important;font-family:inherit!important;transition:all .22s!important;white-space:nowrap!important;flex-shrink:0!important}
.model-pill:hover{border-color:var(--a)!important;background:var(--glow)!important}
.model-pill svg{width:9px!important;height:9px!important;stroke:var(--mut)!important;flex-shrink:0!important}
.gh-pill{display:flex!important;align-items:center!important;gap:4px!important;padding:6px 10px!important;border-radius:18px!important;border:1px solid var(--brd)!important;background:var(--surf)!important;color:var(--txt)!important;font-size:11px!important;font-weight:600!important;cursor:pointer!important;font-family:inherit!important;transition:all .22s!important;white-space:nowrap!important;flex-shrink:0!important}
.gh-pill:hover{border-color:var(--a)!important;background:var(--glow)!important}
.gh-pill.connected{border-color:rgba(48,209,88,.4)!important;color:#30d158!important}
.gh-pill svg{width:12px!important;height:12px!important;fill:currentColor!important;flex-shrink:0!important}
.tb-spacer{flex:1!important}

/* ═══ POPOVERS ═══ */
.popover{position:fixed;z-index:500;background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:0;box-shadow:0 10px 40px rgba(0,0,0,.5);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);display:none;animation:popIn .2s cubic-bezier(.34,1.56,.64,1);max-height:75vh;overflow:hidden}
.popover.on{display:flex!important;flex-direction:column!important}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pop-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;border-bottom:1px solid var(--brd);flex-shrink:0}
.pop-title{font-size:12px;font-weight:700;color:var(--txt)}
.pop-close{background:none;border:none;cursor:pointer;color:var(--mut);font-size:15px;padding:2px 5px;line-height:1}
.pop-body{padding:10px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto!important;flex:1 1 auto;max-height:50vh}
.pop-body::-webkit-scrollbar{width:3px}
.pop-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.pop-section-title{font-size:9px;font-weight:700;color:var(--mut);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px}
#settingsPop{width:320px}
#modelPop{width:280px}

/* ═══ FLOATING ═══ */
.theme-pill{position:fixed;bottom:80px;right:10px;z-index:150;display:flex;flex-direction:column;gap:4px;padding:4px;border-radius:20px;border:1px solid var(--brd);background:var(--surf);backdrop-filter:blur(20px);box-shadow:0 4px 20px rgba(0,0,0,.35);opacity:.3;transition:opacity .3s}
.theme-pill:hover{opacity:1}
.tdot2{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .22s}
.tdot2:hover{transform:scale(1.18)}
.tdot2.active{border-color:var(--a);box-shadow:0 0 8px var(--glow)}
.wwcd-btn{position:fixed;bottom:80px;left:12px;z-index:150;width:34px;height:34px;border-radius:50%;border:1px solid var(--brd);background:var(--surf);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);opacity:.4;transition:opacity .2s,box-shadow .2s}
.wwcd-btn:hover{opacity:1;box-shadow:0 0 14px var(--glow)}
.wwcd-btn svg{width:14px;height:14px}
.app-toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);padding:9px 16px;border-radius:10px;font-size:11px;z-index:300;backdrop-filter:blur(20px);display:flex;align-items:center;gap:8px;animation:toastIn .3s ease,toastOut .3s ease 2.5s forwards;pointer-events:none;font-weight:500;max-width:320px;border:1px solid var(--brd);border-left:3px solid var(--a);background:var(--surf);color:var(--txt)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-6px)}}
.confetti-cv{position:fixed;inset:0;pointer-events:none;z-index:500;display:none}
.achieve-pop{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:600;background:var(--surf);border:1px solid var(--a);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:achieveIn .5s cubic-bezier(.34,1.56,.64,1),achieveOut .5s ease 3s forwards;pointer-events:none}
@keyframes achieveIn{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes achieveOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.achieve-icon{font-size:24px}
.achieve-text{font-size:12px;font-weight:600;color:var(--txt)}
.achieve-sub{font-size:9px;color:var(--mut);margin-top:1px}
.uc-flare{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;background:radial-gradient(ellipse at 50% 110%,var(--glow) 0%,transparent 60%);transition:opacity .4s}
.uc-flare.on{opacity:1;animation:ucf 2s ease-in-out infinite}
@keyframes ucf{0%,100%{opacity:.6}50%{opacity:1}}

@media(max-width:600px){
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:100;width:280px;transition:left .3s}
  .sidebar.open{left:0}
  .sidebar.collapsed{width:280px}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .sidebar-overlay.on{display:block}
  .main-area{margin-left:0!important}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>
<body class="theme-gold">
<div class="uc-flare" id="ucFlare"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div id="app">
  <!-- ═══ SIDEBAR ═══ -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hdr">
      <img src="icon.png" alt="">
      <div class="sidebar-htitle">Chrxmaticc</div>
      <button class="sidebar-collapse-btn" onclick="toggleSidebarCollapse()" title="Collapse sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

    <!-- LANDING PAGE -->

          <div class="ldot" data-theme="liquid" data-label="Liquid" onclick="setTheme('liquid')" style="background:linear-gradient(135deg,#888,#bbb)"></div>
          <div class="ldot" data-theme="rainbow" data-label="Rainbow" onclick="setTheme('rainbow')" style="background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3)"></div>
        </div>
      </div>
    </div>

    <!-- CHAT PAGE -->
    <div class="page chat-page" id="chatPage">
      <div class="chat-main">
        <div class="chat-topbar">
          <div class="chat-topbar-name">Chrxmaticc Copilot</div>

            <button class="tool-btn" onclick="navigateTo('settings')" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>

            <button class="gh-pill" id="ghPill" onclick="openSettings()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg><span id="ghLabel">GitHub</span></button>

    <!-- SETTINGS PAGE (inline) -->
    <div class="page settings-page" id="settingsPage" style="background:var(--bg);color:var(--txt)">

                <input id="settingsDisplayName" placeholder="Display Name" style="background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;color:var(--txt);font-size:14px;font-family:inherit;outline:none;width:100%;margin-bottom:6px" oninput="autoSaveSettings()">

  </div>

  <!-- POPOVERS -->
  <div class="popover" id="settingsPop"><div class="pop-hdr"><div class="pop-title">Workflow Settings</div><button class="pop-close" onclick="closePop('settingsPop')">✕</button></div><div class="pop-body" id="settingsPopBody"></div></div>
  <div class="popover" id="modelPop"><div class="pop-hdr"><div class="pop-title">Select Model</div><button class="pop-close" onclick="closePop('modelPop')">✕</button></div><div class="pop-body"><div id="modelOptions" style="display:flex;flex-direction:column;gap:4px"></div></div></div>

  <!-- FLOATING -->
  <div class="theme-pill" id="themePill">

</div>

<script>
/* ═══ ICONS ═══ */
var ICONS={react:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-30 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(30 12 12)"/></svg>',css:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 4-9 4-9-4 9-4z"/><path d="M3 8v8l9 4 9-4V8"/></svg>',book:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>',server:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>',bug:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 7a3 3 0 013 3v4a3 3 0 01-6 0v-4a3 3 0 013-3z"/><path d="M8 7V5a4 4 0 018 0v2"/></svg>',db:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/></svg>',test:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg>',zap:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',star:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0l2.5 7.5L22 3l-4 7.5L24 12l-8 1.5L18 21l-3-6.5L10 22l1-8.5L2 15l5-5.5L0 6l8-3L12 0z"/></svg>'};

/* ═══ DATA ═══ */
var WORKFLOWS=[{key:'code',label:'Code',color:'#30d158'},{key:'plan',label:'Plan',color:'#0a84ff'},{key:'review',label:'Review',color:'#ff9f0a'},{key:'surprise',label:'Surprise',color:'#ff6b6b'},{key:'cancel',label:'Chat',color:null}];
var MODELS=[{key:'conversational',label:'Conversational 2.0',short:'Convo 2.0',desc:'Casual, natural chat.'},{key:'sonnet',label:'Sonnet 2.3',short:'Sonnet 2.3',desc:'Smart and balanced.'},{key:'intermediate',label:'Intermediate 1.5',short:'Inter 1.5',desc:'Faster with solid reasoning.'},{key:'speed',label:'Speed 1.0',short:'Speed 1.0',desc:'Fastest model.'},{key:'vision',label:'Vision 2.0',short:'Vision 2.0',desc:'Image-aware.'}];
var THEME_META={gold:'#0b0b0a',midnight:'#08080f',glass:'#0a0a0f',chrome:'#141414',white:'#f0f2f5',chromatic:'#0d0e14',liquid:'#111114',rainbow:'#0e0e18'};
var _theme='gold',_wf='code',_model='sonnet',_effort='medium',_msgCount=0;
var _savedChats={},_currentChatId=null,_conversation=[];

/* ═══ THEME ═══ */
function setTheme(t){_theme=t;document.body.className='theme-'+t;localStorage.setItem('chrxmaticc_theme',t);document.querySelectorAll('[data-theme]').forEach(function(e){e.classList.toggle('active',e.getAttribute('data-theme')===t)});var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=THEME_META[t]||'#0b0b0a';renderSettingsThemes()}
(function(){setTheme(localStorage.getItem('chrxmaticc_theme')||'gold')})();

/* ═══ NAVIGATION ═══ */
function navigateTo(page){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  if(page==='landing'){document.getElementById('landingPage').classList.add('active');loadProfile()}
  else if(page==='chat'){document.getElementById('chatPage').classList.add('active')}
  else if(page==='settings'){document.getElementById('settingsPage').classList.add('active');loadSettingsPage()}
  if(window.innerWidth<600)document.getElementById('sidebar').classList.remove('open');
}
function toggleSidebar(){
  if(window.innerWidth<600){var s=document.getElementById('sidebar'),o=document.getElementById('sidebarOverlay');s.classList.toggle('open');o.classList.toggle('on')}
}
function toggleSidebarCollapse(){document.getElementById('sidebar').classList.toggle('collapsed')}

/* ═══ PROFILE ═══ */
function loadProfile(){
  var u=null;try{u=JSON.parse(localStorage.getItem('chrxmaticc_user'))}catch(e){}
  var prof={};try{prof=JSON.parse(localStorage.getItem('chrxmaticc_profile')||'{}')}catch(e){}
  var name=(u&&u.displayName)||prof.displayName||'Guest';
  document.getElementById('sidebarProfileName').textContent=name;
  if(u&&u.avatar)document.getElementById('sidebarAvatar').src=u.avatar;
  var h=new Date().getHours(),g=h<5?'Good night':h<12?'Good morning':h<17?'Good afternoon':h<21?'Good evening':'Good night';
  document.getElementById('greetEl').textContent=g+', '+name+'.';
}
loadProfile();

/* ═══ CHIPS ═══ */
(function(){var c=document.getElementById('landChips');if(!c)return;var chips=[{icon:ICONS.react,label:'React component',text:'Build a responsive React navbar'},{icon:ICONS.css,label:'Dark mode',text:'Create a dark mode toggle with CSS'},{icon:ICONS.book,label:'Async/Await',text:'Explain async/await in JavaScript'},{icon:ICONS.server,label:'Express API',text:'Write a REST API with Express'},{icon:ICONS.bug,label:'Python debug',text:'Debug a Python recursion error'},{icon:ICONS.db,label:'DB Schema',text:'Design a PostgreSQL schema'},{icon:ICONS.test,label:'Unit tests',text:'Write unit tests with Jest'},{icon:ICONS.zap,label:'Optimize',text:'Optimize a React render loop'}];c.innerHTML=chips.map(function(ch){return'<button class="chip" onclick="chipGo(\''+ch.text.replace(/'/g,"\\'")+'\')">'+ch.icon+' '+ch.label+'</button>'}).join('')})();

/* ═══ SEND BUTTON ═══ */
var landInput=document.getElementById('landInput');
if(landInput){landInput.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';var btn=document.getElementById('lSendBtn');if(btn)btn.classList.toggle('active',this.value.trim().length>0)});landInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFromLanding()}})}
function chipGo(t){if(!landInput)return;landInput.value=t;landInput.style.height='auto';landInput.style.height=Math.min(landInput.scrollHeight,120)+'px';var btn=document.getElementById('lSendBtn');if(btn)btn.classList.add('active');sendFromLanding()}
function sendFromLanding(){var t=landInput?landInput.value.trim():'';if(!t)return;var btn=document.getElementById('lSendBtn');if(btn)btn.disabled=true;window._pendingMsg=t;navigateTo('chat');setTimeout(function(){var inp=document.getElementById('userInput');if(window._pendingMsg&&inp){inp.value=window._pendingMsg;inp.style.height='auto';window._pendingMsg=null;if(typeof sendMessage==='function')sendMessage()}},300)}
function newChat(){_conversation=[];var msgs=document.getElementById('messages');if(msgs)msgs.innerHTML='';navigateTo('landing');if(landInput)landInput.value='';loadSavedChats()}

/* ═══ SAVED CHATS ═══ */
function loadSavedChats(){
  try{_savedChats=JSON.parse(localStorage.getItem('chrxmaticc_chats')||'{}')}catch(e){_savedChats={}}
  var el=document.getElementById('savedChatsList');if(!el)return;
  var ids=Object.keys(_savedChats).sort(function(a,b){return (_savedChats[b].timestamp||0)-(_savedChats[a].timestamp||0)});
  el.innerHTML=ids.slice(0,20).map(function(id){var c=_savedChats[id];return'<div class="chat-item'+(id===_currentChatId?' active':'')+'" onclick="openChat(\''+id+'\')"><img src="icon.png" alt=""><div class="chat-item-name">'+(c.name||'Chat')+'</div><div class="chat-item-time">'+formatChatTime(c.timestamp)+'</div></div>'}).join('');
}
function formatChatTime(ts){if(!ts)return'';var d=new Date(ts),now=new Date();if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString([],{month:'short',day:'numeric'})}
function openChat(id){_currentChatId=id;var c=_savedChats[id];_conversation=c?.conversation||[];navigateTo('chat');var msgs=document.getElementById('messages');if(msgs){msgs.innerHTML='';_conversation.forEach(function(m){if(typeof addBubbleNoSave==='function')addBubbleNoSave(m.content,m.role==='user'?'user':'ai')})}loadSavedChats()}
function saveCurrentChat(){if(!_currentChatId||!_conversation.length)return;if(!_savedChats[_currentChatId])_savedChats[_currentChatId]={name:'Chat',conversation:[],timestamp:Date.now()};_savedChats[_currentChatId].conversation=_conversation.slice(-50);_savedChats[_currentChatId].timestamp=Date.now();var p=_conversation[0]?.content?.slice(0,30)||'Chat';if(!_savedChats[_currentChatId].name||_savedChats[_currentChatId].name==='New Chat')_savedChats[_currentChatId].name=p;localStorage.setItem('chrxmaticc_chats',JSON.stringify(_savedChats));loadSavedChats()}
window.saveCurrentChat=saveCurrentChat;
window.getConversation=function(){return _conversation}
window.setConversation=function(c){_conversation=c}
window.getCurrentChatId=function(){return _currentChatId}
window.setCurrentChatId=function(id){_currentChatId=id;if(!_savedChats[id])_savedChats[id]={name:'New Chat',conversation:[],timestamp:Date.now()};localStorage.setItem('chrxmaticc_chats',JSON.stringify(_savedChats))}
loadSavedChats();

/* ═══ SETTINGS PAGE ═══ */
function renderSettingsThemes(){
  var el=document.getElementById('settingsThemes');if(!el)return;
  var themes=[{key:'gold',bg:'#0b0b0a'},{key:'midnight',bg:'#08080f'},{key:'glass',bg:'rgba(20,20,30,.85)'},{key:'chrome',bg:'#1a1a1a'},{key:'white',bg:'#f5f5f7;border:1px solid #ddd'},{key:'chromatic',bg:'linear-gradient(135deg,#d4a574,#4a7fc0)'},{key:'liquid',bg:'linear-gradient(135deg,#888,#bbb)'},{key:'rainbow',bg:'linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3)'}];
  el.innerHTML=themes.map(function(t){return'<div class="ldot'+(t.key===_theme?' active':'')+'" data-theme="'+t.key+'" onclick="setTheme(\''+t.key+'\')" style="background:'+t.bg+'"></div>'}).join('');
}
function loadSettingsPage(){
  var prof={};try{prof=JSON.parse(localStorage.getItem('chrxmaticc_profile')||'{}')}catch(e){}
  document.getElementById('settingsDisplayName').value=prof.displayName||'';
  document.getElementById('settingsPersonalInfo').value=prof.personalInfo||'';
  if(prof.avatar)document.getElementById('settingsAvatar').src=prof.avatar;
  renderSettingsThemes();
}
function autoSaveSettings(){
  var prof={};try{prof=JSON.parse(localStorage.getItem('chrxmaticc_profile')||'{}')}catch(e){}
  prof.displayName=document.getElementById('settingsDisplayName').value.trim();
  prof.personalInfo=document.getElementById('settingsPersonalInfo').value.trim();
  localStorage.setItem('chrxmaticc_profile',JSON.stringify(prof));
  loadProfile();
}
function handleSettingsAvatar(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();reader.onload=function(e){var prof={};try{prof=JSON.parse(localStorage.getItem('chrxmaticc_profile')||'{}')}catch(e){}prof.avatar=e.target.result;localStorage.setItem('chrxmaticc_profile',JSON.stringify(prof));document.getElementById('settingsAvatar').src=e.target.result;document.getElementById('sidebarAvatar').src=e.target.result};
  reader.readAsDataURL(file);
}
function clearAllData(){if(confirm('Delete all chats, settings, and data?')){localStorage.clear();location.reload()}}

/* ═══ CHAT SEARCH ═══ */
function toggleChatSearch(){var w=document.getElementById('chatSearchWrap');w.classList.toggle('visible');if(w.classList.contains('visible'))document.getElementById('chatSearchInput').focus()}
function searchMessages(q){
  var results=document.getElementById('chatSearchResults');if(!q||q.length<2){results.classList.remove('visible');return}
  var matches=[];_conversation.forEach(function(m,i){if(m.content&&m.content.toLowerCase().includes(q.toLowerCase()))matches.push({index:i,role:m.role,text:m.content.slice(0,120)})});
  if(!matches.length){results.classList.remove('visible');return}
  results.innerHTML=matches.map(function(m){return'<div class="chat-search-result" onclick="scrollToMessage('+m.index+')"><span class="match">'+(m.role==='user'?'You':'AI')+'</span>: '+m.text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="match">$1</span>')+'</div>'}).join('');
  results.classList.add('visible');
}
function scrollToMessage(idx){document.getElementById('chatSearchResults').classList.remove('visible');var bubbles=document.querySelectorAll('.messages .bubble-row');if(bubbles[idx])bubbles[idx].scrollIntoView({behavior:'smooth',block:'center'})}

/* ═══ WORKFLOW ═══ */
var _wfIdx=0;
function cycleWorkflow(){_wfIdx=(_wfIdx+1)%WORKFLOWS.length;var wf=WORKFLOWS[_wfIdx];_wf=wf.key;document.getElementById('wfLabel').textContent=wf.label;var p=document.getElementById('wfPill');p.classList.toggle('active',wf.key!=='cancel');if(wf.color&&wf.key!=='cancel'){p.style.borderColor=wf.color+'88';p.style.boxShadow='0 0 12px '+wf.color+'44'}else{p.style.borderColor='';p.style.boxShadow=''}}
window.getCurrentWorkflow=function(){return _wf}

/* ═══ MODEL ═══ */
function openModelPop(){
  var el=document.getElementById('modelOptions');el.innerHTML=MODELS.map(function(m){return'<div style="padding:10px 12px;border-radius:10px;border:1px solid '+(m.key===_model?'var(--a)':'transparent')+';cursor:pointer;transition:all .15s;background:'+(m.key===_model?'var(--glow)':'transparent')+'" onclick="selectModel(\''+m.key+'\')"><div style="font-size:13px;font-weight:600;color:var(--txt)">Chrxmaticc '+m.label+'</div><div style="font-size:10px;color:var(--mut);margin-top:2px">'+m.desc+'</div></div>'}).join('');
  openPop('modelPop',document.getElementById('modelPill'));
}
function selectModel(key){_model=key;var m=MODELS.find(function(x){return x.key===key});document.getElementById('modelLabel').textContent=m?m.short:key;document.getElementById('lModelBadge').textContent=m?m.short:key;closePop('modelPop')}
window.getCurrentModel=function(){return _model}

/* ═══ POPOVERS ═══ */
function openPop(id,anchor){closePop('settingsPop');closePop('modelPop');var p=document.getElementById(id);if(!p)return;p.classList.add('on');if(anchor){var r=anchor.getBoundingClientRect(),top=r.top-p.offsetHeight-8;if(top<8)top=r.bottom+8;var left=Math.max(8,Math.min(r.left,window.innerWidth-p.offsetWidth-8));p.style.top=top+'px';p.style.left=left+'px'}setTimeout(function(){document.addEventListener('click',function po(e){if(!e.target.closest('.popover')&&!e.target.closest('#settingsBtn')&&!e.target.closest('#modelPill')){closePop('settingsPop');closePop('modelPop');document.removeEventListener('click',po)}},{once:true})},10)}
function closePop(id){var p=document.getElementById(id);if(p)p.classList.remove('on')}
function openSettings(){
  var body=document.getElementById('settingsPopBody');
  body.innerHTML='<div><div class="pop-section-title">Effort</div><div style="display:flex;align-items:center;gap:8px"><input type="range" min="0" max="3" value="1" oninput="updateEffort(this.value)" style="flex:1;accent-color:var(--a)"><span id="effortLabel" style="font-size:11px;color:var(--txt)">medium</span></div></div>'
    +'<div><div class="pop-section-title">GitHub</div><button onclick="connectGitHub()" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--brd);background:transparent;color:var(--txt);font-size:12px;cursor:pointer;font-family:inherit">Connect GitHub</button></div>';
  openPop('settingsPop',document.getElementById('settingsBtn'));
}
function updateEffort(v){var labels=['low','medium','high','extreme'];_effort=labels[parseInt(v)];document.getElementById('effortLabel').textContent=_effort;var fl=document.getElementById('ucFlare');if(fl)fl.className='uc-flare'+(_effort==='extreme'?' on':'')}
window.getCurrentEffort=function(){return _effort}
function connectGitHub(){toast('GitHub connect — redirecting…')}

/* ═══ TOAST ═══ */
function toast(m){var t=document.createElement('div');t.className='app-toast';t.innerHTML=ICONS.star+m;document.body.appendChild(t);setTimeout(function(){if(t.parentNode)t.remove()},2500)}

/* ═══ WWCD ═══ */
function whatWouldChrxmaticcDo(){var r=Math.random();if(r<0.2){launchConfetti();toast('🎉 Surprise!')}else if(r<0.4){var themes=['midnight','glass','chrome','chromatic','liquid','rainbow'];var orig=_theme;setTheme(themes[Math.floor(Math.random()*themes.length)]);toast('🌀 Theme swap!');setTimeout(function(){setTheme(orig)},3000)}else{var q=['you\'re doing great.','the chrome demon approves.','commit 368 will be legendary.'];toast(q[Math.floor(Math.random()*q.length)])}}

/* ═══ CONFETTI ═══ */
function launchConfetti(){var c=document.getElementById('confettiCanvas');if(!c)return;c.width=window.innerWidth;c.height=window.innerHeight;c.style.display='block';var ctx=c.getContext('2d'),ps=[];for(var i=0;i<50;i++)ps.push({x:Math.random()*c.width,y:-20,vx:(Math.random()-.5)*6,vy:Math.random()*4+2,s:Math.random()*5+3,color:'hsl('+Math.random()*360+',80%,60%)',r:Math.random()*360});function anim(){ctx.clearRect(0,0,c.width,c.height);var a=false;ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.r+=2;if(p.y<c.height+20){a=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ctx.restore()}});if(a)requestAnimationFrame(anim);else c.style.display='none'}anim()}

/* ═══ SCROLL ═══ */
function scrollToBottom(){var m=document.getElementById('messages');if(m)m.scrollTop=m.scrollHeight}
window.scrollToBottom=scrollToBottom;

/* ═══ AUTO-RESIZE ═══ */
(function(){var inp=document.getElementById('userInput');if(!inp)return;inp.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(typeof sendMessage==='function')sendMessage()}})})();

/* ═══ FILE ═══ */
function handleFileUpload(e){var f=e.target.files[0];if(!f)return;window._currentFile=f;var bar=document.getElementById('fileBar');if(bar)bar.style.display='flex';var info=document.getElementById('fileInfo');if(info)info.textContent=f.name;var img=document.getElementById('filePreviewImg');if(img&&f.type.startsWith('image/')){img.src=URL.createObjectURL(f);img.style.display='block'}}
function clearFile(){window._currentFile=null;var bar=document.getElementById('fileBar');if(bar)bar.style.display='none'}

/* ═══ MESH ═══ */
setTimeout(function(){
  if(typeof THREE==='undefined'){document.getElementById('meshFallback').classList.add('on');return}
  var c=document.getElementById('meshCanvas'),w=document.getElementById('meshWrap');if(!c||!w)return;
  try{var S=140,scene=new THREE.Scene(),cam=new THREE.PerspectiveCamera(40,1,.1,100);cam.position.z=3.5;var renderer=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:true});renderer.setSize(S,S);renderer.setPixelRatio(Math.min(window.devicePixelRatio,1));renderer.setClearColor(0,0);var geo=new THREE.IcosahedronGeometry(1.1,3),edges=new THREE.EdgesGeometry(geo),mat=new THREE.LineBasicMaterial({color:0xd4a574,transparent:true,opacity:.6});var mesh=new THREE.LineSegments(edges,mat);scene.add(mesh);var core=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0xd4a574,transparent:true,opacity:.05}));scene.add(core);w.classList.add('on');(function anim(){requestAnimationFrame(anim);mesh.rotation.y+=.004;mesh.rotation.x+=.0012;core.rotation.y=mesh.rotation.y;core.rotation.x=mesh.rotation.x;renderer.render(scene,cam)})()}catch(e){document.getElementById('meshFallback').classList.add('on')}
},300);

/* ═══ KEYBOARD ═══ */
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();var inp=document.getElementById('userInput');if(inp)inp.focus()}if((e.ctrlKey||e.metaKey)&&e.key==='l'){e.preventDefault();newChat()}if(e.key==='Escape'){var s=document.getElementById('sidebar');if(s&&s.classList.contains('open'))toggleSidebar()}});
</script>
