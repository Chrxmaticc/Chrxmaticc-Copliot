<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0a">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="/manifest.json">
<title>Chrxmaticc Copilot</title>
<link rel="stylesheet" href="style.css">
<script defer src="analytics.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;inset:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;transition:background .5s cubic-bezier(.22,1,.36,1),color .5s cubic-bezier(.22,1,.36,1);background:var(--t-bg)!important;color:var(--t-text)!important}

.sidebar-avatar img,.sidebar-profile img,.chat-item img{max-width:28px!important;max-height:28px!important;width:28px!important;height:28px!important;object-fit:cover!important;border-radius:50%!important;flex-shrink:0!important}
.topbar-logo{max-width:26px!important;max-height:26px!important;width:26px!important;height:26px!important;object-fit:cover!important;border-radius:50%!important}

:root{--t-accent:#d4a574;--t-accent2:#c9956b;--t-glow:rgba(212,165,116,0.25);--t-bg:#0b0b0a;--t-surface:rgba(20,18,14,0.88);--t-border:rgba(212,165,116,0.14);--t-text:#e8d5c4;--t-muted:#7a6a5a;--t-chip:rgba(22,22,20,0.7)}

.landing-container{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .55s cubic-bezier(.22,1,.36,1),visibility .5s}
.landing-container.hidden{opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-18px)}
.landing-inner{display:flex;flex-direction:column;align-items:center;width:100%;max-width:660px;padding:0 24px;gap:0}

.landing-mesh-wrap{position:relative;width:150px;height:150px;margin-bottom:20px;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none}
.landing-mesh-wrap:active{cursor:grabbing}
.landing-mesh-wrap canvas{width:150px!important;height:150px!important;border-radius:50%;display:block}
.mesh-glow{position:absolute;inset:-24px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,var(--t-glow) 0%,transparent 70%);animation:meshGlowPulse 3s ease-in-out infinite}
@keyframes meshGlowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

.landing-greeting{font-size:clamp(22px,4vw,32px);font-weight:700;letter-spacing:-.6px;text-align:center;line-height:1.2;margin-bottom:8px;background:linear-gradient(135deg,var(--t-accent2),var(--t-accent),var(--t-accent2));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:greetShimmer 4s ease-in-out infinite}
@keyframes greetShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.landing-sub{font-size:13px;color:var(--t-muted);text-align:center;max-width:360px;line-height:1.55;margin-bottom:28px;letter-spacing:.1px;opacity:.8}

.landing-box{width:100%;background:var(--t-surface);border:1px solid var(--t-border);border-radius:20px;padding:4px 4px 4px 16px;display:flex;flex-direction:column;gap:0;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);box-shadow:0 8px 40px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.02);transition:border-color .3s ease,box-shadow .3s ease,transform .2s ease}
.landing-box:focus-within{border-color:var(--t-accent);box-shadow:0 8px 48px rgba(0,0,0,.5),0 0 0 3px var(--t-glow),0 0 40px var(--t-glow);transform:translateY(-2px)}
.landing-textarea{flex:1;background:transparent;border:none;outline:none;color:var(--t-text);font-size:15px;font-family:inherit;resize:none;max-height:130px;min-height:48px;padding:12px 8px 6px 0;line-height:1.5}
.landing-textarea::placeholder{color:var(--t-muted);opacity:.55}
.landing-box-bottom{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 2px}
.landing-box-left{display:flex;align-items:center;gap:8px}
.landing-attach-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--t-muted);border-radius:8px;transition:color .2s,background .2s;display:flex;align-items:center}
.landing-attach-btn:hover{color:var(--t-accent);background:var(--t-glow)}
.landing-box-right{display:flex;align-items:center;gap:10px}
.landing-model-badge{font-size:11px;color:var(--t-muted);letter-spacing:.2px;background:rgba(255,255,255,.04);border:1px solid var(--t-border);border-radius:8px;padding:4px 9px;white-space:nowrap}

.effort-track{position:relative;width:110px;height:5px;background:rgba(255,255,255,.08);border-radius:4px;cursor:pointer}
.effort-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--t-accent2),var(--t-accent));transition:width .2s ease;pointer-events:none}
.effort-thumb{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:var(--t-accent);border:2px solid var(--t-bg);transform:translateY(-50%);transition:left .2s ease;box-shadow:0 0 8px var(--t-glow);cursor:grab}
.effort-thumb:active{cursor:grabbing}

.ultracode-flare{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;background:radial-gradient(ellipse at 50% 120%,var(--t-glow) 0%,transparent 60%);transition:opacity .4s ease}
.ultracode-flare.active{opacity:1;animation:ultraFlare 2s ease-in-out infinite}
@keyframes ultraFlare{0%,100%{opacity:.6}50%{opacity:1}}

.landing-send{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,var(--t-accent2),var(--t-accent));transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s ease,opacity .2s;position:relative;overflow:hidden}
.landing-send::after{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,transparent,rgba(255,255,255,.18),transparent);opacity:0;transition:opacity .3s}
.landing-send:hover{transform:scale(1.08);box-shadow:0 0 28px var(--t-glow)}
.landing-send:hover::after{opacity:1}
.landing-send:active{transform:scale(.94)}
.landing-send:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.landing-send svg{width:16px;height:16px;fill:var(--t-bg);position:relative;z-index:1}

.landing-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%;padding:20px 0 0}
.chip{background:var(--t-chip);border:1px solid var(--t-border);color:var(--t-muted);padding:8px 16px;border-radius:22px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .22s cubic-bezier(.22,1,.36,1);white-space:nowrap;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);letter-spacing:.1px}
.chip:hover{border-color:var(--t-accent);background:var(--t-glow);color:var(--t-text);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.chip:active{transform:scale(.96)}

.landing-themes{display:flex;gap:9px;justify-content:center;padding:22px 0 0;flex-wrap:wrap}
.l-theme-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .22s cubic-bezier(.22,1,.36,1);position:relative}
.l-theme-dot:hover{transform:scale(1.2)}
.l-theme-dot.active{border-color:var(--t-accent);box-shadow:0 0 12px var(--t-glow);transform:scale(1.1)}
.l-theme-dot::after{content:attr(data-label);position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--t-muted);opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.l-theme-dot:hover::after{opacity:1}

.phase-overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.phase-overlay.visible{display:flex}
.phase-card{background:var(--t-surface);border:1px solid var(--t-border);border-radius:22px;padding:36px 44px;text-align:center;max-width:400px;width:90%;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);box-shadow:0 24px 64px rgba(0,0,0,.55);animation:phaseIn .45s cubic-bezier(.22,1,.36,1)}
@keyframes phaseIn{from{opacity:0;transform:scale(.9) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.phase-icon{font-size:38px;margin-bottom:10px;animation:iconPulse 2s ease-in-out infinite}
@keyframes iconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.phase-title{font-size:19px;font-weight:700;color:var(--t-accent);margin-bottom:8px;letter-spacing:-.3px}
.phase-sub{font-size:13px;color:var(--t-muted);line-height:1.6;min-height:34px;transition:opacity .3s}
.phase-bar{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:18px;overflow:hidden}
.phase-fill{height:100%;border-radius:2px;width:0%;background:linear-gradient(90deg,var(--t-accent2),var(--t-accent),var(--t-accent2));background-size:200% 100%;transition:width .45s cubic-bezier(.22,1,.36,1);animation:barShimmer 2s linear infinite}
@keyframes barShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.chat-wrap{position:fixed;inset:0;z-index:5;display:none;opacity:0}
.chat-wrap.visible{display:flex;opacity:1;animation:chatReveal .55s cubic-bezier(.22,1,.36,1) forwards}
@keyframes chatReveal{from{opacity:0;filter:blur(6px)}to{opacity:1;filter:blur(0)}}

.sidebar{position:fixed;left:-290px;top:0;bottom:0;width:272px;z-index:100;transition:left .3s cubic-bezier(.25,.8,.25,1.2);display:flex;flex-direction:column;padding:16px;overflow-y:auto;border-right:1px solid var(--t-border);background:var(--t-surface)}
.sidebar.open{left:0}
.sidebar-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sidebar-title{font-size:17px;font-weight:700;flex:1;color:var(--t-text)}
.sidebar-close{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:var(--t-muted);margin-left:auto}
.sidebar-new{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:11px;border:1px solid var(--t-border);background:var(--t-surface);color:var(--t-text);font-size:13px;cursor:pointer;margin-bottom:12px;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.sidebar-new:hover{border-color:var(--t-accent);box-shadow:0 0 14px var(--t-glow)}
.sidebar-new svg{width:15px;height:15px;stroke:var(--t-accent)}
.sidebar-chats{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:8px;padding:10px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;color:var(--t-text);font-size:13px;transition:background .15s}
.chat-item:hover,.chat-item.active{background:var(--t-glow)}
.chat-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.sidebar-footer{border-top:1px solid var(--t-border);padding-top:12px;margin-top:8px}
.sidebar-profile{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--t-text);transition:background .15s}
.sidebar-profile:hover{background:var(--t-glow)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.overlay.visible{display:block}

.main{flex:1;display:flex;flex-direction:column;max-width:800px;margin:0 auto;width:100%;position:relative;padding:0 8px}

.chat-header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 4px;flex-shrink:0}
.chat-header-left{display:flex;align-items:center;gap:8px}
.chat-header-toggle{background:none;border:none;cursor:pointer;padding:6px;color:var(--t-accent);font-size:20px;display:flex;align-items:center}
.chat-header-logo{width:24px;height:24px;border-radius:50%;object-fit:cover}
.chat-header-name{font-size:14px;font-weight:700;letter-spacing:-.2px;background:linear-gradient(135deg,var(--t-accent2),var(--t-accent),var(--t-accent2));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:greetShimmer 4s ease-in-out infinite}

.messages{flex:1;overflow-y:auto;padding:12px 4px;display:flex;flex-direction:column;gap:8px;min-height:0}
.messages::-webkit-scrollbar{display:none}

.bubble-row{display:flex;flex-direction:column;max-width:85%;animation:bubblePop .32s cubic-bezier(.34,1.56,.64,1)}
@keyframes bubblePop{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bubble-row.user{align-self:flex-end;align-items:flex-end}
.bubble-row.ai{align-self:flex-start;align-items:flex-start}
.bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.bubble-row.user .bubble{border-bottom-right-radius:4px}
.bubble-row.ai .bubble{border-bottom-left-radius:4px}
.timestamp{font-size:10px;margin:3px 8px;opacity:0;transition:opacity .2s;color:var(--t-muted)}
.bubble-row:hover .timestamp{opacity:1}
.provider-badge{font-size:9px;margin:2px 8px;opacity:.45;font-style:italic;letter-spacing:.3px;color:var(--t-muted)}

.thinking-block{align-self:flex-start;max-width:85%;background:rgba(255,255,255,.03);border:1px solid var(--t-border);border-radius:12px;overflow:hidden;margin-bottom:4px;animation:bubblePop .3s cubic-bezier(.34,1.56,.64,1)}
.thinking-header{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;user-select:none}
.thinking-dot{width:7px;height:7px;border-radius:50%;background:var(--t-muted);animation:dotPulse 1.2s ease-in-out infinite;flex-shrink:0}
.thinking-dot.d2{animation-delay:.2s}.thinking-dot.d3{animation-delay:.4s}
.thinking-label{font-size:11px;color:var(--t-muted);font-style:italic;flex:1;letter-spacing:.2px}
.thinking-chevron{width:12px;height:12px;color:var(--t-muted);flex-shrink:0;transition:transform .25s ease}
.thinking-block.expanded .thinking-chevron{transform:rotate(180deg)}
.thinking-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.22,1,.36,1)}
.thinking-block.expanded .thinking-body{max-height:400px}
.thinking-text{padding:2px 14px 12px;font-size:12px;color:var(--t-muted);line-height:1.6;white-space:pre-wrap;word-break:break-word;border-top:1px solid var(--t-border);padding-top:10px}

.plan-block{align-self:flex-start;width:min(560px,94%);background:rgba(255,255,255,.03);border:1px solid var(--t-border);border-radius:16px;padding:18px 18px 14px;margin:4px 0;animation:bubblePop .3s cubic-bezier(.34,1.56,.64,1)}
.plan-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.plan-progress-track{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px}
.plan-progress-fill{height:100%;border-radius:2px;background:var(--t-accent);transition:width .4s ease}
.plan-q-count{font-size:10px;color:var(--t-muted);white-space:nowrap;letter-spacing:.2px}
.plan-question{font-size:14px;font-weight:600;color:var(--t-accent);line-height:1.45;margin-bottom:14px}
.plan-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.plan-option{background:rgba(255,255,255,.04);border:1px solid var(--t-border);color:var(--t-text);padding:12px 14px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s cubic-bezier(.22,1,.36,1);line-height:1.35}
.plan-option:hover{border-color:var(--t-accent);background:var(--t-glow);transform:translateY(-1px)}
.plan-option:active{transform:scale(.97)}
.plan-option.custom-opt{grid-column:1/-1;border-style:dashed;color:var(--t-muted);background:transparent}
.plan-option.custom-opt:hover{border-color:var(--t-accent);color:var(--t-text)}
.plan-custom-input{grid-column:1/-1;display:none;gap:8px;align-items:center;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--t-accent)}
.plan-custom-input.visible{display:flex}
.plan-custom-input input{flex:1;background:transparent;border:none;outline:none;color:var(--t-text);font-size:13px;font-family:inherit}
.plan-custom-input input::placeholder{color:var(--t-muted);opacity:.6}
.plan-custom-send{background:var(--t-accent);border:none;border-radius:8px;color:var(--t-bg);font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;font-family:inherit;transition:opacity .2s}
.plan-custom-send:hover{opacity:.85}

.typing-indicator{display:none;align-self:flex-start;padding:12px 16px;gap:5px}
.typing-indicator.visible{display:flex}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--t-muted);animation:bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.code-block{margin:6px 0;overflow:hidden;border-radius:10px}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;font-size:10px}
.code-copy{border:none;padding:3px 9px;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;background:var(--t-surface);color:var(--t-muted);transition:color .2s}
.code-copy:hover{color:var(--t-accent)}
.code-block pre{padding:10px 14px;margin:0;overflow-x:auto;font-size:12px;line-height:1.6;font-family:'SF Mono','Fira Code',monospace;white-space:pre-wrap;word-break:break-word}
.inline-code{padding:2px 5px;border-radius:4px;font-family:'SF Mono','Fira Code',monospace;font-size:11px}
.code-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.code-action-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:1px solid var(--t-border);font-size:11px;cursor:pointer;font-family:inherit;background:var(--t-surface);color:var(--t-text);transition:all .15s}
.code-action-btn:hover{border-color:var(--t-accent);box-shadow:0 0 10px var(--t-glow)}
.code-action-btn svg{width:12px;height:12px}
.code-action-btn.accept{border-color:rgba(48,209,88,.3);color:#30d158}
.code-action-btn.reject{border-color:rgba(255,69,58,.3);color:#ff453a}
.code-action-btn.preview{border-color:rgba(10,132,255,.3);color:#0a84ff}
.code-action-btn.commit{border-color:rgba(212,165,116,.3);color:var(--t-accent);background:var(--t-glow)}

.preview-panel{display:none;position:absolute;right:0;top:0;bottom:0;width:48%;z-index:50;flex-direction:column;background:#fff}
.preview-panel.visible{display:flex}
.preview-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #e5e5ea;font-size:12px;color:#666;background:#f5f5f7}
.preview-close{background:none;border:none;cursor:pointer;color:#888;font-size:16px;padding:2px 6px}
.preview-iframe{flex:1;border:none;width:100%}

.file-preview-bar{display:none;padding:8px 14px;border-top:1px solid var(--t-border);align-items:center;gap:10px;background:var(--t-surface)}
.file-preview-bar.visible{display:flex}
.file-preview-bar img{width:44px;height:44px;border-radius:8px;object-fit:cover}
.file-preview-info{font-size:12px;color:var(--t-muted);flex:1}
.file-clear{background:none;border:none;cursor:pointer;color:var(--t-muted);font-size:18px;padding:2px 6px;transition:color .2s}
.file-clear:hover{color:#ff453a}

/* ═══════════════════════════════════════════════════════
   INPUT BAR — Claude-style: settings inside chatbox
   ═══════════════════════════════════════════════════════ */
.inputbar{padding:8px;border-top:1px solid var(--t-border);display:flex;flex-direction:column;gap:0;flex-shrink:0;background:var(--t-surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:16px 16px 0 0}

/* Main chatbox: full width, square */
.inputbar-chatbox{display:flex;align-items:stretch;gap:6px;width:100%}
.chat-input-wrap{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--t-border);border-radius:12px;transition:border-color .25s,box-shadow .25s;display:flex;align-items:stretch}
.chat-input-wrap:focus-within{border-color:var(--t-accent);box-shadow:0 0 0 3px var(--t-glow)}
#userInput{background:transparent;border:none;outline:none;width:100%;color:var(--t-text);font-size:15px;font-family:inherit;resize:none;max-height:140px;padding:16px;line-height:1.5;border-radius:12px}
#userInput::placeholder{color:var(--t-muted);opacity:.5}
.send-btn{width:48px;min-height:48px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,var(--t-accent2),var(--t-accent));transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;align-self:stretch}
.send-btn:hover{transform:scale(1.03);box-shadow:0 0 24px var(--t-glow)}
.send-btn:active{transform:scale(.97)}
.send-btn svg{width:17px;height:17px;fill:var(--t-bg)}

/* Settings row INSIDE the chatbox at the bottom */
.inputbar-settings{display:flex;align-items:center;gap:8px;padding:8px 4px 4px;flex-wrap:wrap;justify-content:space-between}

.settings-left{display:flex;align-items:center;gap:6px}
.settings-right{display:flex;align-items:center;gap:6px}

/* Workflow pill */
.workflow-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:16px;border:1px solid var(--t-border);background:var(--t-surface);color:var(--t-text);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .22s cubic-bezier(.22,1,.36,1);position:relative;white-space:nowrap}
.workflow-pill:hover{border-color:var(--t-accent);background:var(--t-glow)}
.workflow-pill.active{border-color:var(--t-accent);background:var(--t-glow);box-shadow:0 0 16px var(--t-glow);animation:workflowGlow 2.5s ease-in-out infinite}
@keyframes workflowGlow{0%,100%{box-shadow:0 0 10px var(--t-glow)}50%{box-shadow:0 0 24px var(--t-glow)}}
.workflow-pill svg{width:12px;height:12px;stroke:var(--t-accent)}
.gh-badge{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--t-bg);border:1.5px solid var(--t-accent);display:none;align-items:center;justify-content:center}
.gh-badge.visible{display:flex}
.gh-badge svg{width:9px;height:9px;fill:var(--t-accent)}

/* Effort bar inline */
.effort-wrap{display:flex;align-items:center;gap:6px}
.effort-name{font-size:10px;color:var(--t-muted);min-width:48px;letter-spacing:.2px;transition:color .2s}
.effort-name.ultracode{color:var(--t-accent);font-weight:700;animation:greetShimmer 1.5s ease-in-out infinite}
.chat-effort-track{position:relative;width:80px;height:5px;background:rgba(255,255,255,.07);border-radius:4px;cursor:pointer}
.chat-effort-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--t-accent2),var(--t-accent));transition:width .15s ease;pointer-events:none}
.chat-effort-thumb{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:var(--t-accent);border:2px solid var(--t-bg);transform:translate(-50%,-50%);cursor:grab;box-shadow:0 0 6px var(--t-glow);transition:left .15s ease}
.chat-effort-thumb:active{cursor:grabbing}

/* Model selector */
.model-select-wrap{position:relative;display:flex;align-items:center}
.model-select{appearance:none;-webkit-appearance:none;background:var(--t-surface);border:1px solid var(--t-border);color:var(--t-text);font-size:10px;font-weight:600;font-family:inherit;padding:5px 20px 5px 8px;border-radius:14px;cursor:pointer;outline:none;transition:border-color .2s,box-shadow .2s;white-space:nowrap}
.model-select:hover,.model-select:focus{border-color:var(--t-accent);box-shadow:0 0 10px var(--t-glow)}
.model-chevron{position:absolute;right:6px;pointer-events:none;color:var(--t-muted);width:9px;height:9px}

/* Small icon buttons */
.input-icon-btn{background:none;border:none;cursor:pointer;padding:5px;color:var(--t-muted);display:flex;align-items:center;justify-content:center;border-radius:8px;transition:color .2s,background .2s;flex-shrink:0}
.input-icon-btn:hover{color:var(--t-accent);background:var(--t-glow)}
.input-icon-btn svg{width:17px;height:17px}

/* GitHub + Commit */
.github-connect-btn{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:14px;border:1px solid var(--t-border);background:var(--t-surface);color:var(--t-muted);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .22s cubic-bezier(.22,1,.36,1);white-space:nowrap}
.github-connect-btn:hover{border-color:var(--t-accent);color:var(--t-accent);background:var(--t-glow)}
.github-connect-btn.connected{border-color:var(--t-accent);color:var(--t-accent);background:var(--t-glow)}
.github-connect-btn svg{width:12px;height:12px}
.commit-btn{display:none;align-items:center;gap:5px;padding:5px 10px;border-radius:14px;border:1px solid var(--t-border);background:var(--t-glow);color:var(--t-accent);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.commit-btn.visible{display:flex}
.commit-btn:hover{border-color:var(--t-accent);box-shadow:0 0 12px var(--t-glow)}
.commit-btn svg{width:11px;height:11px;fill:var(--t-accent)}

/* ═══════════════════════════════════════════════════════
   WORKFLOW SETTINGS POPOVER
   ═══════════════════════════════════════════════════════ */
.workflow-popover{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--t-surface);border:1px solid var(--t-border);border-radius:16px;padding:16px;min-width:260px;box-shadow:0 8px 40px rgba(0,0,0,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;flex-direction:column;gap:12px;z-index:300;animation:menuPop .2s cubic-bezier(.34,1.56,.64,1)}
.workflow-popover.open{display:flex}
@keyframes menuPop{from{opacity:0;transform:scale(.94) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.wf-pop-header{font-size:13px;font-weight:700;color:var(--t-accent);letter-spacing:-.2px}
.wf-pop-section{display:flex;flex-direction:column;gap:6px}
.wf-pop-label{font-size:10px;color:var(--t-muted);text-transform:uppercase;letter-spacing:.5px}
.wf-pop-toggles{display:flex;flex-wrap:wrap;gap:5px}
.wf-pop-toggle{padding:5px 10px;border-radius:14px;border:1px solid var(--t-border);background:rgba(255,255,255,.03);color:var(--t-muted);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.wf-pop-toggle:hover{border-color:var(--t-accent);color:var(--t-text)}
.wf-pop-toggle.active{border-color:var(--t-accent);background:var(--t-glow);color:var(--t-accent)}

.typing-cursor{display:inline-block;animation:blink .7s infinite;font-weight:200;color:var(--t-accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Floating */
.theme-pill{position:fixed;bottom:130px;right:10px;z-index:150;display:flex;flex-direction:column;gap:4px;padding:4px;border-radius:20px;border:1px solid var(--t-border);background:var(--t-surface);backdrop-filter:blur(20px);box-shadow:0 4px 24px rgba(0,0,0,.4);opacity:.35;transition:opacity .3s}
.theme-pill:hover{opacity:1}
.t-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .22s cubic-bezier(.22,1,.36,1)}
.t-dot:hover{transform:scale(1.18)}
.t-dot.active{border-color:var(--t-accent);box-shadow:0 0 8px var(--t-glow)}
.wwcd-btn{position:fixed;bottom:130px;left:12px;z-index:150;width:34px;height:34px;border-radius:50%;border:1px solid var(--t-border);background:var(--t-surface);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);opacity:.45;transition:opacity .2s,box-shadow .2s}
.wwcd-btn:hover{opacity:1;box-shadow:0 0 14px var(--t-glow)}
.wwcd-btn svg{width:14px;height:14px}
.app-toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%);padding:10px 16px;border-radius:12px;font-size:12px;z-index:300;backdrop-filter:blur(20px);display:flex;align-items:center;gap:10px;animation:toastIn .3s ease,toastOut .3s ease 2.5s forwards;pointer-events:none;font-weight:500;max-width:340px;border:1px solid var(--t-border);border-left:3px solid var(--t-accent);background:var(--t-surface);color:var(--t-text)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-6px)}}
.app-toast svg{width:15px;height:15px;flex-shrink:0;fill:var(--t-accent)}
.confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:500;display:none}

/* Theme overrides */
body.theme-midnight{--t-accent:#9090d8;--t-accent2:#6060b0;--t-glow:rgba(130,130,220,.2);--t-bg:#08080f;--t-surface:rgba(12,12,22,.9);--t-border:rgba(100,100,180,.14);--t-text:#e0e0f0;--t-muted:#6060a0;--t-chip:rgba(14,14,26,.7)}

body.theme-chromatic{--t-accent:#d4a574;--t-accent2:#4a7fc0;--t-glow:rgba(150,130,200,.2);--t-bg:#0d0e14;--t-surface:rgba(20,20,28,.9);--t-border:rgba(140,130,180,.16);--t-text:#e8d5c4;--t-muted:#8a8a9a;--t-chip:rgba(20,20,30,.7)}
body.theme-liquid{--t-accent:#bbbbbb;--t-accent2:#888888;--t-glow:rgba(180,180,200,.18);--t-bg:#111114;--t-surface:rgba(24,24,28,.95);--t-border:rgba(140,140,150,.2);--t-text:#d4d4d8;--t-muted:#777777;--t-chip:rgba(22,22,24,.8)}

  var d=false,px=0,py=0;

var EFFORT_STEPS=['low','medium','high','extreme'],_currentEffort='medium';
function makeEffortSlider(tid,fid,thid,nid){

  if(!t||!f||!th)return;var s=4,dg=false;
  function set(idx){idx=Math.max(0,Math.min(s-1,idx));var p=(idx/(s-1))*100;f.style.width=p+'%';th.style.left=p+'%';var l=EFFORT_STEPS[idx];_currentEffort=l;if(ne){ne.textContent=l==='extreme'?'ultracode':l;ne.className='effort-name'+(l==='extreme'?' ultracode':'')}if(fl)fl.className='ultracode-flare'+(l==='extreme'?' active':'')}

  window.addEventListener('mousemove',function(e){if(dg)set(pos(e.clientX))});window.addEventListener('mouseup',function(){dg=false});
  t.addEventListener('touchstart',function(e){dg=true;set(pos(e.touches[0].clientX));e.preventDefault()},{passive:false});
  window.addEventListener('touchmove',function(e){if(dg)set(pos(e.touches[0].clientX))},{passive:false});window.addEventListener('touchend',function(){dg=false});

}

function chipSend(t){if(!landingInput)return;landingInput.value=t;landingInput.style.height='auto';landingInput.style.height=Math.min(landingInput.scrollHeight,130)+'px';sendFromLanding()}
function sendFromLanding(){var t=landingInput?landingInput.value.trim():'';if(!t)return;var b=document.getElementById('landingSendBtn');if(b)b.disabled=true;window._pendingMsg=t;runPhaseAnimation(function(){transitionToChat()})}
function runPhaseAnimation(done){var o=document.getElementById('phaseOverlay');if(!o){done&&done();return}var phases=[{icon:'💭',title:'Thinking',subs:['analyzing your request…','identifying key requirements…']},{icon:'📋',title:'Planning',subs:['selecting optimal approach…','outlining architecture…']},{icon:'⚡',title:'Generating',subs:['crafting the response…','applying best practices…']}];var ie=document.getElementById('phaseIcon'),te=document.getElementById('phaseTitle'),se=document.getElementById('phaseSub'),fe=document.getElementById('phaseFill');o.classList.add('visible');var pi=0;function rp(){if(pi>=phases.length){setTimeout(function(){o.classList.remove('visible');done&&done()},300);return}var p=phases[pi];if(ie)ie.textContent=p.icon;if(te)te.textContent=p.title;if(fe)fe.style.width=Math.round(((pi+1)/phases.length)*100)+'%';var si=0;if(se)se.textContent=p.subs[0];var iv=setInterval(function(){si++;if(si>=p.subs.length){clearInterval(iv);pi++;setTimeout(rp,200)}else{if(se){se.style.opacity='0';setTimeout(function(){se.textContent=p.subs[si];se.style.opacity='1'},180)}}},750)}if(fe)fe.style.width='0%';rp()}
function transitionToChat(){var l=document.getElementById('landingContainer'),c=document.getElementById('chatWrap');if(typeof gsap!=='undefined'&&l){gsap.to(l,{opacity:0,y:-18,duration:.4,ease:'power2.in',onComplete:function(){l.classList.add('hidden');showChat()}})}else{if(l)l.classList.add('hidden');showChat()}}
function showChat(){var c=document.getElementById('chatWrap');if(!c)return;c.classList.add('visible');if(typeof gsap!=='undefined')gsap.fromTo(c,{opacity:0,filter:'blur(6px)'},{opacity:1,filter:'blur(0px)',duration:.5,ease:'power2.out'});if(typeof init==='function'&&!window._appInitialized){init();window._appInitialized=true}setTimeout(function(){var inp=document.getElementById('userInput');if(window._pendingMsg&&inp){inp.value=window._pendingMsg;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';window._pendingMsg=null;if(typeof sendMessage==='function')sendMessage()}},280)}

function toggleSidebar(){var s=document.getElementById('sidebar'),o=document.getElementById('overlay');if(s)s.classList.toggle('open');if(o)o.classList.toggle('visible')}
function togglePreview(){var p=document.getElementById('previewPanel');if(p)p.classList.toggle('visible')}
function clearFile(){var b=document.getElementById('filePreviewBar');if(b)b.classList.remove('visible');window._currentFile=null}
function toast(m){var t=document.createElement('div');t.className='app-toast';t.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 0l2.5 7.5L22 3l-4 7.5L24 12l-8 1.5L18 21l-3-6.5L10 22l1-8.5L2 15l5-5.5L0 6l8-3L12 0z"/></svg>'+m;document.body.appendChild(t);setTimeout(function(){if(t.parentNode)t.remove()},3000)}
window.createThinkingBlock=function(wf){var b=document.createElement('div');b.className='thinking-block';b.innerHTML='<div class="thinking-header" onclick="this.parentElement.classList.toggle(\'expanded\')"><div class="thinking-dot"></div><div class="thinking-dot d2"></div><div class="thinking-dot d3"></div><div class="thinking-label">'+wf+' — thinking…</div><svg class="thinking-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div><div class="thinking-body"><div class="thinking-text"></div></div>';return b}
window.collapseThinkingBlock=function(b){b.classList.remove('expanded');var l=b.querySelector('.thinking-label');if(l)l.textContent=l.textContent.replace('thinking…','done')}
window.createPlanBlock=function(q,opts,qn,qt){var b=document.createElement('div');b.className='plan-block';var pct=qn&&qt?Math.round((qn/qt)*100):0;var oh='';opts.forEach(function(o){if(o==='Custom'){oh+='<button class="plan-option custom-opt" onclick="showPlanCustom(this)">✏️ Custom</button><div class="plan-custom-input"><input type="text" placeholder="Type your own answer…" onkeydown="if(event.key===\'Enter\'){sendPlanCustom(this.nextElementSibling)}"><button class="plan-custom-send" onclick="sendPlanCustom(this)">Send</button></div>'}else{oh+='<button class="plan-option" onclick="selectPlanOption(this,\''+o.replace(/'/g,"\\'")+'\')">'+o+'</button>'}});b.innerHTML='<div class="plan-progress-row"><div class="plan-progress-track"><div class="plan-progress-fill" style="width:'+pct+'%"></div></div><div class="plan-q-count">Q'+(qn||'?')+'/'+(qt||'?')+'</div></div><div class="plan-question">'+q+'</div><div class="plan-options">'+oh+'</div>';return b}
window.showPlanCustom=function(btn){var inp=btn.parentElement.querySelector('.plan-custom-input');if(inp){inp.classList.add('visible');inp.querySelector('input').focus()}}
window.sendPlanCustom=function(btn){var inp=btn.previousElementSibling,val=inp?inp.value.trim():'';if(val&&typeof selectPlanOption==='function')selectPlanOption(btn,val)}
</script>
<script src="app.js"></script>
