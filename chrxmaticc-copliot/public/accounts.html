<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Account — Chrxmaticc Copilot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-midnight">
  <div class="settings-container">
    <div class="settings-header">
      <button class="settings-back" onclick="history.back()">‹ Back</button>
      <h1 class="settings-title">Account</h1>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Account Info</div>
      <div class="settings-card">
        <div class="settings-row">
          <span>Email</span>
          <span class="settings-value" id="accountEmail">-</span>
        </div>
        <div class="settings-row">
          <span>Account Created</span>
          <span class="settings-value" id="accountCreated">-</span>
        </div>
        <div class="settings-row">
          <span>Status</span>
          <span class="settings-value" id="accountStatus">Active</span>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Security</div>
      <div class="settings-card">
        <div class="settings-row" onclick="showSecurityQA()">
          <span>Security Question</span>
          <span class="settings-value" id="currentSecurityQuestion">Not set</span>
        </div>
        <div id="securityQAEditor" style="display:none; padding: 12px 16px;">
          <input type="text" id="editSecurityQuestion" placeholder="New question" class="settings-input" style="width:100%; margin-bottom:8px;">
          <input type="text" id="editSecurityAnswer" placeholder="New answer" class="settings-input" style="width:100%; margin-bottom:8px;">
          <button class="settings-btn" onclick="saveSecurityQA()">Save Security Q&A</button>
        </div>
        <button class="settings-btn" onclick="location.href='forgot.html'">Change Password</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Danger Zone</div>
      <div class="settings-card">
        <button class="settings-btn danger" onclick="logout()">Log Out</button>
        <button class="settings-btn danger" onclick="deleteAccount()" style="margin-top:4px;">Delete Account</button>
        <div class="settings-disclaimer" style="padding:8px 16px;">Deleting your account removes all data permanently.</div>
      </div>
    </div>
  </div>

  <script>
    function init() {
      var email = localStorage.getItem('chrxmaticc_email');
      document.getElementById('accountEmail').textContent = email || 'Guest';
      document.getElementById('accountStatus').textContent = email ? 'Logged In' : 'Guest';
      loadSecurityQA();
    }

    function loadSecurityQA() {
      var qa = JSON.parse(localStorage.getItem('chrxmaticc_security_qa') || '{}');
      if (qa.question) {
        document.getElementById('currentSecurityQuestion').textContent = qa.question;
        document.getElementById('editSecurityQuestion').value = qa.question;
        document.getElementById('editSecurityAnswer').value = qa.answer || '';
      }
    }

    function showSecurityQA() {
      document.getElementById('securityQAEditor').style.display = 'block';
    }

    function saveSecurityQA() {
      var q = document.getElementById('editSecurityQuestion').value.trim();
      var a = document.getElementById('editSecurityAnswer').value.trim();
      if (!q || !a) { alert('Fill in both fields.'); return; }
      localStorage.setItem('chrxmaticc_security_qa', JSON.stringify({ question: q, answer: a }));
      document.getElementById('currentSecurityQuestion').textContent = q;
      document.getElementById('securityQAEditor').style.display = 'none';
      alert('Security Q&A saved.');
    }

    function logout() {
      localStorage.removeItem('chrxmaticc_token');
      localStorage.removeItem('chrxmaticc_email');
      location.href = 'index.html';
    }

    function deleteAccount() {
      if (confirm('Delete your account? This cannot be undone.')) {
        localStorage.clear();
        location.href = 'index.html';
      }
    }

    init();
  </script>
</body>
</html>
